  hEdges.push({ y: 0, x1: 0, x2: CANVAS_W, src: null });
  hEdges.push({ y: CANVAS_H, x1: 0, x2: CANVAS_W, src: null });
  vEdges.push({ x: 0, y1: 0, y2: CANVAS_H, src: null });
  vEdges.push({ x: CANVAS_W, y1: 0, y2: CANVAS_H, src: null });

  cells.forEach((s, idx) => {
    if (excludeFrameIndices.has(idx)) return;
    const src = { x: s.cfg.x, y: s.cfg.y, w: s.cfg.w, h: s.cfg.h, frameIdx: idx };
    hEdges.push({ y: s.cfg.y,           x1: s.cfg.x, x2: s.cfg.x + s.cfg.w, src });
    hEdges.push({ y: s.cfg.y + s.cfg.h, x1: s.cfg.x, x2: s.cfg.x + s.cfg.w, src });
    vEdges.push({ x: s.cfg.x,           y1: s.cfg.y, y2: s.cfg.y + s.cfg.h, src });
    vEdges.push({ x: s.cfg.x + s.cfg.w, y1: s.cfg.y, y2: s.cfg.y + s.cfg.h, src });
  });

  const tbs = getTextBoxes();
  tbs.forEach(tb => {
    if (excludeTextBoxIds.has(tb.id)) return;
    const w = tb.width || tb.contentEl.offsetWidth;
    const h = tb.contentEl.offsetHeight;
    // frameIdx: -1 marks a text-box source (candidate is fine, not an obstructor).
    const src = { x: tb.x, y: tb.y, w, h, frameIdx: -1 };
    hEdges.push({ y: tb.y,     x1: tb.x, x2: tb.x + w, src });
    hEdges.push({ y: tb.y + h, x1: tb.x, x2: tb.x + w, src });
    vEdges.push({ x: tb.x,     y1: tb.y, y2: tb.y + h, src });
    vEdges.push({ x: tb.x + w, y1: tb.y, y2: tb.y + h, src });
  });

  return { hEdges, vEdges };
}

// Returns true if a frame (other than the moving object and other than the
// candidate's own source) physically sits on the straight line between the
// moving object and the alignment candidate, blocking the visual alignment.
//
// For a VERTICAL alignment line at x = v:
//   - The "line of sight" runs from the moving rect's Y range to the
//     candidate's Y range (src.y .. src.y+src.h).
//   - If the two Y ranges overlap (adjacent frames side-by-side), there's
//     no gap for anything to obstruct — return false (alignment is valid).
//   - Otherwise the gap is the Y interval strictly between them.
//   - An obstructor is any frame whose X range strictly contains v AND
//     whose Y range overlaps the gap interval.
//
// `excludeFrameIndices`: frames currently being moved (can't obstruct
// themselves). `src.frameIdx` is also exempt (the candidate is not its own
// obstructor). `src === null` (canvas edge) always returns false.
function edgeAlignmentObstructed(orientation, edgeCoord, movingL, movingT, movingR, movingB, src, excludeFrameIndices) {
  if (!src) return false; // canvas edges always valid

  if (orientation === 'v') {
    const srcT = src.y, srcB = src.y + src.h;
    // Y ranges overlap → no gap to obstruct.
    if (!(srcB <= movingT || srcT >= movingB)) return false;
    const gapStart = srcB <= movingT ? srcB     : movingB;
    const gapEnd   = srcB <= movingT ? movingT  : srcT;
    if (gapEnd <= gapStart) return false;

    for (let i = 0; i < cells.length; i++) {
      if (excludeFrameIndices && excludeFrameIndices.has(i)) continue;
      if (src.frameIdx === i) continue;
      const f = cells[i].cfg;
      const fL = f.x, fR = f.x + f.w, fT = f.y, fB = f.y + f.h;
      // Frame strictly crosses the vertical line x = edgeCoord.
      if (fL < edgeCoord && fR > edgeCoord) {
        // Frame's Y range overlaps the gap (open-interval overlap).
        if (fT < gapEnd && fB > gapStart) return true;
      }
    }
    return false;
  } else {
    // orientation === 'h': horizontal line at y = edgeCoord.
    const srcL = src.x, srcR = src.x + src.w;
    if (!(srcR <= movingL || srcL >= movingR)) return false;
    const gapStart = srcR <= movingL ? srcR     : movingR;
    const gapEnd   = srcR <= movingL ? movingL  : srcL;
    if (gapEnd <= gapStart) return false;

    for (let i = 0; i < cells.length; i++) {
      if (excludeFrameIndices && excludeFrameIndices.has(i)) continue;
      if (src.frameIdx === i) continue;
      const f = cells[i].cfg;
      const fL = f.x, fR = f.x + f.w, fT = f.y, fB = f.y + f.h;
      if (fT < edgeCoord && fB > edgeCoord) {
        if (fL < gapEnd && fR > gapStart) return true;
      }
    }
    return false;
  }
}

// Center-alignment analogue: obstruction test for a center-of-object
// alignment where the line coincides with the center coordinate (cx for
// vertical center line, cy for horizontal). The "moving side" still uses
// the moving object's full rect; the candidate side uses its src rect.
function centerAlignmentObstructed(orientation, lineCoord, movingL, movingT, movingR, movingB, src, excludeFrameIndices) {
  // Same geometry as edgeAlignmentObstructed — the line is at lineCoord and
  // the gap is computed between the two rectangles' perpendicular ranges.
  return edgeAlignmentObstructed(orientation, lineCoord, movingL, movingT, movingR, movingB, src, excludeFrameIndices);
}

// True when the gap between the moving rect and the candidate's source rect
// along the axis PERPENDICULAR to the alignment line exceeds
// CENTER_ALIGN_MAX_DISTANCE. For a vertical center line (shared cx), the
// relevant gap is the Y distance between nearest edges; for a horizontal
// center line (shared cy), the gap is the X distance. Overlapping ranges
// count as zero gap (always within range). Canvas-center candidates have
// src === null and are treated as always within range (though the canvas
// center alignment itself was already removed; this keeps the helper safe).
function centerAlignmentTooFar(orientation, movingL, movingT, movingR, movingB, src) {
  if (!src) return false;
  if (orientation === 'v') {
    const srcT = src.y, srcB = src.y + src.h;
    // Overlap → gap is zero → always in range.
    if (!(srcB <= movingT || srcT >= movingB)) return false;
    const gap = srcB <= movingT ? movingT - srcB : srcT - movingB;
    return gap > CENTER_ALIGN_MAX_DISTANCE;
  } else {
    const srcL = src.x, srcR = src.x + src.w;
    if (!(srcR <= movingL || srcL >= movingR)) return false;
    const gap = srcR <= movingL ? movingL - srcR : srcL - movingR;
    return gap > CENTER_ALIGN_MAX_DISTANCE;
  }
}

// ╔══════════════════════════════════════════════════════════════════════════╗
// ║   EQUIDISTANCE SPACING SNAP                                              ║
// ║                                                                          ║
// ║   When a selected object sits between two flanking frames, snap the      ║
// ║   selected object so the two gaps are exactly equal — but only if        ║
// ║   they're already close to equal (within EQUIDISTANCE_SNAP_PIXELS)       ║
// ║   and both gaps are <= EQUIDISTANCE_MAX_DISTANCE.                        ║
// ╚══════════════════════════════════════════════════════════════════════════╝

let activeEquiIndicators = [];

function ensureEquiIndicator(index, orientation) {
  while (activeEquiIndicators.length <= index) {
    const el = document.createElement('div');
    el.className = 'equidistance-indicator';
    el.style.display = 'none';
    canvasArea.appendChild(el);
    activeEquiIndicators.push(el);
  }
  const el = activeEquiIndicators[index];
  el.className = 'equidistance-indicator eq-' + orientation;
  return el;
}

function hideEquiIndicators() {
  activeEquiIndicators.forEach(el => el.style.display = 'none');
}

function removeEquiIndicatorEls() {
  activeEquiIndicators.forEach(el => el.remove());
  activeEquiIndicators = [];
}

// Collect candidate flanking frames (not text boxes — spacing is measured
// against frames). Returns an array of { x, y, w, h }. Also filters out any
// frames being dragged/stretched (the excludeFrameIndices set).
function getEquidistanceFrameCandidates(excludeFrameIndices) {
  const out = [];
  cells.forEach((s, idx) => {
    if (excludeFrameIndices && excludeFrameIndices.has(idx)) return;
    out.push({ x: s.cfg.x, y: s.cfg.y, w: s.cfg.w, h: s.cfg.h });
  });
  return out;
}

// Given a selected object's rect (L, T, R, B) and an array of candidate
// frames, find the best horizontal-equidistance snap correction along X —
// and the flanking edges to visualize. Returns null if no flank pair exists
// that satisfies the snap and distance constraints.
//
// Horizontal equidistance: a left-flank frame has its right edge at some
// xL <= L, a right-flank frame has its left edge at some xR >= R, AND the
// two frames vertically overlap the selected rect's Y range (so they are
// "in the same row").
function computeEquidistanceSnapX(L, T, R, B, candidates) {
  const midY = (T + B) / 2;

  // Vertical overlap test: a candidate is in the same row if its Y range
  // overlaps the selected object's Y range.
  const sameRow = (c) => !(c.y + c.h <= T || c.y >= B);

  const leftFlanks = [];   // candidates with right edge <= L, close enough
  const rightFlanks = [];  // candidates with left edge >= R, close enough

  for (const c of candidates) {
    if (!sameRow(c)) continue;
    const cR = c.x + c.w;
    if (cR <= L) {
      const gap = L - cR;
      if (gap <= EQUIDISTANCE_MAX_DISTANCE) leftFlanks.push({ c, edge: cR, gap });
    } else if (c.x >= R) {
      const gap = c.x - R;
      if (gap <= EQUIDISTANCE_MAX_DISTANCE) rightFlanks.push({ c, edge: c.x, gap });
    }
  }
  if (!leftFlanks.length || !rightFlanks.length) return null;

  let best = null;  // { correction, leftFlank, rightFlank, diff }
  for (const lf of leftFlanks) {
    for (const rf of rightFlanks) {
      const diff = lf.gap - rf.gap;              // >0 means object sits too far right
      const absDiff = Math.abs(diff);
      if (absDiff > EQUIDISTANCE_SNAP_PIXELS * 2) continue; // need diff/2 <= SNAP
      const correction = -diff / 2;               // shift object by this on X
      if (Math.abs(correction) > EQUIDISTANCE_SNAP_PIXELS) continue;
      if (!best || Math.abs(correction) < Math.abs(best.correction)) {
        best = { correction, leftFlank: lf, rightFlank: rf, midY };
      }
    }
  }
  return best;
}

// Vertical equidistance: flank above has bottom edge <= T, flank below has
// top edge >= B, both horizontally overlap the selected rect.
function computeEquidistanceSnapY(L, T, R, B, candidates) {
  const midX = (L + R) / 2;
  const sameCol = (c) => !(c.x + c.w <= L || c.x >= R);

  const topFlanks = [];
  const botFlanks = [];

  for (const c of candidates) {
    if (!sameCol(c)) continue;
    const cB = c.y + c.h;
    if (cB <= T) {
      const gap = T - cB;
      if (gap <= EQUIDISTANCE_MAX_DISTANCE) topFlanks.push({ c, edge: cB, gap });
    } else if (c.y >= B) {
      const gap = c.y - B;
      if (gap <= EQUIDISTANCE_MAX_DISTANCE) botFlanks.push({ c, edge: c.y, gap });
    }
  }
  if (!topFlanks.length || !botFlanks.length) return null;

  let best = null;
  for (const tf of topFlanks) {
    for (const bf of botFlanks) {
      const diff = tf.gap - bf.gap;
      const absDiff = Math.abs(diff);
      if (absDiff > EQUIDISTANCE_SNAP_PIXELS * 2) continue;
      const correction = -diff / 2;
      if (Math.abs(correction) > EQUIDISTANCE_SNAP_PIXELS) continue;
      if (!best || Math.abs(correction) < Math.abs(best.correction)) {
        best = { correction, topFlank: tf, botFlank: bf, midX };
      }
    }
  }
  return best;
}

// Collects projected rects (L, T, R, B) for the selected objects being moved,
// given a trial dx/dy applied to their start positions.
function getDraggedObjectRects(rawDx, rawDy, startPositionsFrames, startPositionsTextBoxes) {
  const rects = [];
  if (startPositionsFrames) {
    startPositionsFrames.forEach((start, idx) => {
      const s = cells[idx];
      if (!s) return;
      rects.push({
        kind: 'frame', idx,
        L: start.x + rawDx,
        T: start.y + rawDy,
        R: start.x + rawDx + s.cfg.w,
        B: start.y + rawDy + s.cfg.h,
      });
    });
  }
  if (startPositionsTextBoxes) {
    startPositionsTextBoxes.forEach((start, tbId) => {
      const tb = getTextBoxById(tbId);
      if (!tb) return;
      const w = tb.width || tb.contentEl.offsetWidth;
      const h = tb.contentEl.offsetHeight;
      rects.push({
        kind: 'tb', id: tbId,
        L: start.x + rawDx,
        T: start.y + rawDy,
        R: start.x + rawDx + w,
        B: start.y + rawDy + h,
      });
    });
  }
  return rects;
}

// Drive both horizontal + vertical equidistance snap for a MOVE interaction.
// Returns { dx, dy, snapsX, snapsY } — snapsX/snapsY are per-rect
// descriptors used to render indicators. Indicators are drawn with the
// FINAL snapped positions so the lines sit on the right coordinates.
function applyEquidistanceSnapForMove(rawDx, rawDy,
    startPositionsFrames, startPositionsTextBoxes,
    excludeFrameIndices, excludeTextBoxIds) {

  const candidates = getEquidistanceFrameCandidates(excludeFrameIndices);
  if (!candidates.length) { return { dx: rawDx, dy: rawDy, snapsX: [], snapsY: [] }; }

  const rects = getDraggedObjectRects(rawDx, rawDy,
    startPositionsFrames, startPositionsTextBoxes);
  if (!rects.length) { return { dx: rawDx, dy: rawDy, snapsX: [], snapsY: [] }; }

  // Find the smallest-magnitude correction across all selected objects,
  // per axis.
  let bestXCorrection = 0, bestXMag = Infinity;
  let bestYCorrection = 0, bestYMag = Infinity;
  rects.forEach(r => {
    const sx = computeEquidistanceSnapX(r.L, r.T, r.R, r.B, candidates);
    if (sx && Math.abs(sx.correction) < bestXMag) {
      bestXMag = Math.abs(sx.correction);
      bestXCorrection = sx.correction;
    }
    const sy = computeEquidistanceSnapY(r.L, r.T, r.R, r.B, candidates);
    if (sy && Math.abs(sy.correction) < bestYMag) {
      bestYMag = Math.abs(sy.correction);
      bestYCorrection = sy.correction;
    }
  });

  const snapDx = rawDx + (bestXMag < Infinity ? bestXCorrection : 0);
  const snapDy = rawDy + (bestYMag < Infinity ? bestYCorrection : 0);

  // Now recompute snap descriptors using the SNAPPED rects, so indicators
  // draw on the final (equidistant) positions.
  const snappedRects = getDraggedObjectRects(snapDx, snapDy,
    startPositionsFrames, startPositionsTextBoxes);
  const snapsX = [], snapsY = [];
  snappedRects.forEach(r => {
    if (bestXMag < Infinity) {
      const sx = computeEquidistanceSnapX(r.L, r.T, r.R, r.B, candidates);
      if (sx && Math.abs(sx.correction) < 0.5) {
        snapsX.push({ rect: r, info: sx });
      }
    }
    if (bestYMag < Infinity) {
      const sy = computeEquidistanceSnapY(r.L, r.T, r.R, r.B, candidates);
      if (sy && Math.abs(sy.correction) < 0.5) {
        snapsY.push({ rect: r, info: sy });
      }
    }
  });

  return { dx: snapDx, dy: snapDy, snapsX, snapsY };
}

// Render equidistance indicators for a collection of snap descriptors.
// Horizontal snap: two horizontal dashed segments (one in each gap) at the
// vertical midpoint of the selected rect.
// Vertical snap: two vertical dashed segments at the horizontal midpoint.
function renderEquidistanceIndicators(snapsX, snapsY) {
  let idx = 0;
  for (const s of snapsX) {
    const { rect, info } = s;
    const y = (rect.T + rect.B) / 2;
    // Left gap: from leftFlank.edge → rect.L
    const el1 = ensureEquiIndicator(idx++, 'h');
    el1.style.left = info.leftFlank.edge + 'px';
    el1.style.top = y + 'px';
    el1.style.width = (rect.L - info.leftFlank.edge) + 'px';
    el1.style.display = '';
    // Right gap: from rect.R → rightFlank.edge
    const el2 = ensureEquiIndicator(idx++, 'h');
    el2.style.left = rect.R + 'px';
    el2.style.top = y + 'px';
    el2.style.width = (info.rightFlank.edge - rect.R) + 'px';
    el2.style.display = '';
  }
  for (const s of snapsY) {
    const { rect, info } = s;
    const x = (rect.L + rect.R) / 2;
    const el1 = ensureEquiIndicator(idx++, 'v');
    el1.style.left = x + 'px';
    el1.style.top = info.topFlank.edge + 'px';
    el1.style.height = (rect.T - info.topFlank.edge) + 'px';
    el1.style.display = '';
    const el2 = ensureEquiIndicator(idx++, 'v');
    el2.style.left = x + 'px';
    el2.style.top = rect.B + 'px';
    el2.style.height = (info.botFlank.edge - rect.B) + 'px';
    el2.style.display = '';
  }
  // Hide any stale indicators from previous frames.
  for (let i = idx; i < activeEquiIndicators.length; i++) {
    activeEquiIndicators[i].style.display = 'none';
  }
}

function applyStretchAlignmentSnap(rawDx, rawDy, side, stretchStartStates, stretchStartTextStates, excludeFrameIndices, excludeTextBoxIds, shiftConstrain, altConstrain) {
  const { hEdges, vEdges } = getEdgeAlignmentTargets(excludeFrameIndices, excludeTextBoxIds);

  const canSnapX = shiftConstrain || altConstrain || side.includes('l') || side.includes('r');
  const canSnapY = shiftConstrain || altConstrain || side.includes('t') || side.includes('b');

  let bestDxCorrection = null, bestDxDist = Infinity;
  let bestDyCorrection = null, bestDyDist = Infinity;

  function projectFrame(start, projDx, projDy) {
    let newX = start.x, newY = start.y, newW = start.w, newH = start.h;
    if (side === 'r') { newW = start.w + projDx; }
    else if (side === 'l') { newW = start.w - projDx; newX = start.x + projDx; }
    else if (side === 'b') { newH = start.h + projDy; }
    else if (side === 't') { newH = start.h - projDy; newY = start.y + projDy; }
    else if (side === 'br') { newW = start.w + projDx; newH = start.h + projDy; }
    else if (side === 'bl') { newW = start.w - projDx; newH = start.h + projDy; newX = start.x + projDx; }
    else if (side === 'tr') { newW = start.w + projDx; newH = start.h - projDy; newY = start.y + projDy; }
    else if (side === 'tl') { newW = start.w - projDx; newH = start.h - projDy; newX = start.x + projDx; newY = start.y + projDy; }

    if (newW < 30) { newW = 30; if (side.includes('l')) newX = start.x + start.w - 30; }
    if (newH < 30) { newH = 30; if (side.includes('t')) newY = start.y + start.h - 30; }

    const softSnap = !shiftConstrain && !altConstrain && (Math.abs(newW - newH) < ALIGNMENT_STRETCH_TO_SQUARE_CLICK_PIXELS && newW >= 30 && newH >= 30);
    let constrained = false;

    if (shiftConstrain) {
      constrained = true;
      if (side === 'l' || side === 'r') { newH = newW; }
      else if (side === 't' || side === 'b') { newW = newH; }
      else {
        const target = Math.max(newW, newH);
        if (newW < target) { const diff = target - newW; newW = target; if (side.includes('l')) newX -= diff; }
        if (newH < target) { const diff = target - newH; newH = target; if (side.includes('t')) newY -= diff; }
      }
    } else if (altConstrain) {
      constrained = true;
      const aspect = start.w / start.h; 
      if (side === 'l' || side === 'r') {
        newH = newW / aspect;
      } else if (side === 't' || side === 'b') {
        newW = newH * aspect;
      } else {
        const ratioW = newW / start.w;
        const ratioH = newH / start.h;
        const ratio = Math.max(ratioW, ratioH);
        const prevW = newW, prevH = newH;
        newW = start.w * ratio;
        newH = start.h * ratio;
        if (side.includes('l')) newX -= (newW - prevW);
        if (side.includes('t')) newY -= (newH - prevH);
      }
    } else if (softSnap) {
      constrained = true;
      if (side === 'l' || side === 'r') {
        const diff = newH - newW; newW = newH; if (side === 'l') newX -= diff;
      } else if (side === 't' || side === 'b') {
        const diff = newW - newH; newH = newW; if (side === 't') newY -= diff;
      } else {
        const target = Math.max(newW, newH);
        if (newW < target) { const diff = target - newW; newW = target; if (side.includes('l')) newX -= diff; }
        if (newH < target) { const diff = target - newH; newH = target; if (side.includes('t')) newY -= diff; }
      }
    }

    return { newX, newY, newW, newH, constrained };
  }

  let isConstrained = false;

  if (stretchStartStates) {
    stretchStartStates.forEach((start, idx) => {
      const s = cells[idx];
      if (!s) return;

      const { newX, newY, newW, newH, constrained } = projectFrame(start, rawDx, rawDy);
      if (constrained) isConstrained = true;

      // Projected rect of the frame being stretched — needed for obstruction
      // test against a candidate edge's source.
      const mL = newX, mT = newY, mR = newX + newW, mB = newY + newH;

      if (canSnapX) {
        const activeXEdge = side.includes('l') ? newX : side.includes('r') ? newX + newW : newX + newW;
        for (const ve of vEdges) {
          const dist = Math.abs(activeXEdge - ve.x);
          if (dist < ALIGNMENT_STRETCH_CLICK_PIXELS && dist < bestDxDist &&
              !edgeAlignmentObstructed('v', ve.x, mL, mT, mR, mB, ve.src, excludeFrameIndices)) {
            bestDxDist = dist;
            bestDxCorrection = ve.x - activeXEdge;
          }
        }
      }

      if (canSnapY) {
        const activeYEdge = side.includes('t') ? newY : side.includes('b') ? newY + newH : newY + newH;
        for (const he of hEdges) {
          const dist = Math.abs(activeYEdge - he.y);
          if (dist < ALIGNMENT_STRETCH_CLICK_PIXELS && dist < bestDyDist &&
              !edgeAlignmentObstructed('h', he.y, mL, mT, mR, mB, he.src, excludeFrameIndices)) {
            bestDyDist = dist;
            bestDyCorrection = he.y - activeYEdge;
          }
        }
      }
    });
  }

  if (stretchStartTextStates && canSnapX) {
    stretchStartTextStates.forEach((start, tbId) => {
      const tb = getTextBoxById(tbId);
      if (!tb) return;
      if (side.includes('r') || side.includes('l')) {
        const widthDelta = side.includes('r') ? rawDx : -rawDx;
        const newW = Math.max(20, start.width + widthDelta);
        const activeXEdge = side.includes('r') ? start.x + newW : start.x - (newW - start.width);
        // Moving rect for the text box being stretched.
        const mL = side.includes('r') ? start.x : start.x - (newW - start.width);
        const mR = mL + newW;
        const mT = start.y;
        const mB = start.y + (start.height || (tb.contentEl ? tb.contentEl.offsetHeight : 0));
        for (const ve of vEdges) {
          const dist = Math.abs(activeXEdge - ve.x);
          if (dist < ALIGNMENT_STRETCH_CLICK_PIXELS && dist < bestDxDist &&
              !edgeAlignmentObstructed('v', ve.x, mL, mT, mR, mB, ve.src, excludeFrameIndices)) {
            bestDxDist = dist;
            bestDxCorrection = ve.x - activeXEdge;
          }
        }
      }
    });
  }

  let snapDx = rawDx, snapDy = rawDy;

  if (isConstrained || shiftConstrain || altConstrain) {
    let refAspect = 1;
    if (altConstrain && stretchStartStates && stretchStartStates.size > 0) {
      const firstStart = stretchStartStates.values().next().value;
      refAspect = firstStart.w / firstStart.h;
    }

    if (side === 'l' || side === 'r' || side === 't' || side === 'b') {
      if ((side === 'l' || side === 'r') && bestDyCorrection !== null) {
        const convertedDx = altConstrain ? bestDyCorrection * refAspect : bestDyCorrection;
        if (bestDxCorrection === null || Math.abs(convertedDx) < Math.abs(bestDxCorrection)) {
          bestDxCorrection = convertedDx;
        }
        bestDyCorrection = null;
      }
      if ((side === 't' || side === 'b') && bestDxCorrection !== null) {
        const convertedDy = altConstrain ? bestDxCorrection / refAspect : bestDxCorrection;
        if (bestDyCorrection === null || Math.abs(convertedDy) < Math.abs(bestDyCorrection)) {
          bestDyCorrection = convertedDy;
        }
        bestDxCorrection = null;
      }
    } else {
      if (bestDxCorrection !== null && bestDyCorrection !== null) {
        if (Math.abs(bestDxCorrection) < Math.abs(bestDyCorrection)) {
          const sign = side.includes('t') === side.includes('l') ? 1 : -1;
          bestDyCorrection = altConstrain ? sign * bestDxCorrection / refAspect : sign * bestDxCorrection;
        } else {
          const sign = side.includes('t') === side.includes('l') ? 1 : -1;
          bestDxCorrection = altConstrain ? sign * bestDyCorrection * refAspect : sign * bestDyCorrection;
        }
      } else if (bestDxCorrection !== null) {
        const sign = side.includes('t') === side.includes('l') ? 1 : -1;
        bestDyCorrection = altConstrain ? sign * bestDxCorrection / refAspect : sign * bestDxCorrection;
      } else if (bestDyCorrection !== null) {
        const sign = side.includes('t') === side.includes('l') ? 1 : -1;
        bestDxCorrection = altConstrain ? sign * bestDyCorrection * refAspect : sign * bestDyCorrection;
      }
    }
  }

  if (bestDxCorrection !== null) {
    snapDx = rawDx + bestDxCorrection;
  }
  if (bestDyCorrection !== null) {
    snapDy = rawDy + bestDyCorrection;
  }

  const guideHSet = new Set();
  const guideVSet = new Set();

  if (stretchStartStates) {
    stretchStartStates.forEach((start, idx) => {
      const { newX, newY, newW, newH } = projectFrame(start, snapDx, snapDy);
      const mL = newX, mT = newY, mR = newX + newW, mB = newY + newH;

      if (canSnapX) {
        const activeXEdge = side.includes('l') ? newX : side.includes('r') ? newX + newW : newX + newW;
        for (const ve of vEdges) {
          if (Math.abs(activeXEdge - ve.x) < 0.5 &&
              !edgeAlignmentObstructed('v', ve.x, mL, mT, mR, mB, ve.src, excludeFrameIndices))
            guideVSet.add(Math.round(ve.x));
        }
      }
      if (canSnapY) {
        const activeYEdge = side.includes('t') ? newY : side.includes('b') ? newY + newH : newY + newH;
        for (const he of hEdges) {
          if (Math.abs(activeYEdge - he.y) < 0.5 &&
              !edgeAlignmentObstructed('h', he.y, mL, mT, mR, mB, he.src, excludeFrameIndices))
            guideHSet.add(Math.round(he.y));
        }
      }
    });
  }

  const guideHArr = [...guideHSet];
  const guideVArr = [...guideVSet];

  guideHArr.forEach((y, i) => {
    const g = ensureGuideH(i);
    g.style.top = y + 'px';
    g.style.display = '';
  });
  for (let i = guideHArr.length; i < activeGuideHs.length; i++) {
    activeGuideHs[i].style.display = 'none';
  }

  guideVArr.forEach((x, i) => {
    const g = ensureGuideV(i);
    g.style.left = x + 'px';
    g.style.display = '';
  });
  for (let i = guideVArr.length; i < activeGuideVs.length; i++) {
    activeGuideVs[i].style.display = 'none';
  }

  return { dx: snapDx, dy: snapDy };
}

const sidebar      = document.getElementById('sidebar');
const canvasArea    = document.getElementById('canvasArea');
const zoomDisplay   = document.getElementById('zoomDisplay');
const selectedLabel = document.getElementById('selectedLabel');

// ─── Sidebar: one tab per PAIR (not per template) ────────────────────────
// Each pair remembers which viewport (desktop/mobile) was last active on it.
// Clicking a tab restores that pair at its last viewport.
// Array index === pair index.
const pairLastViewport = TEMPLATE_PAIRS.map(() => 'desktop');
const tabButtons = [];
const _templateTabsContainer = document.getElementById('templateTabsContainer');
TEMPLATE_PAIRS.forEach((pair, pairIdx) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn';
  // Use the pair's own name; fall back to the desktop template name for legacy pairs.
  const pairName = pair.name || pair.desktop.name || `Template ${pairIdx + 1}`;
  const desc = pair.desktop.description || '';
  btn.innerHTML = `${pairName}<span class="tab-meta">${desc}</span>`;
  btn.addEventListener('click', () => {
    const viewport = pairLastViewport[pairIdx];
    const tmplIdx = getTemplateIndex(pairIdx, viewport);
    switchTemplate(tmplIdx);
  });
  _templateTabsContainer.appendChild(btn);
  tabButtons.push(btn);
});

// ─── Viewport toggle wiring ──────────────────────────────────────────────
const viewportToggleEl = document.getElementById('viewportToggle');
const viewportDesktopBtn = document.getElementById('viewportDesktopBtn');
const viewportMobileBtn = document.getElementById('viewportMobileBtn');

function updateViewportToggleUI() {
  const vp = getActiveViewport();
  viewportDesktopBtn.classList.toggle('active', vp === 'desktop');
  viewportMobileBtn.classList.toggle('active', vp === 'mobile');
}

function selectViewport(targetViewport) {
  if (activeTemplateIndex < 0) return;
  const pairIdx = getActivePairIndex();
  const currentViewport = getActiveViewport();
  if (currentViewport === targetViewport) return;

  // Sync bidirectionally from the current viewport to the target viewport
  syncViewports(pairIdx, currentViewport, targetViewport);

  pairLastViewport[pairIdx] = targetViewport;
  const targetIdx = getTemplateIndex(pairIdx, targetViewport);
  switchTemplate(targetIdx);
}

viewportDesktopBtn.addEventListener('click', () => selectViewport('desktop'));
viewportMobileBtn.addEventListener('click', () => selectViewport('mobile'));

function switchTemplate(idx) {
  if (idx === activeTemplateIndex) return;

  cancelInteractions();

  // Highlight the tab for the PAIR this template belongs to.
  const newPairIdx = TEMPLATES[idx]._pairIndex;
  tabButtons.forEach((b, i) => b.classList.toggle('active', i === newPairIdx));
  // Remember which viewport the pair is now on.
  pairLastViewport[newPairIdx] = TEMPLATES[idx]._viewport;

  activeTemplateIndex = idx;

  const tmpl = TEMPLATES[idx];
  CANVAS_W = tmpl.canvasW;
  CANVAS_H = tmpl.canvasH;
  CANVAS_BG_COLOR = tmpl.bgColor;
  CANVAS_BG_IMAGE = tmpl.bgImage;
  FRAMES = tmpl.frames;

  FRAMES.forEach(f => getScaledPath(f));

  canvasArea.style.width  = CANVAS_W + 'px';
  canvasArea.style.height = CANVAS_H + 'px';
  canvasArea.style.background = CANVAS_BG_COLOR;

  if (!templateStates[idx]) {
    templateStates[idx] = createTemplateState(tmpl);
  }

  const state = templateStates[idx];
  cells = state.cells;
  selectedIndices = state.selectedIndices;
  bgImg = state.bgImg;
  bgLoaded = state.bgLoaded;

  canvasArea.innerHTML = '';
  canvasArea.style.backgroundImage = 'none';
  if (state.bgEl) {
    canvasArea.appendChild(state.bgEl);
    if (state.bgLoaded) {
      applyBgTransform(state);
    }
  }
  cells.forEach(s => {
    canvasArea.appendChild(s.el);
    canvasArea.appendChild(s.controlsEl);
  });
  if (state.textBoxes) {
    state.textBoxes.forEach(tb => {
      canvasArea.appendChild(tb.el);
    });
  }

  updateBgLockUI();

  cells.forEach((s, i) => {
    s.el.classList.toggle('selected', selectedIndices.has(i));
    s.controlsEl.classList.toggle('visible', selectedIndices.has(i));
  });

  updateLabel();
  updateViewportToggleUI();
}

function cancelInteractions() {
  if (swapping) {
    cells.forEach(c => c.el.classList.remove('swap-source', 'swap-target', 'swapping'));
  }
  if (dragging && dragCellIdx >= 0) cells[dragCellIdx]?.el.classList.remove('dragging');
  dragging = false; dragCellIdx = -1;
  if (frameDragging && frameDragIdx >= 0) cells[frameDragIdx]?.el.classList.remove('dragging');
  frameDragging = false; frameDragIdx = -1;
  axisLockActive = false; axisLockAxis = null;
  if (bgDragging) canvasArea.classList.remove('bg-dragging');
  bgDragging = false;
  swapping = false; swapSourceIdx = -1; swapTargetIdx = -1;
  resizing = false; resizeCellIdx = -1;
  frameStretching = false; frameStretchStartStates = null; frameStretchStartTextStates = null;
  
  duplicating = false; 
  dupSourceIdx = -1; 
  dupCloneIndices = [];
  dupStartPositions.clear();
  dupCloneToStartPos.clear();
  dupTextBoxSources = [];
  dupTextBoxCloneIds = [];
  dupTextBoxCloneStartPos.clear();
  
  if (marqueeActive && marqueeEl) { marqueeEl.remove(); marqueeEl = null; }
  marqueeActive = false;
  multiDragStartPositions = null;
  multiFrameDragStartPositions = null;
}

function createCell(state, tmpl, cfg, i) {
  getScaledPath(cfg);

  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.dataset.index = i;

  cell.style.left   = cfg.x + 'px';
  cell.style.top    = cfg.y + 'px';
  cell.style.width  = cfg.w + 'px';
  cell.style.height = cfg.h + 'px';

  const sp = getScaledPath(cfg);
  if (sp) {
    cell.classList.add('shaped');
    cell.style.clipPath = `path('${sp}')`;
  }

  const lbl = document.createElement('div');
  lbl.className = 'cell-label';
  lbl.textContent = cfg.label || `Frame ${i + 1}`;
  cell.appendChild(lbl);

  if (sp) {
    const outline = document.createElement('div');
    outline.className = 'shape-outline';
    outline.innerHTML = `<svg viewBox="0 0 ${cfg.w} ${cfg.h}"><path class="outline-path" d="${sp}"/></svg>`;
    cell.appendChild(outline);
  }

  const upload = document.createElement('div');
  upload.className = 'cell-upload';
  upload.innerHTML = `
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
    <span>Upload</span>
  `;
  cell.appendChild(upload);

  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/*,.mpo';
  cell.appendChild(fileInput);

  const img = document.createElement('img');
  cell.appendChild(img);

  const userBorderEl = document.createElement('div');
  userBorderEl.className = 'cell-user-border';
  cell.appendChild(userBorderEl);

  let userBorderSvgEl = null;
  if (sp) {
    userBorderSvgEl = document.createElement('div');
    userBorderSvgEl.className = 'cell-user-border-svg';
    userBorderSvgEl.innerHTML = `<svg viewBox="0 0 ${cfg.w} ${cfg.h}"><path class="user-border-path" d="${sp}"/></svg>`;
    cell.appendChild(userBorderSvgEl);
  }

  const controlsEl = document.createElement('div');
  controlsEl.className = 'frame-controls';
  controlsEl.style.left = cfg.x + 'px';
  controlsEl.style.top = cfg.y + 'px';
  controlsEl.style.width = cfg.w + 'px';
  controlsEl.style.height = cfg.h + 'px';

  const frameBorder = document.createElement('div');
  frameBorder.className = 'frame-border';
  controlsEl.appendChild(frameBorder);

  ['l', 'r', 't', 'b', 'tl', 'tr', 'bl', 'br'].forEach(side => {
    const h = document.createElement('div');
    h.className = `frame-stretch-handle fsh-${side}`;
    h.dataset.fshside = side;
    controlsEl.appendChild(h);
  });

  const cellState = {
    el: cell,
    controlsEl: controlsEl,
    img: img,
    fileInput: fileInput,
    upload: upload,
    userBorderEl: userBorderEl,
    userBorderSvgEl: userBorderSvgEl,
    cfg: cfg,
    naturalW: 0,
    naturalH: 0,
    scale: 1,
    posX: 0,
    posY: 0,
    loaded: false,
    lastClickTime: 0,
    // Dual-resolution: originalSrc holds the full-res blob URL for export;
    // displayScale is the ratio (displayW / originalW) so we can convert
    // display-space transforms back to original-space for rendering.
    originalSrc: '',
    displayScale: 1,
    // Border: auto-enabled when the template specifies borderColor or borderWidth,
    // or when borderEnabled is set explicitly.
    borderEnabled: cfg.borderEnabled !== undefined
      ? cfg.borderEnabled
      : (cfg.borderColor !== undefined || cfg.borderWidth !== undefined),
    borderColor: cfg.borderColor || '#ffffff',
    borderWidth: cfg.borderWidth || DEFAULT_FRAME_BORDER_WIDTH,
    _templateState: state,
    _templateIndex: tmpl._index,
    _cellIndex: i,
  };

  applyUserBorder(cellState);

  upload.addEventListener('click', (e) => {
    e.stopPropagation();
    e.preventDefault();
  });

  upload.addEventListener('wheel', (e) => {
    if (!e.shiftKey) e.preventDefault();
  }, { passive: false });

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    saveState();
    loadFileIntoCellState(file, cellState, state, cellState._cellIndex);
    e.target.value = '';
  });

  cell.addEventListener('mousedown', (e) => {
    if (TEMPLATES[activeTemplateIndex] !== tmpl) return;
    const ci = cellState._cellIndex;

    if ((e.ctrlKey || e.metaKey) && e.shiftKey) {
      e.preventDefault();
      e.stopPropagation();

      if (!selectedIndices.has(ci)) {
        selectCellFor(state, ci);
      }

      frameDragging = true;
      frameDragIdx = ci;
      frameDragStartX = e.clientX;
      frameDragStartY = e.clientY;
      axisLockActive = true;
      axisLockAxis = null; 
      multiFrameDragStartPositions = new Map();
      selectedIndices.forEach(idx => {
        const s = cells[idx];
        multiFrameDragStartPositions.set(idx, { x: s.cfg.x, y: s.cfg.y });
        s.el.classList.add('dragging');
      });
      multiTextDragStartPositions = new Map();
      selectedTextBoxIds.forEach(tbId => {
        const t = getTextBoxById(tbId);
        if (t) multiTextDragStartPositions.set(tbId, { x: t.x, y: t.y });
      });
      return;
    }

    if ((e.ctrlKey || e.metaKey) && !e.shiftKey) {
      // Ctrl+Click: start a "pending" interaction.
      // - If the user drags → duplicate.
      // - If the user releases without dragging → toggle multi-select.
      //   (The mouseup handler checks dupCloneIndices.length === 0 to detect
      //   the no-drag case and toggles selection there.)
      e.preventDefault();
      e.stopPropagation();

      duplicating = true;
      dupSourceIdx = ci;
      dupCloneIndices = [];
      dupDragStartX = e.clientX;
      dupDragStartY = e.clientY;

      dupStartPositions.clear();
      let sources = selectedIndices.has(ci) ? Array.from(selectedIndices) : [ci];
      sources.forEach(idx => {
         dupStartPositions.set(idx, { x: cells[idx].cfg.x, y: cells[idx].cfg.y });
      });

      dupTextBoxSources = [...selectedTextBoxIds];
      dupTextBoxCloneIds = [];
      dupTextBoxCloneStartPos.clear();
      return;
    }

    if (!selectedIndices.has(ci)) {
      selectCellFor(state, ci);
    }

    if (e.shiftKey && cellState.loaded) {
      e.preventDefault();
      e.stopPropagation();
      dragging = true;
      dragCellIdx = ci;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      multiDragStartPositions = new Map();
      selectedIndices.forEach(idx => {
        const s = cells[idx];
        if (s.loaded) {
          multiDragStartPositions.set(idx, { posX: s.posX, posY: s.posY });
        }
        s.el.classList.add('dragging');
      });
      return;
    }

    if (e.altKey && cellState.loaded) {
      e.preventDefault();
      e.stopPropagation();
      cellState.fileInput.click();
      return;
    }

    const now = Date.now();
    const isDoubleClick = (now - cellState.lastClickTime) < 300;

    if (!cellState.loaded && isDoubleClick) {
      e.preventDefault();
      e.stopPropagation();
      cellState.lastClickTime = 0;

      // If multiple empty frames are selected (including this one),
      // open the bulk uploader in selection-aware mode so the user can
      // upload one image per selected empty frame.
      const emptySelected = getSelectedEmptyFrameIndices();
      if (emptySelected.length > 1) {
        bulkUploadTargetIndices = emptySelected;
        bulkFileInput.click();
      } else {
        // Single empty frame — classic per-cell upload.
        cellState.fileInput.click();
      }
      return;
    }

    if (cellState.loaded && isDoubleClick) {
      e.preventDefault();
      swapping = true;
      swapSourceIdx = ci;
      cell.classList.add('swap-source', 'swapping');
      cellState.lastClickTime = 0;
      return;
    }
    cellState.lastClickTime = now;

    {
      e.preventDefault();
      e.stopPropagation();
      frameDragging = true;
      frameDragIdx = ci;
      frameDragStartX = e.clientX;
      frameDragStartY = e.clientY;
      multiFrameDragStartPositions = new Map();
      selectedIndices.forEach(idx => {
        const s = cells[idx];
        multiFrameDragStartPositions.set(idx, { x: s.cfg.x, y: s.cfg.y });
        s.el.classList.add('dragging');
      });
      multiTextDragStartPositions = new Map();
      selectedTextBoxIds.forEach(tbId => {
        const t = getTextBoxById(tbId);
        if (t) multiTextDragStartPositions.set(tbId, { x: t.x, y: t.y });
      });
    }
  });

  cell.addEventListener('wheel', (e) => {
    if (TEMPLATES[activeTemplateIndex] !== tmpl) return;
    const ci = cellState._cellIndex;
    if (!selectedIndices.has(ci)) return;
    
    handleScrollStart();
    const targetIndices = [...selectedIndices];

    if (e.shiftKey) {
      if (!cellState.loaded) return;
      e.preventDefault();

      // Multiplicative zoom: each tick scales by a fixed percentage,
      // so the visual change is consistent regardless of image resolution.
      const factor = e.deltaY > 0 ? (1 - IMAGE_RESIZE_SCROLL_FACTOR) : (1 + IMAGE_RESIZE_SCROLL_FACTOR);
      const hoveredRect = cell.getBoundingClientRect();
      const mx = e.clientX - hoveredRect.left;
      const my = e.clientY - hoveredRect.top;

      targetIndices.forEach(idx => {
        const s = cells[idx];
        if (!s || !s.loaded) return;
        const oldScale = s.scale;
        s.scale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, s.scale * factor));

        if (idx === ci) {
          s.posX = mx - (mx - s.posX) * (s.scale / oldScale);
          s.posY = my - (my - s.posY) * (s.scale / oldScale);
        } else {
          const cx = s.cfg.w / 2;
          const cy = s.cfg.h / 2;
          s.posX = cx - (cx - s.posX) * (s.scale / oldScale);
          s.posY = cy - (cy - s.posY) * (s.scale / oldScale);
        }

        applyTransformFor(state, idx);
      });
      return;
    }

    e.preventDefault();
    const delta = e.deltaY > 0 ? -5 : 5;

    targetIndices.forEach(idx => {
      const s = cells[idx];
      if (!s) return;
      const cfg = s.cfg;
      const aspect = cfg.w / cfg.h;
      const newW = cfg.w + delta;
      const newH = newW / aspect;

      if (newW < 30 || newH < 30) return;
      if (cfg.x + newW > CANVAS_W || cfg.y + newH > CANVAS_H) return;
      if (newW <= 0 || newH <= 0) return;

      const oldW = cfg.w;
      cfg.w = newW;
      cfg.h = newH;

      s.el.style.width = cfg.w + 'px';
      s.el.style.height = cfg.h + 'px';

      updateFrameShape(s);
      syncFrameControls(s);

      if (s.loaded) {
        const ratio = newW / oldW;
        s.posX *= ratio;
        s.posY *= ratio;
        s.scale *= ratio;
        applyTransformFor(state, idx);
      }
    });

    updateLabel();
  }, { passive: false });

  controlsEl.addEventListener('mousedown', (e) => {
    if (TEMPLATES[activeTemplateIndex] !== tmpl) return;
    const stretchHandleEl = e.target.closest('.frame-stretch-handle');
    if (!stretchHandleEl) return;

    e.preventDefault();
    e.stopPropagation();
    frameStretching = true;
    frameStretchSide = stretchHandleEl.dataset.fshside;
    frameStretchStartX = e.clientX;
    frameStretchStartY = e.clientY;

    frameStretchStartStates = new Map();
    selectedIndices.forEach(idx => {
      const s = cells[idx];
      if (!s) return;
      frameStretchStartStates.set(idx, {
        x: s.cfg.x, y: s.cfg.y, w: s.cfg.w, h: s.cfg.h,
        scale: s.scale, posX: s.posX, posY: s.posY
      });
    });

    frameStretchStartTextStates = new Map();
    selectedTextBoxIds.forEach(tbId => {
      const tb = getTextBoxById(tbId);
      if (!tb) return;
      frameStretchStartTextStates.set(tbId, {
        x: tb.x, y: tb.y, width: tb.width || tb.contentEl.offsetWidth
      });
    });
  });

  return cellState;
}

function reIndexCells(state) {
  state.cells.forEach((c, idx) => {
    c.el.dataset.index = idx;
    c._cellIndex = idx;
  });
}

function duplicateCell(sourceIdx, newX, newY) {
  const state = templateStates[activeTemplateIndex];
  const tmpl = TEMPLATES[activeTemplateIndex];
  const src = state.cells[sourceIdx];
  if (!src) return -1;

  const newCfg = {
    x: newX,
    y: newY,
    w: src.cfg.w,
    h: src.cfg.h,
    shape: src.cfg.shape || null,
    label: (src.cfg.label || 'Frame') + ' copy',
    borderEnabled: src.borderEnabled,
    borderColor: src.borderColor,
    borderWidth: src.borderWidth,
  };
  delete newCfg._scaledPath;
  
  tmpl.frames.push(newCfg);

  const newIdx = state.cells.length;
  const newCell = createCell(state, tmpl, newCfg, newIdx);
  state.cells.push(newCell);

  if (src.loaded && src.img.naturalWidth > 0) {
    // Share the same display and original blob URLs — no need to re-encode
    // through an offscreen canvas. Blob URLs are reference-counted by the
    // browser and remain valid as long as at least one reference exists.
    newCell.naturalW = src.naturalW;
    newCell.naturalH = src.naturalH;
    newCell.loaded = true;
    newCell.scale = src.scale;
    newCell.posX  = src.posX;
    newCell.posY  = src.posY;
    newCell.originalSrc = src.originalSrc || src.img.src;
    newCell.displayScale = src.displayScale || 1;
    newCell.el.classList.add('has-image');
    newCell.img.src = src.img.src;
    applyTransformFor(state, newCell._cellIndex);
  }

  canvasArea.appendChild(newCell.el);
  canvasArea.appendChild(newCell.controlsEl);
  cells = state.cells;

  return newIdx;
}

function createTemplateState(tmpl) {
  const state = {
    cells: [],
    selectedIndices: new Set(),
    textBoxes: [],       
    bgImg: new Image(),
    bgLoaded: false,
    bgScale: 1,
    bgPosX: 0,
    bgPosY: 0,
    bgNaturalW: 0,
    bgNaturalH: 0,
    bgEl: null,
  };

  const bgEl = document.createElement('img');
  bgEl.className = 'canvas-bg-img';
  state.bgEl = bgEl;

  state.bgImg.crossOrigin = 'anonymous';
  state.bgImg.onload = () => {
    state.bgLoaded = true;
    state.bgNaturalW = state.bgImg.naturalWidth;
    state.bgNaturalH = state.bgImg.naturalHeight;
    calculateDefaultBgTransform(state, tmpl);
    bgEl.src = state.bgImg.src;
    if (TEMPLATES[activeTemplateIndex] === tmpl) {
      bgLoaded = true;
      applyBgTransform(state);
    }
  };
  state.bgImg.onerror = () => {
    if (state.bgImg.crossOrigin) {
      state.bgImg.removeAttribute('crossOrigin');
      state.bgImg.src = tmpl.bgImage;
    }
  };
  if (tmpl.bgImage) {
    state.bgImg.src = tmpl.bgImage;
  }

  tmpl.frames.forEach((cfg, i) => {
    const cellState = createCell(state, tmpl, cfg, i);
    state.cells.push(cellState);
  });

  // Initialize text boxes from template config
  if (tmpl.textBoxes && tmpl.textBoxes.length) {
    tmpl.textBoxes.forEach(tbCfg => {
      createTextBoxFromConfig(state, tbCfg);
    });
  }

  return state;
}

function calculateDefaultBgTransform(state, tmpl) {
  if (!state.bgLoaded) return;
  const cw = tmpl ? tmpl.canvasW : CANVAS_W;
  const ch = tmpl ? tmpl.canvasH : CANVAS_H;
  state.bgScale = Math.max(cw / state.bgNaturalW, ch / state.bgNaturalH);
  state.bgPosX = (cw - state.bgNaturalW * state.bgScale) / 2;
  state.bgPosY = (ch - state.bgNaturalH * state.bgScale) / 2;
}

function applyBgTransform(state) {
  if (!state.bgEl || !state.bgLoaded) return;
  clampBgPosition(state);
  state.bgEl.style.transform = `translate(${state.bgPosX}px, ${state.bgPosY}px) scale(${state.bgScale})`;
}

function clampBgPosition(state) {
  const cw = CANVAS_W, ch = CANVAS_H;
  const imgW = state.bgNaturalW * state.bgScale;
  const imgH = state.bgNaturalH * state.bgScale;

  if (imgW >= cw) {
    state.bgPosX = Math.min(0, Math.max(cw - imgW, state.bgPosX));
  } else {
    state.bgPosX = Math.max(0, Math.min(cw - imgW, state.bgPosX));
  }
  if (imgH >= ch) {
    state.bgPosY = Math.min(0, Math.max(ch - imgH, state.bgPosY));
  } else {
    state.bgPosY = Math.max(0, Math.min(ch - imgH, state.bgPosY));
  }
}

function updateFrameShape(cellState) {
  const cfg = cellState.cfg;
  delete cfg._scaledPath;
  const sp = getScaledPath(cfg);

  if (sp) {
    cellState.el.style.clipPath = `path('${sp}')`;
    const outlineEl = cellState.el.querySelector('.shape-outline');
    if (outlineEl) {
      outlineEl.innerHTML = `<svg viewBox="0 0 ${cfg.w} ${cfg.h}"><path class="outline-path" d="${sp}"/></svg>`;
    }
    if (cellState.userBorderSvgEl) {
      cellState.userBorderSvgEl.innerHTML = `<svg viewBox="0 0 ${cfg.w} ${cfg.h}"><path class="user-border-path" d="${sp}"/></svg>`;
      applyUserBorder(cellState);
    }
  }
}

function applyUserBorder(s) {
  if (s.borderEnabled && s.borderWidth > 0) {
    const color = s.borderColor;
    const width = s.borderWidth;
    if (s.cfg.shape && s.userBorderSvgEl) {
      s.userBorderEl.style.border = 'none';
      const pathEl = s.userBorderSvgEl.querySelector('.user-border-path');
      if (pathEl) {
        pathEl.style.stroke = color;
        pathEl.style.strokeWidth = (width * 2) + 'px'; 
      }
    } else {
      s.userBorderEl.style.border = `${width}px solid ${color}`;
    }
    // Suppress placeholder border + upload glyph so the user's own styling
    // is the only border on the frame.
    s.el.classList.add('has-user-border');
  } else {
    s.userBorderEl.style.border = 'none';
    if (s.userBorderSvgEl) {
      const pathEl = s.userBorderSvgEl.querySelector('.user-border-path');
      if (pathEl) {
        pathEl.style.stroke = 'transparent';
        pathEl.style.strokeWidth = '0px';
      }
    }
    s.el.classList.remove('has-user-border');
  }
}

function selectCellFor(state, i) {
  deselectAll();
  state.selectedIndices.add(i);
  state.cells[i].el.classList.add('selected');
  state.cells[i].controlsEl.classList.add('visible');
  selectedIndices = state.selectedIndices;
  updateLabel();
  syncFormatUIToSelection();
}

function selectMultiple(state, indices) {
  deselectAll();
  indices.forEach(i => {
    state.selectedIndices.add(i);
    state.cells[i].el.classList.add('selected');
    state.cells[i].controlsEl.classList.add('visible');
  });
  selectedIndices = state.selectedIndices;
  updateLabel();
  syncFormatUIToSelection();
}

function deselectAll() {
  const state = templateStates[activeTemplateIndex];
  if (!state) return;
  state.selectedIndices.forEach(i => {
    if (state.cells[i]) {
      state.cells[i].el.classList.remove('selected');
      state.cells[i].controlsEl.classList.remove('visible');
    }
  });
  state.selectedIndices.clear();
  selectedIndices = state.selectedIndices;
  updateLabel();
  syncFormatUIToSelection();
}

function syncFrameControls(cellState) {
  const cfg = cellState.cfg;
  const c = cellState.controlsEl;
  c.style.left = cfg.x + 'px';
  c.style.top = cfg.y + 'px';
  c.style.width = cfg.w + 'px';
  c.style.height = cfg.h + 'px';
}

function syncAllSelectedControls() {
  selectedIndices.forEach(idx => {
    if (cells[idx]) syncFrameControls(cells[idx]);
  });
}

function updateLabel() {
  if (selectedIndices.size === 0) {
    selectedLabel.textContent = 'Click a frame to select it';
    zoomDisplay.textContent = '';
    return;
  }
  if (selectedIndices.size === 1) {
    const idx = [...selectedIndices][0];
    const s = cells[idx];
    selectedLabel.textContent = s.cfg.label || `Frame ${idx + 1}`;
    zoomDisplay.textContent = s.loaded ? Math.round(s.scale * 100) + '%' : '';
  } else {
    selectedLabel.textContent = `${selectedIndices.size} frames selected`;
    zoomDisplay.textContent = '';
  }
}

function calculateDefaultTransform(s) {
  if (!s.loaded) return;
  // Cover-fit: scale so the image fully covers the frame.
  // Tiny epsilon prevents floating-point rounding from leaving sub-pixel gaps.
  const rawScale = Math.max(s.cfg.w / s.naturalW, s.cfg.h / s.naturalH);
  s.scale = rawScale * (1 + 1e-10);
  s.posX = (s.cfg.w - s.naturalW * s.scale) / 2;
  s.posY = (s.cfg.h - s.naturalH * s.scale) / 2;
}

function applyTransformFor(state, i) {
  const s = state.cells[i];
  if (!s.loaded) {
    // Clear positioning for unloaded cells.
    s.img.style.left = '0px';
    s.img.style.top = '0px';
    s.img.style.width = '';
    s.img.style.height = '';
    return;
  }
  clampPosition(s);
  // Use CSS width/height + left/top instead of transform: scale + translate.
  // This places the image in the same layout coordinate space as the frame
  // div, so the browser pixel-snaps both edges together — eliminating
  // sub-pixel gaps that occur with transform-based scaling at non-100%
  // browser zoom levels.
  const imgW = s.naturalW * s.scale;
  const imgH = s.naturalH * s.scale;
  s.img.style.width = imgW + 'px';
  s.img.style.height = imgH + 'px';
  s.img.style.left = s.posX + 'px';
  s.img.style.top = s.posY + 'px';
  if (state === templateStates[activeTemplateIndex] && selectedIndices.has(i)) updateLabel();
}

function applyTransform(i) {
  applyTransformFor(templateStates[activeTemplateIndex], i);
}

function clampPosition(s) {
  const cw = s.cfg.w, ch = s.cfg.h;
  const imgW = s.naturalW * s.scale;
  const imgH = s.naturalH * s.scale;

  const TOL = 0.5;
  if (imgW >= cw - TOL) {
    s.posX = Math.min(0, Math.max(cw - imgW, s.posX));
  } else {
    s.posX = Math.max(0, Math.min(cw - imgW, s.posX));
  }
  if (imgH >= ch - TOL) {
    s.posY = Math.min(0, Math.max(ch - imgH, s.posY));
  } else {
    s.posY = Math.max(0, Math.min(ch - imgH, s.posY));
  }
}

async function loadFileIntoCellState(file, cellState, state, i) {
  // Single-pass pipeline: decode once, produce both original + display URLs.
  const info = await processImageFile(file);

  cellState.originalSrc = info.originalUrl;
  cellState.displayScale = info.needsDownscale
    ? info.displayW / info.originalW
    : 1;
  cellState.naturalW = info.displayW;
  cellState.naturalH = info.displayH;
  cellState.loaded = true;
  calculateDefaultTransform(cellState);
  cellState.el.classList.add('has-image');
  cellState.img.src = info.displaySrc;
  applyTransformFor(state, i);
  deselectAll();
}

function performSwap(idxA, idxB) {
  saveState();
  const a = cells[idxA];
  const b = cells[idxB];

  const siblingA = a.img.nextSibling;
  const parentA = a.img.parentNode;
  b.img.parentNode.insertBefore(a.img, b.img);
  parentA.insertBefore(b.img, siblingA);

  const tempImg = a.img;
  a.img = b.img;
  b.img = tempImg;

  ['loaded', 'naturalW', 'naturalH', 'originalSrc', 'displayScale'].forEach(p => {
    const tmp = a[p]; a[p] = b[p]; b[p] = tmp;
  });

  [a, b].forEach(s => {
    s.el.classList.toggle('has-image', s.loaded);
  });

  const sameShape = (a.cfg.w / a.cfg.h) === (b.cfg.w / b.cfg.h)
                 && (a.cfg.shape || '') === (b.cfg.shape || '');

  if (sameShape) {
    ['scale', 'posX', 'posY'].forEach(p => {
      const tmp = a[p]; a[p] = b[p]; b[p] = tmp;
    });
  } else {
    calculateDefaultTransform(a);
    calculateDefaultTransform(b);
  }

  applyTransform(idxA);
  applyTransform(idxB);
}

canvasArea.addEventListener('mousedown', (e) => {
  if (e.target.closest('.cell')) return;
  if (e.target.closest('.text-box')) return;
  if (textPlaceMode) return; 
  if (!lockBgToggle.checked) return;

  deselectAll();

  const rect = canvasArea.getBoundingClientRect();
  marqueeStartX = e.clientX - rect.left;
  marqueeStartY = e.clientY - rect.top;
  marqueeActive = true;

  marqueeEl = document.createElement('div');
  marqueeEl.className = 'marquee-box';
  marqueeEl.style.left = marqueeStartX + 'px';
  marqueeEl.style.top = marqueeStartY + 'px';
  marqueeEl.style.width = '0px';
  marqueeEl.style.height = '0px';
  canvasArea.appendChild(marqueeEl);

  e.preventDefault();
});

document.addEventListener('mousedown', (e) => {
  if (e.target.closest('.cell')) return;
  if (e.target.closest('.text-box')) return;
  if (e.target.closest('.canvas-area')) return;
  if (e.target.closest('button') || e.target.closest('input') || e.target.closest('.lock-toggle')) return;
  if (e.target.closest('.tab-btn')) return;
  if (e.target.closest('.right-sidebar')) return;
  deselectAll();
});

document.addEventListener('mousedown', (e) => {
  const activeEl = document.activeElement;
  if (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) {
    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'BUTTON') {
      activeEl.blur(); 
    }
  }
}, true); 

window.addEventListener('keydown', (e) => {
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.target.contentEditable === 'true') return;

    if (selectedIndices.size === 0) return;
    saveState();
    
    const state = templateStates[activeTemplateIndex];
    const tmpl = TEMPLATES[activeTemplateIndex];
    const selected = [...selectedIndices].filter(idx => cells[idx]);
    if (selected.length === 0) return;

    e.preventDefault();

    const loadedFrames = selected.filter(idx => cells[idx].loaded);
    if (loadedFrames.length > 0) {
      loadedFrames.forEach(idx => {
        const s = cells[idx];
        s.img.src = '';
        s.loaded = false;
        s.naturalW = 0;
        s.naturalH = 0;
        s.scale = 1;
        s.posX = 0;
        s.posY = 0;
        s.img.style.width = '';
        s.img.style.height = '';
        s.img.style.left = '0px';
        s.img.style.top = '0px';
        s.el.classList.remove('has-image');
      });
      updateLabel();
      return;
    }

    selected.sort((a, b) => b - a);

    selected.forEach(cellIdx => {
      const s = cells[cellIdx];
      s.el.remove();
      s.controlsEl.remove();
      state.cells.splice(cellIdx, 1);
      tmpl.frames.splice(cellIdx, 1); 
    });

    cells = state.cells;
    reIndexCells(state);
    state.selectedIndices.clear();
    selectedIndices = state.selectedIndices;
    updateLabel();
  }
});

window.addEventListener('mousemove', (e) => {
  if (swapping && swapSourceIdx >= 0) {
    const hoveredEl = document.elementFromPoint(e.clientX, e.clientY);
    const targetCell = hoveredEl ? hoveredEl.closest('.cell') : null;
    cells.forEach(c => c.el.classList.remove('swap-target'));
    if (targetCell) {
      const tIdx = parseInt(targetCell.dataset.index);
      if (tIdx !== swapSourceIdx) {
        swapTargetIdx = tIdx;
        targetCell.classList.add('swap-target');
      } else {
        swapTargetIdx = -1;
      }
    } else {
      swapTargetIdx = -1;
    }
  }

  if (dragging && dragCellIdx >= 0 && !swapping && multiDragStartPositions) {
    if (!hasSavedForThisDrag) { saveState(); hasSavedForThisDrag = true; }
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    multiDragStartPositions.forEach((start, idx) => {
      const s = cells[idx];
      if (!s || !s.loaded) return;
      s.posX = start.posX + dx;
      s.posY = start.posY + dy;
      applyTransform(idx);
    });
  }

  if (frameDragging && frameDragIdx >= 0 && multiFrameDragStartPositions) {
    if (!hasSavedForThisDrag) { saveState(); hasSavedForThisDrag = true; }
    let rawDx = e.clientX - frameDragStartX;
    let rawDy = e.clientY - frameDragStartY;

    if (axisLockActive) {
      if (axisLockAxis === null && (Math.abs(rawDx) > 3 || Math.abs(rawDy) > 3)) {
        axisLockAxis = Math.abs(rawDx) >= Math.abs(rawDy) ? 'h' : 'v';
      }
      if (axisLockAxis === 'h') rawDy = 0;
      else if (axisLockAxis === 'v') rawDx = 0;
    }

    const dragFrameSet = new Set(multiFrameDragStartPositions.keys());
    const dragTextSet = multiTextDragStartPositions ? new Set(multiTextDragStartPositions.keys()) : new Set();
    const { dx, dy } = applyMoveSnap(rawDx, rawDy, dragFrameSet, dragTextSet, multiFrameDragStartPositions, multiTextDragStartPositions);
    applyDragPositions(dx, dy, multiFrameDragStartPositions, multiTextDragStartPositions);
  }

  if (duplicating) {
    const dx = e.clientX - dupDragStartX;
    const dy = e.clientY - dupDragStartY;

    if (dupCloneIndices.length === 0 && dupTextBoxCloneIds.length === 0 && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) {
      saveState(); 
      dupCloneToStartPos.clear();
      
      dupStartPositions.forEach((pos, srcIdx) => {
         const cloneIdx = duplicateCell(srcIdx, pos.x, pos.y);
         if (cloneIdx >= 0) {
            dupCloneIndices.push(cloneIdx);
            dupCloneToStartPos.set(cloneIdx, pos);
            cells[srcIdx].el.style.opacity = '0.4'; 
         }
      });

      dupTextBoxCloneStartPos.clear();
      dupTextBoxSources.forEach(srcId => {
        const src = getTextBoxById(srcId);
        if (!src) return;
        const clone = cloneTextBox(src);
        dupTextBoxCloneIds.push(clone.id);
        dupTextBoxCloneStartPos.set(clone.id, { x: src.x, y: src.y });
        src.el.style.opacity = '0.4'; 
      });
      
      deselectAll();
      const state = templateStates[activeTemplateIndex];
      dupCloneIndices.forEach(cloneIdx => {
         state.selectedIndices.add(cloneIdx);
         cells[cloneIdx].el.classList.add('selected', 'dragging');
         cells[cloneIdx].controlsEl.classList.add('visible');
      });
      selectedIndices = state.selectedIndices;
      dupTextBoxCloneIds.forEach(cloneId => {
        selectTextBox(cloneId);
      });
      updateLabel();
      syncFormatUIToSelection();
    }

    if (dupCloneIndices.length > 0 || dupTextBoxCloneIds.length > 0) {
      const dragFrameSet = new Set(dupCloneIndices);
      const dragTextSet = new Set(dupTextBoxCloneIds);
      const { dx: snapDx, dy: snapDy } = applyMoveSnap(dx, dy, dragFrameSet, dragTextSet, dupCloneToStartPos, dupTextBoxCloneStartPos);
      applyDragPositions(snapDx, snapDy, dupCloneToStartPos.size > 0 ? dupCloneToStartPos : null, dupTextBoxCloneStartPos.size > 0 ? dupTextBoxCloneStartPos : null);
    }
  }

  if (frameStretching && frameStretchStartStates) {
    if (!hasSavedForThisDrag) { saveState(); hasSavedForThisDrag = true; }
    const rawDx = e.clientX - frameStretchStartX;
    const rawDy = e.clientY - frameStretchStartY;
    const side = frameStretchSide;

    const shiftConstrain = e.shiftKey;
    const altConstrain = e.altKey && !e.shiftKey; 
    const excludeFrames = new Set(frameStretchStartStates.keys());
    const excludeText = frameStretchStartTextStates ? new Set(frameStretchStartTextStates.keys()) : new Set();
    const { dx, dy } = applyStretchMoveSnap(rawDx, rawDy, side, frameStretchStartStates, frameStretchStartTextStates, excludeFrames, excludeText, shiftConstrain, altConstrain);

    frameStretchStartStates.forEach((start, idx) => {
      const s = cells[idx];
      if (!s) return;
      const cfg = s.cfg;

      let newX = start.x, newY = start.y, newW = start.w, newH = start.h;

      if (side === 'r') { newW = start.w + dx; }
      else if (side === 'l') { newW = start.w - dx; newX = start.x + dx; }
      else if (side === 'b') { newH = start.h + dy; }
      else if (side === 't') { newH = start.h - dy; newY = start.y + dy; }
      else if (side === 'br') { newW = start.w + dx; newH = start.h + dy; }
      else if (side === 'bl') { newW = start.w - dx; newH = start.h + dy; newX = start.x + dx; }
      else if (side === 'tr') { newW = start.w + dx; newH = start.h - dy; newY = start.y + dy; }
      else if (side === 'tl') { newW = start.w - dx; newH = start.h - dy; newX = start.x + dx; newY = start.y + dy; }

      if (newW < 30) { newW = 30; if (side.includes('l')) newX = start.x + start.w - 30; }
      if (newH < 30) { newH = 30; if (side.includes('t')) newY = start.y + start.h - 30; }

      const softSnap = !shiftConstrain && !altConstrain &&
        (Math.abs(newW - newH) < ALIGNMENT_STRETCH_TO_SQUARE_CLICK_PIXELS && newW >= 30 && newH >= 30);

      if (shiftConstrain) {
        if (side === 'l' || side === 'r') {
          newH = newW;
        } else if (side === 't' || side === 'b') {
          newW = newH;
        } else {
          const target = Math.max(newW, newH);
          if (newW < target) {
            const diff = target - newW;
            newW = target;
            if (side.includes('l')) newX -= diff;
          }
          if (newH < target) {
            const diff = target - newH;
            newH = target;
            if (side.includes('t')) newY -= diff;
          }
        }
      } else if (altConstrain) {
        const aspect = start.w / start.h;
        if (side === 'l' || side === 'r') {
          newH = newW / aspect;
        } else if (side === 't' || side === 'b') {
          newW = newH * aspect;
        } else {
          const ratioW = newW / start.w;
          const ratioH = newH / start.h;
          const ratio = Math.max(ratioW, ratioH);
          const prevW = newW, prevH = newH;
          newW = start.w * ratio;
          newH = start.h * ratio;
          if (side.includes('l')) newX -= (newW - prevW);
          if (side.includes('t')) newY -= (newH - prevH);
        }
      } else if (softSnap) {
        if (side === 'l' || side === 'r') {
          const diff = newH - newW;
          newW = newH;
          if (side === 'l') newX -= diff;
        } else if (side === 't' || side === 'b') {
          const diff = newW - newH;
          newH = newW;
          if (side === 't') newY -= diff;
        } else {
          const target = Math.max(newW, newH);
          if (newW < target) {
            const diff = target - newW;
            newW = target;
            if (side.includes('l')) newX -= diff;
          }
          if (newH < target) {
            const diff = target - newH;
            newH = target;
            if (side.includes('t')) newY -= diff;
          }
        }
      }

      newX = Math.max(0, newX);
      newY = Math.max(0, newY);
      if (newX + newW > CANVAS_W) newW = CANVAS_W - newX;
      if (newY + newH > CANVAS_H) newH = CANVAS_H - newY;

      cfg.x = newX; cfg.y = newY; cfg.w = newW; cfg.h = newH;
      s.el.style.left = cfg.x + 'px';
      s.el.style.top = cfg.y + 'px';
      s.el.style.width = cfg.w + 'px';
      s.el.style.height = cfg.h + 'px';

      updateFrameShape(s);
      syncFrameControls(s);

      if (s.loaded) {
        const scaleRatioW = newW / start.w;
        const scaleRatioH = newH / start.h;
        const ratio = Math.max(scaleRatioW, scaleRatioH);
        s.scale = start.scale * ratio;
        s.posX = start.posX * scaleRatioW;
        s.posY = start.posY * scaleRatioH;
        applyTransform(idx);
      }
    });

    if (frameStretchStartTextStates) {
      frameStretchStartTextStates.forEach((start, tbId) => {
        const tb = getTextBoxById(tbId);
        if (!tb) return;

        if (side === 'l' || side === 'r' || side === 'tl' || side === 'tr' || side === 'bl' || side === 'br') {
          const widthDelta = (side.includes('r') ? dx : -dx);
          const newW = Math.max(20, start.width + widthDelta);
          tb.width = newW;
          tb.contentEl.style.width = newW + 'px';
          if (side.includes('l')) {
            tb.x = start.x - (newW - start.width);
            tb.el.style.left = tb.x + 'px';
          }
        }
      });
    }

    updateLabel();
  }

  if (bgDragging) {
    if (!hasSavedForThisDrag) { saveState(); hasSavedForThisDrag = true; }
    const state = templateStates[activeTemplateIndex];
    state.bgPosX = bgDragStartPosX + (e.clientX - bgDragStartX);
    state.bgPosY = bgDragStartPosY + (e.clientY - bgDragStartY);
    applyBgTransform(state);
  }

  if (marqueeActive && marqueeEl) {
    const rect = canvasArea.getBoundingClientRect();
    const curX = e.clientX - rect.left;
    const curY = e.clientY - rect.top;
    const left = Math.max(0, Math.min(marqueeStartX, curX));
    const top = Math.max(0, Math.min(marqueeStartY, curY));
    const right = Math.min(CANVAS_W, Math.max(marqueeStartX, curX));
    const bottom = Math.min(CANVAS_H, Math.max(marqueeStartY, curY));
    marqueeEl.style.left = left + 'px';
    marqueeEl.style.top = top + 'px';
    marqueeEl.style.width = (right - left) + 'px';
    marqueeEl.style.height = (bottom - top) + 'px';
  }
});

window.addEventListener('mouseup', (e) => {
  hideGuides();
  hasSavedForThisDrag = false; 

  if (swapping && swapSourceIdx >= 0) {
    if (swapTargetIdx >= 0 && swapTargetIdx !== swapSourceIdx) {
      performSwap(swapSourceIdx, swapTargetIdx);
    }
    cells.forEach(c => c.el.classList.remove('swap-source', 'swap-target', 'swapping'));
    swapping = false;
    swapSourceIdx = -1;
    swapTargetIdx = -1;
  }

  if (dragging && dragCellIdx >= 0) {
    selectedIndices.forEach(idx => { if (cells[idx]) cells[idx].el.classList.remove('dragging'); });
  }
  dragging = false; dragCellIdx = -1;
  multiDragStartPositions = null;

  if (frameDragging && frameDragIdx >= 0) {
    selectedIndices.forEach(idx => { if (cells[idx]) cells[idx].el.classList.remove('dragging'); });
  }
  frameDragging = false; frameDragIdx = -1;
  multiFrameDragStartPositions = null;
  axisLockActive = false; axisLockAxis = null;

  if (duplicating) {
    if (dupCloneIndices.length > 0 || dupTextBoxCloneIds.length > 0) {
      dupStartPositions.forEach((_, srcIdx) => {
         if (cells[srcIdx]) {
            cells[srcIdx].el.style.opacity = '';
            cells[srcIdx].el.classList.remove('dragging');
         }
      });
      dupCloneIndices.forEach(cloneIdx => {
         if (cells[cloneIdx]) {
            cells[cloneIdx].el.classList.remove('dragging');
         }
      });
      dupTextBoxSources.forEach(srcId => {
        const src = getTextBoxById(srcId);
        if (src) src.el.style.opacity = '';
      });
    } else {
      if (dupSourceIdx >= 0) {
        const state = templateStates[activeTemplateIndex];
        if (selectedIndices.has(dupSourceIdx)) {
          selectedIndices.delete(dupSourceIdx);
          if (cells[dupSourceIdx]) {
            cells[dupSourceIdx].el.classList.remove('selected');
            cells[dupSourceIdx].controlsEl.classList.remove('visible');
          }
        } else {
          selectedIndices.add(dupSourceIdx);
          if (cells[dupSourceIdx]) {
            cells[dupSourceIdx].el.classList.add('selected');
            cells[dupSourceIdx].controlsEl.classList.add('visible');
          }
        }
        updateLabel();
        syncFormatUIToSelection();
      }
    }
    duplicating = false;
    dupSourceIdx = -1;
    dupCloneIndices = [];
    dupStartPositions.clear();
    dupCloneToStartPos.clear();
    dupTextBoxSources = [];
    dupTextBoxCloneIds = [];
    dupTextBoxCloneStartPos.clear();
  }

  if (bgDragging) canvasArea.classList.remove('bg-dragging');
  bgDragging = false;
  resizing = false; resizeCellIdx = -1;

  if (frameStretching) {
    frameStretching = false;
    frameStretchSide = '';
    frameStretchStartStates = null;
    frameStretchStartTextStates = null;
  }

  if (marqueeActive && marqueeEl) {
    const mLeft = parseFloat(marqueeEl.style.left) || 0;
    const mTop = parseFloat(marqueeEl.style.top) || 0;
    const mW = parseFloat(marqueeEl.style.width) || 0;
    const mH = parseFloat(marqueeEl.style.height) || 0;
    const mRight = mLeft + mW;
    const mBottom = mTop + mH;

    marqueeEl.remove();
    marqueeEl = null;
    marqueeActive = false;

    if (mW > 4 || mH > 4) {
      const state = templateStates[activeTemplateIndex];

      // Generic AABB partial-overlap test: two rects overlap if they are not
      // fully disjoint along either axis.
      const rectsOverlap = (aL, aT, aR, aB, bL, bT, bR, bB) =>
        !(aR < bL || aL > bR || aB < bT || aT > bB);

      // For shaped frames, we want a hit only when part of the actual SVG
      // shape (not its bounding rectangle) is inside the marquee. We do this
      // by sampling a grid of points inside the intersection of the marquee
      // and the frame's bbox, converting to the frame's local SVG-path
      // coordinate space, and testing each point with isPointInFill on the
      // shape's path element.
      const shapeIntersectsMarquee = (cellState, cfg, mL, mT, mR, mB) => {
        // Intersection of marquee with frame bbox (in canvas coords).
        const iL = Math.max(mL, cfg.x);
        const iT = Math.max(mT, cfg.y);
        const iR = Math.min(mR, cfg.x + cfg.w);
        const iB = Math.min(mB, cfg.y + cfg.h);
        if (iR <= iL || iB <= iT) return false; // bboxes disjoint

        const pathEl = cellState.el.querySelector('.shape-outline svg .outline-path');
        if (!pathEl || typeof pathEl.isPointInFill !== 'function') {
          // Fallback: if we can't test the path, treat bbox overlap as a hit.
          return true;
        }

        // The SVG's viewBox is "0 0 cfg.w cfg.h", so a canvas point (cx, cy)
        // maps to local path coords (cx - cfg.x, cy - cfg.y).
        const svgEl = pathEl.ownerSVGElement;
        const pt = svgEl && svgEl.createSVGPoint ? svgEl.createSVGPoint() : null;

        // Sample density — fine enough to reliably catch edges on the shapes
        // we support (circle, rounded square, hexagon) even for thin slivers.
        const STEPS = 12;
        for (let iy = 0; iy <= STEPS; iy++) {
          const cy = iT + ((iB - iT) * iy) / STEPS;
          const ly = cy - cfg.y;
          for (let ix = 0; ix <= STEPS; ix++) {
            const cx = iL + ((iR - iL) * ix) / STEPS;
            const lx = cx - cfg.x;
            if (pt) {
              pt.x = lx;
              pt.y = ly;
              if (pathEl.isPointInFill(pt)) return true;
            } else {
              // Older engines: isPointInFill accepts a DOMPoint-like or
              // nothing; skip if unsupported.
              try {
                if (pathEl.isPointInFill({ x: lx, y: ly })) return true;
              } catch (_) { return true; }
            }
          }
        }
        return false;
      };

      const hitIndices = [];
      cells.forEach((s, idx) => {
        const cfg = s.cfg;
        const cL = cfg.x, cT = cfg.y, cR = cfg.x + cfg.w, cB = cfg.y + cfg.h;
        // Quick AABB reject first.
        if (!rectsOverlap(cL, cT, cR, cB, mLeft, mTop, mRight, mBottom)) return;

        const isShaped = !!getScaledPath(cfg);
        if (!isShaped) {
          hitIndices.push(idx);
        } else if (shapeIntersectsMarquee(s, cfg, mLeft, mTop, mRight, mBottom)) {
          hitIndices.push(idx);
        }
      });

      const hitTextBoxes = [];
      if (state.textBoxes) {
        state.textBoxes.forEach(tb => {
          const tbW = tb.width || tb.contentEl.offsetWidth;
          const tbH = tb.contentEl.offsetHeight;
          if (rectsOverlap(tb.x, tb.y, tb.x + tbW, tb.y + tbH,
                           mLeft, mTop, mRight, mBottom)) {
            hitTextBoxes.push(tb.id);
          }
        });
      }

      if (hitIndices.length > 0 || hitTextBoxes.length > 0) {
        if (hitIndices.length > 0) selectMultiple(state, hitIndices);
        hitTextBoxes.forEach(id => selectTextBox(id));
      } else {
        deselectAll();
      }
    }
  }

  if (textBoxDragging) {
    textBoxDragging = false;
    textBoxDragId = null;
    multiTextDragStartPositions = null;
    multiFrameDragStartPositions = null; 
  }
  if (textBoxResizing) {
    textBoxResizing = false;
    textBoxResizeId = null;
  }

  // Ctrl+Click on text box without dragging: toggle multi-select.
  // (textBoxDupPending is set on Ctrl+mousedown and cleared on drag
  // threshold in mousemove. If we reach mouseup with it still true,
  // the user clicked without dragging → toggle selection.)
  if (textBoxDupPending && textBoxDupSourceId) {
    const tbId = textBoxDupSourceId;
    if (selectedTextBoxIds.has(tbId)) {
      deselectTextBox(tbId);
    } else {
      selectTextBox(tbId);
    }
    textBoxDupPending = false;
    textBoxDupSourceId = null;
    textBoxDupCloneId = null;
  }
});

const bulkUploadBtn = document.getElementById('bulkUploadBtn');
const bulkFileInput = document.getElementById('bulkFileInput');

// Returns indices of selected frames that have no image, sorted in
// left-to-right, top-to-bottom reading order.
function getSelectedEmptyFrameIndices() {
  const indices = [];
  selectedIndices.forEach(idx => {
    const s = cells[idx];
    if (s && !s.loaded) indices.push(idx);
  });
  // Sort: primary by Y (top-to-bottom), secondary by X (left-to-right).
  indices.sort((a, b) => {
    const dy = cells[a].cfg.y - cells[b].cfg.y;
    return dy !== 0 ? dy : cells[a].cfg.x - cells[b].cfg.x;
  });
  return indices;
}

// Track whether the current bulk-upload interaction is selection-aware.
let bulkUploadTargetIndices = null; // null = old behaviour; array = targeted

bulkUploadBtn.addEventListener('click', () => {
  const emptySelected = getSelectedEmptyFrameIndices();
  if (emptySelected.length > 0) {
    bulkUploadTargetIndices = emptySelected;
  } else {
    bulkUploadTargetIndices = null; // fall back to legacy fill-all-empty
  }
  bulkFileInput.click();
});

bulkFileInput.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  saveState();

  const state = templateStates[activeTemplateIndex];

  // Build a list of (file, cellState, cellIndex) assignments first,
  // then process all files in parallel before applying to cells.
  const assignments = [];

  if (bulkUploadTargetIndices && bulkUploadTargetIndices.length > 0) {
    const limit = Math.min(files.length, bulkUploadTargetIndices.length);
    for (let j = 0; j < limit; j++) {
      const idx = bulkUploadTargetIndices[j];
      assignments.push({ file: files[j], cellState: cells[idx], cellIdx: idx });
    }
  } else {
    let fileIdx = 0;
    // Pass 1: empty frames.
    for (let i = 0; i < cells.length && fileIdx < files.length; i++) {
      if (!cells[i].loaded) {
        assignments.push({ file: files[fileIdx], cellState: cells[i], cellIdx: i });
        fileIdx++;
      }
    }
    // Pass 2: overwrite loaded frames.
    if (fileIdx < files.length) {
      for (let i = 0; i < cells.length && fileIdx < files.length; i++) {
        if (cells[i].loaded) {
          assignments.push({ file: files[fileIdx], cellState: cells[i], cellIdx: i });
          fileIdx++;
        }
      }
    }
  }

  // Process ALL images in parallel — the heavy decode + canvas work runs
  // concurrently via createImageBitmap (off-main-thread) + overlapping
  // toBlob calls.
  const results = await Promise.all(
    assignments.map(a => processImageFile(a.file))
  );

  // Apply results to cells synchronously (fast — just setting properties).
  assignments.forEach((a, j) => {
    const info = results[j];
    const cs = a.cellState;
    cs.originalSrc = info.originalUrl;
    cs.displayScale = info.needsDownscale ? info.displayW / info.originalW : 1;
    cs.naturalW = info.displayW;
    cs.naturalH = info.displayH;
    cs.loaded = true;
    calculateDefaultTransform(cs);
    cs.el.classList.add('has-image');
    cs.img.src = info.displaySrc;
    applyTransformFor(state, a.cellIdx);
  });

  bulkUploadTargetIndices = null;
  e.target.value = '';
});

  bgDragStartY = e.clientY;
