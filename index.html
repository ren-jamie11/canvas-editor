<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas Frame Editor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:ital,wght@0,400;0,700;1,400;1,700&family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=Oswald:wght@400;700&family=Raleway:ital,wght@0,400;0,700;1,400;1,700&family=Merriweather:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:ital,wght@0,400;0,700;1,400;1,700&family=Bebas+Neue&family=Abril+Fatface&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400;1,700&family=Roboto+Slab:wght@400;700&family=Dancing+Script:wght@400;700&family=Bitter:ital,wght@0,400;0,700;1,400;1,700&family=Nunito:ital,wght@0,400;0,700;1,400;1,700&family=Crimson+Text:ital,wght@0,400;0,700;1,400;1,700&family=Archivo+Black&family=Source+Serif+4:ital,wght@0,400;0,700;1,400;1,700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0c0c0f;
    color: #e0ddd8;
    min-height: 100vh;
    display: flex;
    flex-direction: row;
    padding: 0;
    padding-right: 220px; /* Reserve space for the fixed right sidebar */
    gap: 0;
  }

  /* ---- Side tab bar ---- */
  .sidebar {
    width: 200px;
    min-width: 200px;
    background: #111114;
    border-right: 1px solid #1e1e24;
    display: flex;
    flex-direction: column;
    padding: 20px 0;
    gap: 4px;
    min-height: 100vh;
    overflow-y: auto;
  }

  .sidebar-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #444;
    padding: 0 16px 12px;
  }

  .tab-btn {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 16px;
    border: none;
    background: transparent;
    color: #777;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, color 0.15s;
    border-left: 3px solid transparent;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .tab-btn:hover {
    background: #18181c;
    color: #aaa;
  }

  .tab-btn.active {
    background: #1a1a20;
    color: #e0ddd8;
    border-left-color: #5a5aff;
  }

  .tab-btn .tab-meta {
    font-size: 10px;
    color: #444;
    font-weight: 400;
  }

  .tab-btn.active .tab-meta {
    color: #555;
  }

  /* ---- Save/Open buttons in sidebar ---- */
  .sidebar-section-divider {
    height: 1px;
    background: #1e1e24;
    margin: 14px 0 10px;
  }

  .file-btn {
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 8px 16px;
    border: none;
    background: transparent;
    color: #888;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, color 0.15s;
    border-left: 3px solid transparent;
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .file-btn:hover {
    background: #18181c;
    color: #ccc;
  }
  .file-btn:disabled {
    color: #444;
    cursor: not-allowed;
    background: transparent;
  }
  .file-btn svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  /* Unsaved-changes confirmation modal */
  .confirm-modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10000;
  }
  .confirm-modal-backdrop.open { display: flex; }
  .confirm-modal {
    background: #17171c;
    border: 1px solid #2a2a32;
    border-radius: 6px;
    padding: 20px 24px;
    width: 380px;
    max-width: 90vw;
    color: #e0ddd8;
    font-family: inherit;
  }
  .confirm-modal h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .confirm-modal p {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 18px;
    line-height: 1.5;
  }
  .confirm-modal .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .confirm-modal button {
    font-family: inherit;
    font-size: 12px;
    padding: 8px 14px;
    border: 1px solid #2a2a32;
    background: #1e1e24;
    color: #e0ddd8;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .confirm-modal button:hover { background: #26262e; }
  .confirm-modal button.primary {
    background: #5a5aff;
    border-color: #5a5aff;
  }
  .confirm-modal button.primary:hover { background: #4949dd; }
  .confirm-modal button.danger {
    color: #ff7a7a;
  }

  /* ---- Top tab bar (VS Code / browser style) ---------------------------- */
  .canvas-tabs-bar {
    display: flex;
    align-items: stretch;
    background: #0a0a0d;
    border-bottom: 1px solid #1e1e24;
    padding: 0;
    margin: 0 0 12px 0;
    min-height: 34px;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: thin;
  }
  .canvas-tabs-bar::-webkit-scrollbar { height: 4px; }
  .canvas-tabs-bar::-webkit-scrollbar-thumb { background: #2a2a32; }

  .canvas-tab {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0 10px 0 14px;
    min-width: 110px;
    max-width: 240px;
    height: 34px;
    background: transparent;
    color: #777;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    border: none;
    border-right: 1px solid #1e1e24;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: background 0.12s, color 0.12s;
    user-select: none;
  }
  .canvas-tab:hover { background: #15151a; color: #bbb; }
  .canvas-tab.active {
    background: #1a1a20;
    color: #e0ddd8;
    box-shadow: inset 0 2px 0 0 #5a5aff;
  }
  .canvas-tab .tab-name {
    flex: 1 1 auto;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .canvas-tab .tab-name-input {
    flex: 1 1 auto;
    min-width: 60px;
    background: #0a0a0d;
    border: 1px solid #5a5aff;
    border-radius: 2px;
    color: #e0ddd8;
    font: inherit;
    padding: 1px 4px;
    outline: none;
  }
  .canvas-tab .tab-dirty-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #e0ddd8;
    display: none;
    flex-shrink: 0;
  }
  .canvas-tab.dirty .tab-dirty-dot { display: block; }
  /* Hide the X when dirty-dot is showing, and vice versa — like VS Code. */
  .canvas-tab.dirty:not(:hover) .tab-close { display: none; }
  .canvas-tab:hover .tab-dirty-dot { display: none; }

  .canvas-tab .tab-close {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #777;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.12s, color 0.12s;
  }
  .canvas-tab .tab-close:hover { background: #2a2a32; color: #e0ddd8; }
  .canvas-tab .tab-close svg { width: 10px; height: 10px; }

  .canvas-tab-add {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    background: transparent;
    color: #666;
    border: none;
    border-right: 1px solid #1e1e24;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.12s, color 0.12s;
  }
  .canvas-tab-add:hover { background: #15151a; color: #e0ddd8; }
  .canvas-tab-add svg { width: 14px; height: 14px; }

  /* ---- Main content ---- */
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 20px 28px;
    gap: 16px;
    overflow-y: auto;
    min-height: 100vh;
  }

  .canvas-tabs-bar {
    /* Break out of the main-content's center alignment and horizontal
       padding so the bar runs edge-to-edge along the top, like browser
       tabs. The negative margins cancel the parent's 20px side padding. */
    align-self: stretch;
    margin: 0 -20px 12px;
  }

  h1 {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
  }

  .top-bar {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  .top-bar button {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid #2a2a30;
    background: #18181c;
    color: #ccc;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }

  .top-bar button:hover {
    background: #222228;
    border-color: #444;
  }

  .zoom-display {
    font-size: 13px;
    color: #555;
    min-width: 50px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .selected-label {
    font-size: 12px;
    color: #666;
  }

  /* ---- Viewport toggle (Desktop/Mobile) ----
     Anchored below the tab bar in the main-content area. The tab bar
     spans the full top (34px tall + 12px margin), so the toggle sits
     at ~52px from the viewport top. */
  .viewport-toggle {
    position: fixed;
    top: 56px;
    left: 220px; /* sidebar width (200) + 20px gap */
    display: inline-flex;
    background: #111114;
    border: 1px solid #2a2a30;
    border-radius: 8px;
    padding: 3px;
    gap: 2px;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .viewport-toggle button {
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
    padding: 6px 14px;
    border: none;
    background: transparent;
    color: #888;
    cursor: pointer;
    border-radius: 5px;
    transition: background 0.15s, color 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .viewport-toggle button:hover {
    color: #ccc;
  }
  .viewport-toggle button.active {
    background: #5a5aff;
    color: #fff;
  }
  .viewport-toggle button svg {
    width: 13px;
    height: 13px;
  }
  .viewport-toggle.hidden { display: none; }

  /* ---- Canvas container ---- */
  .canvas-area {
    position: relative;
    border: 2px solid #1e1e24;
    border-radius: 6px;
    overflow: hidden;
  }

  /* ---- Cell: absolutely positioned frame ---- */
  .cell {
    position: absolute;
    background: transparent;
    overflow: hidden;
    cursor: default;
    transition: filter 0.15s, background 0.15s;
  }

  .cell.has-image { background: #141417; }

  /* Empty-frame placeholder tint — subtle wash of the accent color so frames
     read clearly on any canvas background (especially pure white). Hidden as
     soon as an image is loaded or the user applies their own border. */
  .cell:not(.has-image):not(.has-user-border) {
    background: rgba(90, 90, 255, 0.05);
  }

  /* OVERLAYS: Used to draw inner borders smoothly around frames based on states */
  
  /* 1. Base overlay for ALL rectangular cells */
  .cell:not(.shaped)::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 0px solid transparent;
    pointer-events: none;
    z-index: 5;
    transition: border-color 0.15s, border-width 0.15s;
  }

  /* 2. Empty rectangular cell (no image, no user-applied border) gets a
        conspicuous dashed accent border so it's visible against white. */
  .cell:not(.shaped):not(.has-image):not(.has-user-border)::after {
    border: var(--placeholder-border-width) dashed var(--placeholder-border-color);
  }

  /* 2b. Fallback for any image-less cell that *does* have a user border —
         keep the old subtle outline as a faint inset guide underneath. */
  .cell:not(.shaped):not(.has-image).has-user-border::after {
    border: var(--frame-border-width) solid var(--frame-border-color);
  }

  /* 3. Selected rectangular cell gets selection border */
  .cell:not(.shaped).selected::after {
    border: var(--selection-border-width) solid var(--selection-border-color);
  }

  /* 4. Swapping rectangular cell gets swap border */
  .cell:not(.shaped).swap-source::after,
  .cell:not(.shaped).swap-target::after {
    border: var(--selection-border-width) solid #20c997;
  }

  .cell.swap-source {
    filter: brightness(0.7);
    z-index: 5;
  }

  .cell.swap-target {
    background: rgba(32, 201, 151, 0.15) !important;
  }

  .cell { cursor: grab; }
  .cell.dragging { cursor: grabbing; }
  .cell.swapping { cursor: grabbing; }

  .cell-upload {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: grab;
    pointer-events: none;
    z-index: 2;
    transition: background 0.15s;
  }

  .cell-upload:hover { background: rgba(90, 90, 255, 0.08); }
  .cell-upload svg {
    color: var(--placeholder-border-color);
    opacity: 0.55;
    transition: opacity 0.15s, transform 0.15s;
  }
  .cell-upload:hover svg { opacity: 0.9; transform: scale(1.05); }
  .cell-upload span {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--placeholder-border-color);
    opacity: 0.75;
    transition: opacity 0.15s;
  }
  .cell-upload:hover span { opacity: 1; }
  /* Upload glyph is an "empty slot" affordance — show it whenever the frame
     has no image, regardless of whether the user has applied a border. */
  .cell.has-image .cell-upload { display: none; }

  .cell input[type="file"] { display: none; }

  .cell img {
    position: absolute;
    display: block;
    left: 0;
    top: 0;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
    will-change: width, height, left, top;
  }

  /* User-applied border (rectangular frames) */
  .cell-user-border {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 6;
    border: none;
  }

  /* User-applied border (shaped frames — SVG overlay) */
  .cell-user-border-svg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 6;
  }
  .cell-user-border-svg svg {
    width: 100%;
    height: 100%;
  }
  .cell-user-border-svg .user-border-path {
    fill: none;
    stroke: transparent;
    stroke-width: 0;
  }

  /* Frame stretch controls overlay (sibling of .cell, not clipped) */
  .frame-controls {
    position: absolute;
    pointer-events: none;
    z-index: 8;
    display: none;
  }
  .frame-controls.visible { display: block; }

  .frame-controls .frame-border {
    position: absolute;
    inset: -4px;
    border: 1.5px solid rgba(90, 90, 255, 0.7);
    border-radius: 2px;
    pointer-events: none;
  }

  .frame-controls .frame-stretch-handle {
    position: absolute;
    background: #5a5aff;
    border-radius: 2px;
    z-index: 11;
    pointer-events: auto;
  }

  /* Edge midpoint handles — rectangular bars */
  .frame-controls .fsh-l  { left: -5px;   top: 50%;    width: 6px; height: 28px; transform: translateY(-50%); cursor: ew-resize; }
  .frame-controls .fsh-r  { right: -5px;  top: 50%;    width: 6px; height: 28px; transform: translateY(-50%); cursor: ew-resize; }
  .frame-controls .fsh-t  { top: -5px;    left: 50%;   width: 28px; height: 6px; transform: translateX(-50%); cursor: ns-resize; }
  .frame-controls .fsh-b  { bottom: -5px; left: 50%;   width: 28px; height: 6px; transform: translateX(-50%); cursor: ns-resize; }
  /* Corner handles — larger squares */
  .frame-controls .fsh-tl { top: -6px;    left: -6px;  width: 10px; height: 10px; cursor: nw-resize; }
  .frame-controls .fsh-tr { top: -6px;    right: -6px; width: 10px; height: 10px; cursor: ne-resize; }
  .frame-controls .fsh-bl { bottom: -6px; left: -6px;  width: 10px; height: 10px; cursor: sw-resize; }
  .frame-controls .fsh-br { bottom: -6px; right: -6px; width: 10px; height: 10px; cursor: se-resize; }

  .shape-outline {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
  }

  .shape-outline svg {
    width: 100%;
    height: 100%;
  }

  .shape-outline svg .outline-path {
    fill: none;
    stroke: var(--frame-border-color);
    stroke-width: calc(var(--frame-border-width-num) * 2);
    transition: stroke 0.15s, stroke-width 0.15s;
  }

  /* Empty shaped cell (no image, no user-applied border) — match the
     rectangular placeholder treatment: conspicuous dashed accent stroke. */
  .cell.shaped:not(.has-image):not(.has-user-border) .shape-outline svg .outline-path {
    stroke: var(--placeholder-border-color);
    stroke-width: var(--placeholder-border-width-num);
    stroke-dasharray: 8 5;
  }

  /* Shape selection states logic */
  .cell.has-image .shape-outline { display: none; }
  
  .cell.has-image.selected .shape-outline,
  .cell.has-image.swap-source .shape-outline,
  .cell.has-image.swap-target .shape-outline {
    display: block;
  }

  .cell.shaped.selected .shape-outline svg .outline-path {
    stroke: var(--selection-border-color);
    stroke-width: calc(var(--selection-border-width-num) * 2);
  }

  .cell.shaped.swap-source .shape-outline svg .outline-path,
  .cell.shaped.swap-target .shape-outline svg .outline-path {
    stroke: #20c997;
    stroke-width: calc(var(--selection-border-width-num) * 2);
  }

  .cell-label {
    display: none;
  }

  .hint {
    font-size: 11px;
    color: #555;
    text-align: center;
    max-width: 500px;
    line-height: 1.6;
  }

  .hint b { color: #888; }

  .download-btn {
    margin-top: 6px;
    padding: 12px 28px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    color: #0c0c0f;
    background: #20c997;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 4px 12px rgba(32, 201, 151, 0.15);
  }

  .download-btn:hover { background: #1eb588; }
  .download-btn:active { transform: scale(0.97); }
  .download-btn:disabled { background: #444; color: #888; cursor: not-allowed; box-shadow: none; }

  /* ---- Lock BG toggle ---- */
  .lock-toggle {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    user-select: none;
    font-size: 12px;
    color: #777;
  }

  .lock-toggle input { display: none; }

  .lock-toggle-slider {
    position: relative;
    width: 32px;
    height: 18px;
    background: #2a2a30;
    border-radius: 9px;
    transition: background 0.2s;
  }

  .lock-toggle-slider::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    background: #666;
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }

  .lock-toggle input:checked + .lock-toggle-slider {
    background: #3a3a6a;
  }

  .lock-toggle input:checked + .lock-toggle-slider::after {
    transform: translateX(14px);
    background: #7a7aff;
  }

  .lock-toggle-text {
    font-weight: 500;
  }

  /* ---- Background image element inside canvas ---- */
  .canvas-bg-img {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: 0 0;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
    z-index: 0;
  }

  .canvas-area.bg-unlocked {
    cursor: grab;
  }

  .canvas-area.bg-unlocked.bg-dragging {
    cursor: grabbing;
  }

  .canvas-area.bg-unlocked::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 2px solid rgba(90, 90, 255, 0.4);
    border-radius: 4px;
    pointer-events: none;
    z-index: 100;
  }

  /* Ensure cells sit above bg image */
  .cell {
    z-index: 1;
  }

  /* ---- Marquee selection box ---- */
  .marquee-box {
    position: absolute;
    border: 1.5px dashed rgba(90, 90, 255, 0.7);
    background: rgba(90, 90, 255, 0.08);
    pointer-events: none;
    z-index: 200;
  }

  /* ---- Right sidebar (tools panel) ---- */
  .right-sidebar {
    width: 220px;
    min-width: 220px;
    background: #111114;
    border-left: 1px solid #1e1e24;
    display: flex;
    flex-direction: column;
    padding: 0;
    /* Fixed to viewport — stays visible regardless of page scroll. */
    position: fixed;
    top: 0;
    right: 0;
    height: 100vh;
    overflow-y: auto;
    z-index: 1000;
  }

  .rs-section {
    padding: 14px 14px 10px;
    border-bottom: 1px solid #1e1e24;
  }

  .rs-section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #444;
    margin-bottom: 10px;
  }

  .rs-tool-btn {
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 9px 12px;
    border: 1px solid #2a2a30;
    border-radius: 5px;
    background: #18181c;
    color: #aaa;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }

  /* Equidistance indicator — pink dashed segment spanning one of the

  .equidistance-indicator {

  .equidistance-indicator.eq-v::before,

<script>

// ╔══════════════════════════════════════════════════════════════════════════╗
// ║                                                                        ║
// ║   UNDO / REDO ENGINE                                                   ║
// ║                                                                        ║
// ╚══════════════════════════════════════════════════════════════════════════╝

const UNDO_WAIT_SECONDS = 0.5;
const UNDO_CONSECUTIVE_FREQ_SECONDS = 0.1;
let undoTimer = null;
let redoTimer = null;
let hasSavedForThisDrag = false;

let scrollSessionTimer = null;
let isScrollingSession = false;

// ╔══════════════════════════════════════════════════════════════════════════╗
// ║   IMAGE OPTIMIZATION                                                     ║
// ║                                                                          ║
// ║   Dual-resolution strategy: on upload, large images are downscaled to   ║
// ║   a display-quality thumbnail (max DISPLAY_MAX_DIM px) for fast UI      ║
// ║   rendering. The original full-res blob URL is kept for high-quality    ║
// ║   export. This dramatically cuts GPU memory, compositing cost, and      ║
// ║   undo/redo overhead.                                                   ║
// ╚══════════════════════════════════════════════════════════════════════════╝

const DISPLAY_MAX_DIM = 2048;   // Max px on longest side for display image
const MAX_IMAGE_BYTES = 2 * 1024 * 1024; // 2 MB — resize if file exceeds this

/**
 * Unified image processing pipeline — replaces the former two-step
 * compressFileIfNeeded → createDisplayImage chain with a single pass that:
 *
 *   1. Decodes the file via createImageBitmap (off-main-thread, fast).
 *   2. Decides in one shot whether compression and/or display-downscaling
 *      are needed.
 *   3. Produces both the original blob URL (for export) and the display
 *      blob URL (for UI) in the minimum number of canvas draws + toBlob
 *      calls.
 *
 * Returns { originalUrl, displaySrc, displayW, displayH,
 *           originalW, originalH, needsDownscale }
 */
async function processImageFile(file) {
  // Use createImageBitmap for off-main-thread decode when available.
  const useIB = typeof createImageBitmap === 'function';

  // ── Step 1: decode the file ──────────────────────────────────────────
  let bitmap;            // ImageBitmap (fast path) or HTMLImageElement
  const rawUrl = URL.createObjectURL(file);

  if (useIB) {
    bitmap = await createImageBitmap(file);
  } else {
    bitmap = new Image();
    await new Promise((res, rej) => {
      bitmap.onload = res;
      bitmap.onerror = rej;
      bitmap.src = rawUrl;
    });
  }

  const ow = useIB ? bitmap.width : bitmap.naturalWidth;
  const oh = useIB ? bitmap.height : bitmap.naturalHeight;

  // ── Step 2: decide what work is needed ───────────────────────────────
  const needsCompress = file.size > MAX_IMAGE_BYTES;
  const maxDim = Math.max(ow, oh);
  const needsDisplayDownscale = maxDim > DISPLAY_MAX_DIM;

  // Fast path: small file, small dimensions → no processing at all.
  if (!needsCompress && !needsDisplayDownscale) {
    if (useIB) bitmap.close();
    return {
      originalUrl: rawUrl,
      displaySrc: rawUrl,
      displayW: ow,
      displayH: oh,
      originalW: ow,
      originalH: oh,
      needsDownscale: false,
    };
  }

  // ── Step 3a: build the DISPLAY image ─────────────────────────────────
  // If the image needs display-downscaling, create a canvas at display
  // resolution. Otherwise use original dimensions (we still need to
  // re-encode to compress).
  const displayRatio = needsDisplayDownscale ? DISPLAY_MAX_DIM / maxDim : 1;
  const dw = Math.round(ow * displayRatio);
  const dh = Math.round(oh * displayRatio);

  const displayCanvas = document.createElement('canvas');
  displayCanvas.width = dw;
  displayCanvas.height = dh;
  const dCtx = displayCanvas.getContext('2d');
  dCtx.drawImage(bitmap, 0, 0, dw, dh);

  const displayBlob = await new Promise(r =>
    displayCanvas.toBlob(r, 'image/jpeg', 0.92));
  const displayUrl = displayBlob
    ? URL.createObjectURL(displayBlob)
    : rawUrl;

  // ── Step 3b: build the ORIGINAL (compressed) blob URL ────────────────
  // If the raw file already fits under MAX_IMAGE_BYTES, keep it as-is.
  // Otherwise, re-encode at full resolution (or progressively smaller)
  // until it fits.
  let originalUrl = rawUrl;
  if (needsCompress) {
    let scale = 1;
    let quality = 0.85;
    const maxAttempts = 5;

    for (let i = 0; i < maxAttempts; i++) {
      const cw = Math.round(ow * scale);
      const ch = Math.round(oh * scale);
      const c = document.createElement('canvas');
      c.width = cw;
      c.height = ch;
      const ctx = c.getContext('2d');
      ctx.drawImage(bitmap, 0, 0, cw, ch);
      const blob = await new Promise(r =>
        c.toBlob(r, 'image/jpeg', quality));
      if (!blob) break;
      if (blob.size <= MAX_IMAGE_BYTES || i === maxAttempts - 1) {
        URL.revokeObjectURL(rawUrl);
        originalUrl = URL.createObjectURL(blob);
        break;
      }
      if (quality > 0.5) quality -= 0.15;
      else scale *= 0.75;
    }
  }

  if (useIB) bitmap.close();   // free GPU memory

  return {
    originalUrl,
    displaySrc: displayUrl,
    displayW: dw,
    displayH: dh,
    originalW: ow,
    originalH: oh,
    needsDownscale: needsDisplayDownscale,
  };
}

/* Legacy wrappers — kept so any remaining single-file call sites still work.
   They simply delegate to the unified pipeline. */
async function compressFileIfNeeded(file) {
  const r = await processImageFile(file);
  return r.originalUrl;
}
function createDisplayImage(originalImg, originalUrl) {
  const ow = originalImg.naturalWidth || originalImg.width;
  const oh = originalImg.naturalHeight || originalImg.height;
  const maxDim = Math.max(ow, oh);
  if (maxDim <= DISPLAY_MAX_DIM) {
    return Promise.resolve({
      displaySrc: originalUrl, displayW: ow, displayH: oh,
      originalW: ow, originalH: oh, needsDownscale: false,
    });
  }
  const ratio = DISPLAY_MAX_DIM / maxDim;
  const dw = Math.round(ow * ratio);
  const dh = Math.round(oh * ratio);
  const c = document.createElement('canvas');
  c.width = dw; c.height = dh;
  c.getContext('2d').drawImage(originalImg, 0, 0, dw, dh);
  return new Promise(resolve => {
    c.toBlob(blob => {
      if (!blob) {
        resolve({ displaySrc: originalUrl, displayW: ow, displayH: oh,
                  originalW: ow, originalH: oh, needsDownscale: false });
        return;
      }
      resolve({ displaySrc: URL.createObjectURL(blob), displayW: dw, displayH: dh,
                originalW: ow, originalH: oh, needsDownscale: true });
    }, 'image/jpeg', 0.92);
  });
}

function handleScrollStart() {
  if (!isScrollingSession) {
    saveState();
    isScrollingSession = true;
  }
  clearTimeout(scrollSessionTimer);
  scrollSessionTimer = setTimeout(() => {
    isScrollingSession = false;
  }, 400);
}

function captureState(state) {
  return {
    bg: {
      src: state.bgEl ? state.bgEl.src : '',
      scale: state.bgScale,
      posX: state.bgPosX,
      posY: state.bgPosY,
      loaded: state.bgLoaded,
      naturalW: state.bgNaturalW,
      naturalH: state.bgNaturalH
    },
    cells: state.cells.map(c => ({
      cfg: JSON.parse(JSON.stringify(c.cfg)),
      loaded: c.loaded,
      src: c.img.src,
      originalSrc: c.originalSrc || c.img.src,
      displayScale: c.displayScale || 1,
      scale: c.scale,
      posX: c.posX,
      posY: c.posY,
      naturalW: c.naturalW,
      naturalH: c.naturalH,
      borderEnabled: c.borderEnabled,
      borderColor: c.borderColor,
      borderWidth: c.borderWidth
    })),
    textBoxes: (state.textBoxes || []).map(tb => ({
      id: tb.id,
      x: tb.x,
      y: tb.y,
      width: tb.width,
      text: tb.text,
      fontFamily: tb.fontFamily,
      fontName: tb.fontName,
      fontSize: tb.fontSize,
      fontColor: tb.fontColor,
      bold: tb.bold,
      italic: tb.italic,
      underline: tb.underline,
      align: tb.align,
      // Sync tags — preserve through undo/redo
      _fromTemplate: !!tb._fromTemplate,
      _matchingIndex: (typeof tb._matchingIndex === 'number') ? tb._matchingIndex : null,
    }))
  };
}

function saveState() {
  if (activeTemplateIndex < 0) return;
  const state = templateStates[activeTemplateIndex];
  if (!state.undoStack) state.undoStack = [];
  if (!state.redoStack) state.redoStack = [];

  state.undoStack.push(captureState(state));
  if (state.undoStack.length > 50) state.undoStack.shift();
  state.redoStack = []; 
}

function applyState(idx, snapshot) {
  const state = templateStates[idx];
  const tmpl = TEMPLATES[idx];

  // 1. Clean up Background
  state.bgLoaded = snapshot.bg.loaded;
  state.bgScale = snapshot.bg.scale;
  state.bgPosX = snapshot.bg.posX;
  state.bgPosY = snapshot.bg.posY;
  state.bgNaturalW = snapshot.bg.naturalW;
  state.bgNaturalH = snapshot.bg.naturalH;
  if (state.bgLoaded && snapshot.bg.src) {
    state.bgEl.src = snapshot.bg.src;
  } else {
    state.bgEl.src = '';
  }
  applyBgTransform(state);

  // 2. Clean up Cells
  state.cells.forEach(c => {
    c.el.remove();
    c.controlsEl.remove();
  });
  state.cells = [];
  tmpl.frames = [];

  snapshot.cells.forEach((cSnap, i) => {
    const cfgClone = JSON.parse(JSON.stringify(cSnap.cfg));
    tmpl.frames.push(cfgClone);
    const cell = createCell(state, tmpl, cfgClone, i);

    cell.loaded = cSnap.loaded;
    cell.scale = cSnap.scale;
    cell.posX = cSnap.posX;
    cell.posY = cSnap.posY;
    cell.naturalW = cSnap.naturalW;
    cell.naturalH = cSnap.naturalH;
    cell.borderEnabled = cSnap.borderEnabled;
    cell.borderColor = cSnap.borderColor;
    cell.borderWidth = cSnap.borderWidth;
    cell.originalSrc = cSnap.originalSrc || cSnap.src;
    cell.displayScale = cSnap.displayScale || 1;

    if (cell.loaded && cSnap.src) {
      cell.img.src = cSnap.src;
      cell.el.classList.add('has-image');
    }

    state.cells.push(cell);
    canvasArea.appendChild(cell.el);
    canvasArea.appendChild(cell.controlsEl);

    applyTransformFor(state, i);
    applyUserBorder(cell);
    updateFrameShape(cell);
  });
  cells = state.cells;

  // 3. Clean up Text Boxes
  if (state.textBoxes) {
    state.textBoxes.forEach(tb => tb.el.remove());
  }
  state.textBoxes = [];
  
  snapshot.textBoxes.forEach(tbSnap => {
    restoreTextBox(tbSnap, state);
  });

  deselectAll();
}

// ╔══════════════════════════════════════════════════════════════════════════╗
// ║   DESKTOP → MOBILE SYNC                                                  ║
// ║                                                                          ║
// ║   Called whenever the user toggles from desktop to mobile within the     ║
// ║   same pair. Pushes a pre-sync snapshot onto the mobile side's undo      ║
// ║   stack, then:                                                           ║
// ║     • For each paired PREDEFINED frame: copies the image (src +          ║
// ║       natural dimensions + loaded flag) from desktop to mobile, then     ║
// ║       recomputes scale/pos fresh to cover-fit the mobile frame.          ║
// ║     • For each paired PREDEFINED textbox: copies TEXT CONTENT only.      ║
// ║   Unpaired predefined objects and all user-added objects are untouched.  ║
// ║                                                                          ║
// ║   Pairing uses the author-specified `matching_index` field on each       ║
// ║   frame/textbox (stamped internally as `_matchingIndex`). Two objects    ║
// ║   are paired iff they live in the same pair, are the same object type,  ║
// ║   and share a numeric _matchingIndex. If two objects on the same side   ║
// ║   share the same _matchingIndex, the first one wins and we console.warn.║
// ╚══════════════════════════════════════════════════════════════════════════╝

// Unified accessors: cells carry these on cfg, textboxes carry them on the object itself.
function _isFromTemplate(obj) {
  if (obj && obj.cfg) return !!obj.cfg._fromTemplate;
  return !!(obj && obj._fromTemplate);
}
function _getMatchingIndex(obj) {
  const raw = (obj && obj.cfg) ? obj.cfg._matchingIndex : (obj ? obj._matchingIndex : null);
  return (typeof raw === 'number') ? raw : null;
}


function buildSyncPairs(sourceObjs, targetObjs, objectTypeLabel) {
  // Returns [[sourceObj, targetObj], ...] for predefined objects whose
  // _matchingIndex values match across sides.
  const sPredef = (sourceObjs || []).filter(_isFromTemplate);
  const tPredef = (targetObjs || []).filter(_isFromTemplate);

  // Build target map, first-wins + warn on duplicates.
  const tByIdx = new Map();
  tPredef.forEach(t => {
    const i = _getMatchingIndex(t);
    if (i === null) return;
    if (tByIdx.has(i)) {
      console.warn(`[sync] duplicate matching_index ${i} on target ${objectTypeLabel || ''}; ignoring the later one.`);
      return;
    }
    tByIdx.set(i, t);
  });

  // Track duplicates on source side too.
  const seenSourceIdx = new Set();
  const pairs = [];
  sPredef.forEach(s => {
    const i = _getMatchingIndex(s);
    if (i === null) return;
    if (seenSourceIdx.has(i)) {
      console.warn(`[sync] duplicate matching_index ${i} on source ${objectTypeLabel || ''}; ignoring the later one.`);
      return;
    }
    seenSourceIdx.add(i);
    const t = tByIdx.get(i);
    if (t) pairs.push([s, t]);
  });
  return pairs;
}

function syncViewports(pairIdx, fromViewport, toViewport) {
  const fromIdx = getTemplateIndex(pairIdx, fromViewport);
  const toIdx = getTemplateIndex(pairIdx, toViewport);
  if (fromIdx < 0 || toIdx < 0) return;

  const fromState = templateStates[fromIdx];
  if (!fromState) return; // Nothing to copy from.

  // Lazily init target state if the user has never visited it.
  if (!templateStates[toIdx]) {
    templateStates[toIdx] = createTemplateState(TEMPLATES[toIdx]);
  }
  const toState = templateStates[toIdx];

  // ─── Detect whether the sync will actually change anything ────────
  // Compare paired frames and textboxes to see if the target already
  // matches the source. Only if something differs do we push an undo
  // checkpoint and clear the redo stack.
  let hasChanges = false;

  const framePairs = buildSyncPairs(fromState.cells, toState.cells, 'frame');
  for (const [fromCell, toCell] of framePairs) {
    if (fromCell.loaded !== toCell.loaded) { hasChanges = true; break; }
    if (fromCell.loaded && fromCell.img.src !== toCell.img.src) { hasChanges = true; break; }
  }

  if (!hasChanges) {
    const tbPairs = buildSyncPairs(fromState.textBoxes || [], toState.textBoxes || [], 'textbox');
    for (const [fromTb, toTb] of tbPairs) {
      const fromText = fromTb.contentEl ? fromTb.contentEl.innerHTML : fromTb.text;
      const toText = toTb.contentEl ? toTb.contentEl.innerHTML : toTb.text;
      if (fromText !== toText) { hasChanges = true; break; }
    }
  }

  // If nothing changed, skip — crucially preserving the target's redo stack.
  if (!hasChanges) return;

  // Checkpoint target so undo can revert this sync.
  if (!toState.undoStack) toState.undoStack = [];
  if (!toState.redoStack) toState.redoStack = [];
  toState.undoStack.push(captureState(toState));
  if (toState.undoStack.length > 50) toState.undoStack.shift();
  toState.redoStack = [];

  // ─── Frame sync ──────────────────────────────────────────────────────
  framePairs.forEach(([fromCell, toCell]) => {
    const toCellIdx = toState.cells.indexOf(toCell);
    if (!fromCell.loaded) {
      // Source has no image — clear target's image to match.
      toCell.loaded = false;
      toCell.naturalW = 0;
      toCell.naturalH = 0;
      toCell.scale = 1;
      toCell.posX = 0;
      toCell.posY = 0;
      toCell.img.src = '';
      toCell.el.classList.remove('has-image');
      if (toCellIdx >= 0) applyTransformFor(toState, toCellIdx);
      return;
    }

    // Check if the image source has actually changed
    const isImageChanging = !toCell.loaded || toCell.img.src !== fromCell.img.src;

    // Copy image data.
    toCell.img.src = fromCell.img.src;
    toCell.naturalW = fromCell.naturalW;
    toCell.naturalH = fromCell.naturalH;
    toCell.originalSrc = fromCell.originalSrc || fromCell.img.src;
    toCell.displayScale = fromCell.displayScale || 1;
    toCell.loaded = true;
    toCell.el.classList.add('has-image');
    
    // Only recompute transform fresh if the source image is newly uploaded or swapped
    if (isImageChanging) {
      calculateDefaultTransform(toCell);
    }
    
    if (toCellIdx >= 0) applyTransformFor(toState, toCellIdx);
  });

  // ─── Textbox sync (text content only) ────────────────────────────────
  const tbPairs = buildSyncPairs(fromState.textBoxes || [], toState.textBoxes || [], 'textbox');
  tbPairs.forEach(([fromTb, toTb]) => {
    toTb.text = fromTb.text;
    if (toTb.contentEl) toTb.contentEl.innerHTML = toTb.text;
  });
}


function performUndo() {
  if (activeTemplateIndex < 0) return;
  const state = templateStates[activeTemplateIndex];
  if (!state || !state.undoStack || state.undoStack.length === 0) return;

  if (!state.redoStack) state.redoStack = [];
  const beforeSnap = captureState(state);
  state.redoStack.push(beforeSnap);

  const snap = state.undoStack.pop();
  applyState(activeTemplateIndex, snap);
  selectAffectedObjects(beforeSnap);
}

function performRedo() {
  if (activeTemplateIndex < 0) return;
  const state = templateStates[activeTemplateIndex];
  if (!state || !state.redoStack || state.redoStack.length === 0) return;

  if (!state.undoStack) state.undoStack = [];
  const beforeSnap = captureState(state);
  state.undoStack.push(beforeSnap);

  const snap = state.redoStack.pop();
  applyState(activeTemplateIndex, snap);
  selectAffectedObjects(beforeSnap);
}

// After applyState has restored a snapshot, compare the current (restored)
// state against beforeSnap (what it looked like right before undo/redo) and
// select every frame / text box that differs.
function selectAffectedObjects(beforeSnap) {
  const state = templateStates[activeTemplateIndex];

  // --- Frames ---
  const changedFrameIndices = [];
  const maxFrames = Math.max(state.cells.length, beforeSnap.cells.length);
  for (let i = 0; i < state.cells.length; i++) {
    if (i >= beforeSnap.cells.length) {
      // This frame was added by the undo/redo (it didn't exist before).
      changedFrameIndices.push(i);
      continue;
    }
    const cur = state.cells[i];
    const old = beforeSnap.cells[i];
    if (frameDiffers(cur, old)) {
      changedFrameIndices.push(i);
    }
  }
  // Frames that existed before but were removed by undo/redo — they're gone,
  // nothing to select for them.

  // --- Text boxes ---
  const changedTextBoxIds = [];
  const curTBs = state.textBoxes || [];
  const oldTBs = beforeSnap.textBoxes || [];

  // Build a map of old text boxes by id for efficient lookup.
  const oldTBMap = new Map();
  oldTBs.forEach(tb => oldTBMap.set(tb.id, tb));

  curTBs.forEach(tb => {
    const old = oldTBMap.get(tb.id);
    if (!old) {
      // This text box was added by undo/redo.
      changedTextBoxIds.push(tb.id);
    } else if (textBoxDiffers(tb, old)) {
      changedTextBoxIds.push(tb.id);
    }
  });

  // If nothing changed (e.g. only removals), don't clear selection for nothing.
  if (changedFrameIndices.length === 0 && changedTextBoxIds.length === 0) return;

  // Select the affected objects.
  deselectAll();
  if (changedFrameIndices.length > 0) {
    changedFrameIndices.forEach(idx => {
      state.selectedIndices.add(idx);
      if (cells[idx]) {
        cells[idx].el.classList.add('selected');
        cells[idx].controlsEl.classList.add('visible');
      }
    });
    selectedIndices = state.selectedIndices;
  }
  changedTextBoxIds.forEach(id => selectTextBox(id));
  updateLabel();
  syncFormatUIToSelection();
}

// Compare a live cell against a snapshot cell to detect meaningful changes.
function frameDiffers(cur, oldSnap) {
  // Position / size
  if (cur.cfg.x !== oldSnap.cfg.x || cur.cfg.y !== oldSnap.cfg.y) return true;
  if (cur.cfg.w !== oldSnap.cfg.w || cur.cfg.h !== oldSnap.cfg.h) return true;
  if ((cur.cfg.shape || '') !== (oldSnap.cfg.shape || '')) return true;
  // Image state
  if (cur.loaded !== oldSnap.loaded) return true;
  if (cur.loaded && (cur.img.src !== oldSnap.src)) return true;
  // Transform
  if (cur.scale !== oldSnap.scale) return true;
  if (cur.posX !== oldSnap.posX || cur.posY !== oldSnap.posY) return true;
  // Border
  if (cur.borderEnabled !== oldSnap.borderEnabled) return true;
  if (cur.borderColor !== oldSnap.borderColor) return true;
  if (cur.borderWidth !== oldSnap.borderWidth) return true;
  return false;
}

// Compare a live text box against a snapshot text box.
function textBoxDiffers(cur, oldSnap) {
  if (cur.x !== oldSnap.x || cur.y !== oldSnap.y) return true;
  if (cur.width !== oldSnap.width) return true;
  // Compare text content (live uses contentEl.innerHTML).
  const curText = cur.contentEl ? cur.contentEl.innerHTML : cur.text;
  if (curText !== oldSnap.text) return true;
  if (cur.fontSize !== oldSnap.fontSize) return true;
  if (cur.fontName !== oldSnap.fontName) return true;
  if (cur.fontColor !== oldSnap.fontColor) return true;
  if (cur.bold !== oldSnap.bold) return true;
  if (cur.italic !== oldSnap.italic) return true;
  if (cur.underline !== oldSnap.underline) return true;
  if (cur.align !== oldSnap.align) return true;
  return false;
}

function handleUndoPress() {
  performUndo();
  undoTimer = setTimeout(() => {
    undoTimer = setInterval(performUndo, UNDO_CONSECUTIVE_FREQ_SECONDS * 1000);
  }, UNDO_WAIT_SECONDS * 1000);
}

function handleRedoPress() {
  performRedo();
  redoTimer = setTimeout(() => {
    redoTimer = setInterval(performRedo, UNDO_CONSECUTIVE_FREQ_SECONDS * 1000);
  }, UNDO_WAIT_SECONDS * 1000);
}

function clearUndoTimers() {
  clearInterval(undoTimer);
  clearTimeout(undoTimer);
  undoTimer = null;
}

function clearRedoTimers() {
  clearInterval(redoTimer);
  clearTimeout(redoTimer);
  redoTimer = null;
}

window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.contentEditable === 'true') return;
  
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z' && !e.shiftKey) {
    e.preventDefault();
    if (!undoTimer && !e.repeat) handleUndoPress();
  } else if ((e.ctrlKey || e.metaKey) && (e.key.toLowerCase() === 'y' || (e.key.toLowerCase() === 'z' && e.shiftKey))) {
    e.preventDefault();
    if (!redoTimer && !e.repeat) handleRedoPress();
  }
});

// ─── Ctrl/Cmd+S → trigger Save button ────────────────────────────────────
// Fires regardless of focus context — whether you're typing inside a text
// box or just have a tab active, Ctrl+S should save. Always prevents the
// browser's default "Save Page As..." dialog.
window.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's' && !e.shiftKey && !e.altKey) {
    e.preventDefault();
    if (e.repeat) return;
    const btn = document.getElementById('saveProjectBtn');
    if (btn && !btn.disabled) btn.click();
  }
});

// ─── Ctrl/Cmd+B / +I / +U → toggle bold/italic/underline on selection ────
// Behavior depends on context:
//   • If the user is editing inside a text box (contentEditable focused):
//     let the browser handle it natively via execCommand, which wraps the
//     currently-selected range in <b>/<i>/<u> tags. The existing `input`
//     listener on the textbox syncs tb.text from innerHTML afterwards, so
//     the rich formatting persists through save/load.
//   • If one or more text boxes are selected (but not being edited):
//     toggle the whole-textbox flag (tb.bold/italic/underline), same as
//     clicking the right-sidebar toolbar button. Works for multi-select.
//   • Otherwise: do nothing, don't preventDefault — these keys have no
//     default browser action at the page level to worry about.
window.addEventListener('keydown', (e) => {
  if (!(e.ctrlKey || e.metaKey) || e.shiftKey || e.altKey) return;
  const key = e.key.toLowerCase();
  if (key !== 'b' && key !== 'i' && key !== 'u') return;

  const inContentEditable = (e.target.contentEditable === 'true');
  if (inContentEditable) {
    // Native browser handling — let it through. No preventDefault.
    return;
  }

  // Not in edit mode — only act if text boxes are selected.
  if (!selectedTextBoxIds || selectedTextBoxIds.size === 0) return;

  e.preventDefault();
  if (e.repeat) return;

  if (key === 'b') {
    document.getElementById('rsBold').click();
  } else if (key === 'i') {
    document.getElementById('rsItalic').click();
  } else if (key === 'u') {
    document.getElementById('rsUnderline').click();
  }
});

window.addEventListener('keyup', (e) => {
  if (e.key.toLowerCase() === 'z') clearUndoTimers();
  if (e.key.toLowerCase() === 'y') clearRedoTimers();
  if (e.key === 'Control' || e.key === 'Meta') {
    clearUndoTimers();
    clearRedoTimers();
  }
});

// ╔══════════════════════════════════════════════════════════════════════════╗
// ║   COPY / CUT / PASTE                                                    ║
// ╚══════════════════════════════════════════════════════════════════════════╝

const PASTE_OFFSET = 20; // px offset per paste

// Internal clipboard: stores snapshots of selected objects.
// { templateIndex, frames: [...], textBoxes: [...], isCut, pasteCount }
let internalClipboard = null;

// Snapshot a frame cell for clipboard storage.
function snapshotFrame(cellState) {
  const snap = {
    cfg: JSON.parse(JSON.stringify(cellState.cfg)),
    loaded: cellState.loaded,
    src: cellState.img ? cellState.img.src : '',
    originalSrc: cellState.originalSrc || (cellState.img ? cellState.img.src : ''),
    displayScale: cellState.displayScale || 1,
    scale: cellState.scale,
    posX: cellState.posX,
    posY: cellState.posY,
    naturalW: cellState.naturalW,
    naturalH: cellState.naturalH,
    borderEnabled: cellState.borderEnabled,
    borderColor: cellState.borderColor,
    borderWidth: cellState.borderWidth,
  };
  // Remove cached scaled path so the clone re-generates it.
  delete snap.cfg._scaledPath;
  return snap;
}

// Snapshot a text box for clipboard storage.
function snapshotTextBox(tb) {
  return {
    x: tb.x,
    y: tb.y,
    width: tb.width,
    text: tb.contentEl ? tb.contentEl.innerHTML : tb.text,
    fontFamily: tb.fontFamily,
    fontName: tb.fontName,
    fontSize: tb.fontSize,
    fontColor: tb.fontColor,
    bold: tb.bold,
    italic: tb.italic,
    underline: tb.underline,
    align: tb.align,
  };
}

// Paste a frame snapshot onto the canvas and return the new cell index.
function pasteFrameSnapshot(snap, offsetX, offsetY) {
  const state = templateStates[activeTemplateIndex];
  const tmpl = TEMPLATES[activeTemplateIndex];

  const newCfg = JSON.parse(JSON.stringify(snap.cfg));
  newCfg.x += offsetX;
  newCfg.y += offsetY;
  newCfg.label = (newCfg.label || 'Frame') + ' copy';
  delete newCfg._scaledPath;

  tmpl.frames.push(newCfg);
  const newIdx = state.cells.length;
  const newCell = createCell(state, tmpl, newCfg, newIdx);
  newCell.borderEnabled = snap.borderEnabled;
  newCell.borderColor = snap.borderColor;
  newCell.borderWidth = snap.borderWidth;
  state.cells.push(newCell);

  canvasArea.appendChild(newCell.el);
  canvasArea.appendChild(newCell.controlsEl);

  applyUserBorder(newCell);

  // If the source had an image, clone it into the new frame.
  if (snap.loaded && snap.src) {
    newCell.naturalW = snap.naturalW;
    newCell.naturalH = snap.naturalH;
    newCell.loaded = true;
    newCell.scale = snap.scale;
    newCell.posX = snap.posX;
    newCell.posY = snap.posY;
    newCell.originalSrc = snap.originalSrc || snap.src;
    newCell.displayScale = snap.displayScale || 1;
    newCell.el.classList.add('has-image');
    newCell.img.src = snap.src;
    applyTransformFor(state, newCell._cellIndex);
  }

  cells = state.cells;
  return newIdx;
}

// Paste a text box snapshot onto the canvas and return the new text box.
function pasteTextBoxSnapshot(snap, offsetX, offsetY) {
  const state = templateStates[activeTemplateIndex];
  const cloneSrc = {
    x: snap.x + offsetX,
    y: snap.y + offsetY,
    width: snap.width,
    text: snap.text,
    fontFamily: snap.fontFamily,
    fontName: snap.fontName,
    fontSize: snap.fontSize,
    fontColor: snap.fontColor,
    bold: snap.bold,
    italic: snap.italic,
    underline: snap.underline,
    align: snap.align,
  };
  return cloneTextBox(cloneSrc);
}

// Perform copy or cut of currently selected objects.
function copyOrCut(isCut) {
  if (selectedIndices.size === 0 && selectedTextBoxIds.size === 0) return;

  const frameSnaps = [];
  selectedIndices.forEach(idx => {
    const s = cells[idx];
    if (s) frameSnaps.push({ idx, snap: snapshotFrame(s) });
  });

  const tbSnaps = [];
  selectedTextBoxIds.forEach(tbId => {
    const tb = getTextBoxById(tbId);
    if (tb) tbSnaps.push(snapshotTextBox(tb));
  });

  internalClipboard = {
    templateIndex: activeTemplateIndex,
    frames: frameSnaps.map(f => f.snap),
    textBoxes: tbSnaps,
    isCut: isCut,
    pasteCount: 0,
  };

  if (isCut) {
    saveState();
    const state = templateStates[activeTemplateIndex];
    const tmpl = TEMPLATES[activeTemplateIndex];

    // Remove selected text boxes first (doesn't affect cell indexing).
    [...selectedTextBoxIds].forEach(id => removeTextBox(id));

    // Remove selected frames: first clear images from loaded ones, then
    // remove the frame elements in reverse index order.
    const sortedFrameIndices = frameSnaps.map(f => f.idx).sort((a, b) => b - a);
    sortedFrameIndices.forEach(cellIdx => {
      const s = cells[cellIdx];
      if (!s) return;
      s.el.remove();
      s.controlsEl.remove();
      state.cells.splice(cellIdx, 1);
      tmpl.frames.splice(cellIdx, 1);
    });

    cells = state.cells;
    reIndexCells(state);
    state.selectedIndices.clear();
    selectedIndices = state.selectedIndices;
    selectedTextBoxIds.clear();
    updateLabel();
    syncFormatUIToSelection();
  }
}

// Paste from the internal clipboard.
function pasteClipboard() {
  if (!internalClipboard) return;
  if (internalClipboard.templateIndex !== activeTemplateIndex) return;

  saveState();
  internalClipboard.pasteCount++;
  const offset = internalClipboard.pasteCount * PASTE_OFFSET;

  const state = templateStates[activeTemplateIndex];
  deselectAll();

  // Paste frames.
  const newFrameIndices = [];
  internalClipboard.frames.forEach(snap => {
    const newIdx = pasteFrameSnapshot(snap, offset, offset);
    newFrameIndices.push(newIdx);
  });

  // Paste text boxes.
  const newTextBoxIds = [];
  internalClipboard.textBoxes.forEach(snap => {
    const tb = pasteTextBoxSnapshot(snap, offset, offset);
    newTextBoxIds.push(tb.id);
  });

  // Select all pasted objects.
  newFrameIndices.forEach(idx => {
    state.selectedIndices.add(idx);
    if (cells[idx]) {
      cells[idx].el.classList.add('selected');
      cells[idx].controlsEl.classList.add('visible');
    }
  });
  selectedIndices = state.selectedIndices;
  newTextBoxIds.forEach(id => selectTextBox(id));
  updateLabel();
  syncFormatUIToSelection();
}

window.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.contentEditable === 'true') return;

  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c' && !e.shiftKey) {
    e.preventDefault();
    copyOrCut(false);
  } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'x' && !e.shiftKey) {
    e.preventDefault();
    copyOrCut(true);
  } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v' && !e.shiftKey) {
    e.preventDefault();
    pasteClipboard();
  }
});

// ─── Derive flat TEMPLATES array from pairs ───────────────────────────────
// Keeps a flat TEMPLATES array so existing call sites still work. Each
// derived template is tagged with `_pairIndex` and `_viewport`.
//
// Predefined frames/textboxes carry their `matching_index` from config.
// We additionally stamp:
//   _fromTemplate: true    — distinguishes predefined from user-added
//   _matchingIndex: N|null — internal mirror of the author's matching_index,
//                            lives on cfg so it survives JSON-clone in undo
const TEMPLATES = [];
TEMPLATE_PAIRS.forEach((pair, pairIdx) => {
  pair.desktop._pairIndex = pairIdx;
  pair.desktop._viewport = 'desktop';
  pair.mobile._pairIndex = pairIdx;
  pair.mobile._viewport = 'mobile';
  [pair.desktop, pair.mobile].forEach(tmpl => {
    (tmpl.frames || []).forEach(f => {
      f._fromTemplate = true;
      f._matchingIndex = (typeof f.matching_index === 'number') ? f.matching_index : null;
    });
    (tmpl.textBoxes || []).forEach(tb => {
      tb._fromTemplate = true;
      tb._matchingIndex = (typeof tb.matching_index === 'number') ? tb.matching_index : null;
    });
  });
  TEMPLATES.push(pair.desktop);
  TEMPLATES.push(pair.mobile);
});

  const tmpl = viewport === 'mobile'

  return TEMPLATES.indexOf(tmpl);
}

  if (activeTemplateIndex < 0) return -1;

function getActiveViewport() {

}

function scalePath(pathStr, viewBox, frameW, frameH) {
  const [, , vw, vh] = viewBox.split(' ').map(Number);
  const sx = frameW / vw;
  const sy = frameH / vh;
  return scalePathCoords(pathStr, sx, sy);
}

function scalePathCoords(d, sx, sy) {
  const tokens = d.match(/[a-zA-Z]|[-+]?(?:\d+\.?\d*|\.\d+)/g);
  if (!tokens) return d;

  let result = '';
  let i = 0;

  while (i < tokens.length) {
    const t = tokens[i];
    if (/^[a-zA-Z]$/.test(t)) {
      result += t;
      i++;
      if (t === 'Z' || t === 'z') continue;

      const paramCounts = {
        M:2,m:2,L:2,l:2,H:1,h:1,V:1,v:1,
        C:6,c:6,S:4,s:4,Q:4,q:4,T:2,t:2,A:7,a:7
      };
      const count = paramCounts[t] || 0;

      while (i < tokens.length && !/^[a-zA-Z]$/.test(tokens[i])) {
        const params = [];
        for (let j = 0; j < count && i < tokens.length && !/^[a-zA-Z]$/.test(tokens[i]); j++) {
          params.push(parseFloat(tokens[i]));
          i++;
        }
        const upper = t.toUpperCase();
        if (upper === 'H') {
          result += params.map(v => (v * sx).toFixed(2)).join(' ');
        } else if (upper === 'V') {
          result += params.map(v => (v * sy).toFixed(2)).join(' ');
        } else if (upper === 'A' && params.length === 7) {
          result += `${(params[0]*sx).toFixed(2)} ${(params[1]*sy).toFixed(2)} ${params[2]} ${params[3]} ${params[4]} ${(params[5]*sx).toFixed(2)} ${(params[6]*sy).toFixed(2)}`;
        } else {
          for (let j = 0; j < params.length; j += 2) {
            if (j + 1 < params.length) {
              result += `${(params[j]*sx).toFixed(2)} ${(params[j+1]*sy).toFixed(2)} `;
            } else {
              result += `${(params[j]*sx).toFixed(2)} `;
            }
          }
        }
        result += ' ';
      }
    } else {
      i++;
    }
  }
  return result.trim();
}

function getScaledPath(frame) {
  if (frame._scaledPath) return frame._scaledPath;
  if (!frame.shape) return null;
  const shapeDef = SHAPES[frame.shape];
  if (!shapeDef) return null;
  frame._scaledPath = scalePath(shapeDef.path, shapeDef.viewBox, frame.w, frame.h);
  return frame._scaledPath;
}

    if (excludeFrameIndices.has(idx)) return;
    targets.push({
      cx: s.cfg.x + s.cfg.w / 2,
      cy: s.cfg.y + s.cfg.h / 2,
      // Source rect so the obstruction check knows the candidate's footprint.
      src: { x: s.cfg.x, y: s.cfg.y, w: s.cfg.w, h: s.cfg.h, frameIdx: idx },
    });
  });
  const tbs = getTextBoxes();
  tbs.forEach(tb => {
    if (excludeTextBoxIds.has(tb.id)) return;
    const w = tb.width || tb.contentEl.offsetWidth;
    const h = tb.contentEl.offsetHeight;
    targets.push({
      cx: tb.x + w / 2,
      cy: tb.y + h / 2,
      // Text boxes are valid alignment references, but text boxes cannot
      // act as obstructors — only frames can. `src` is still supplied so the
      // obstruction test knows the candidate's range (used to compute the
      // gap between the moving object and the candidate).
      src: { x: tb.x, y: tb.y, w, h, frameIdx: -1 },
    });
  });
  return targets;
}

function getDraggedObjectCenters(rawDx, rawDy, startPositionsFrames, startPositionsTextBoxes) {
  const centers = [];
  if (startPositionsFrames) {
    startPositionsFrames.forEach((start, idx) => {
      const s = cells[idx];
      if (!s) return;
      centers.push({
        cx: start.x + rawDx + s.cfg.w / 2,
        cy: start.y + rawDy + s.cfg.h / 2
      });
    });
  }
  if (startPositionsTextBoxes) {
    startPositionsTextBoxes.forEach((start, tbId) => {
      const tb = getTextBoxById(tbId);
      if (!tb) return;
      const w = tb.width || tb.contentEl.offsetWidth;
      const h = tb.contentEl.offsetHeight;
      centers.push({
        cx: start.x + rawDx + w / 2,
        cy: start.y + rawDy + h / 2
      });
    });
  }
  return centers;
}

function applyAlignmentSnap(rawDx, rawDy, dragFrameIndices, dragTextBoxIds, startPositionsFrames, startPositionsTextBoxes) {
  const centers = getDraggedObjectCenters(rawDx, rawDy, startPositionsFrames, startPositionsTextBoxes);
  
  const targets = getAlignmentTargets(dragFrameIndices, dragTextBoxIds);
  const { hEdges, vEdges } = getEdgeAlignmentTargets(dragFrameIndices, dragTextBoxIds);

  let bestSnapDxCorrection = null; 
  let bestSnapDxDist = Infinity;
  let bestSnapDyCorrection = null;
  let bestSnapDyDist = Infinity;

  // Rects of each moving object — needed so the obstruction check can reason
  // about the line-of-sight between the moving rect and the candidate.
  const movingRects = [];
  if (startPositionsFrames) {
    startPositionsFrames.forEach((start, idx) => {
      const s = cells[idx];
      if (!s) return;
      movingRects.push({
        L: start.x + rawDx, T: start.y + rawDy,
        R: start.x + rawDx + s.cfg.w, B: start.y + rawDy + s.cfg.h,
      });
    });
  }
  if (startPositionsTextBoxes) {
    startPositionsTextBoxes.forEach((start, tbId) => {
      const tb = getTextBoxById(tbId);
      if (!tb) return;
      const w = tb.width || tb.contentEl.offsetWidth;
      const h = tb.contentEl.offsetHeight;
      movingRects.push({
        L: start.x + rawDx, T: start.y + rawDy,
        R: start.x + rawDx + w, B: start.y + rawDy + h,
      });
    });
  }

  // A candidate (center or edge) is valid only if, for EVERY moving object,
  // the alignment line isn't obstructed by a third frame. Because the line
  // must be unobstructed from each mover to the same target, we require all
  // movers to have a clear path.
  const vertLineValid = (x, src) => movingRects.every(r =>
    !edgeAlignmentObstructed('v', x, r.L, r.T, r.R, r.B, src, dragFrameIndices));
  const horzLineValid = (y, src) => movingRects.every(r =>
    !edgeAlignmentObstructed('h', y, r.L, r.T, r.R, r.B, src, dragFrameIndices));
  // Distance gates for CENTER alignment only (not edge alignment).
  const centerVInRange = (src) => movingRects.every(r =>
    !centerAlignmentTooFar('v', r.L, r.T, r.R, r.B, src));
  const centerHInRange = (src) => movingRects.every(r =>
    !centerAlignmentTooFar('h', r.L, r.T, r.R, r.B, src));

  for (const c of centers) {
    for (const t of targets) {
      const distX = Math.abs(c.cx - t.cx);
      if (distX < ALIGNMENT_CLICK_PIXELS && distX < bestSnapDxDist &&
          centerVInRange(t.src) && vertLineValid(t.cx, t.src)) {
        bestSnapDxDist = distX;
        bestSnapDxCorrection = t.cx - c.cx;
      }
      const distY = Math.abs(c.cy - t.cy);
      if (distY < ALIGNMENT_CLICK_PIXELS && distY < bestSnapDyDist &&
          centerHInRange(t.src) && horzLineValid(t.cy, t.src)) {
        bestSnapDyDist = distY;
        bestSnapDyCorrection = t.cy - c.cy;
      }
    }
  }

  if (startPositionsFrames) {
    startPositionsFrames.forEach((start, idx) => {
      const s = cells[idx];
      if (!s) return;
      const projectedX = start.x + rawDx;
      const projectedY = start.y + rawDy;
      const projectedRight = projectedX + s.cfg.w;
      const projectedBottom = projectedY + s.cfg.h;
      
      const checkVEdge = (edgeX) => {
        for (const ve of vEdges) {
          const dist = Math.abs(edgeX - ve.x);
          if (dist < ALIGNMENT_EDGE_CLICK_PIXELS && dist < bestSnapDxDist &&
              vertLineValid(ve.x, ve.src)) {
            bestSnapDxDist = dist;
            bestSnapDxCorrection = ve.x - edgeX;
          }
        }
      };
      
      const checkHEdge = (edgeY) => {
        for (const he of hEdges) {
          const dist = Math.abs(edgeY - he.y);
          if (dist < ALIGNMENT_EDGE_CLICK_PIXELS && dist < bestSnapDyDist &&
              horzLineValid(he.y, he.src)) {
            bestSnapDyDist = dist;
            bestSnapDyCorrection = he.y - edgeY;
          }
        }
      };

      checkVEdge(projectedX);
      checkVEdge(projectedRight);
      checkHEdge(projectedY);
      checkHEdge(projectedBottom);
    });
  }

  const snapDx = bestSnapDxCorrection !== null ? rawDx + bestSnapDxCorrection : rawDx;
  const snapDy = bestSnapDyCorrection !== null ? rawDy + bestSnapDyCorrection : rawDy;

  const snappedCenters = getDraggedObjectCenters(snapDx, snapDy, startPositionsFrames, startPositionsTextBoxes);

  // Build snapped moving rects (used to re-validate obstruction at render time).
  const snappedRects = [];
  if (startPositionsFrames) {
    startPositionsFrames.forEach((start, idx) => {
      const s = cells[idx];
      if (!s) return;
      snappedRects.push({
        L: start.x + snapDx, T: start.y + snapDy,
        R: start.x + snapDx + s.cfg.w, B: start.y + snapDy + s.cfg.h,
      });
    });
  }
  if (startPositionsTextBoxes) {
    startPositionsTextBoxes.forEach((start, tbId) => {
      const tb = getTextBoxById(tbId);
      if (!tb) return;
      const w = tb.width || tb.contentEl.offsetWidth;
      const h = tb.contentEl.offsetHeight;
      snappedRects.push({
        L: start.x + snapDx, T: start.y + snapDy,
        R: start.x + snapDx + w, B: start.y + snapDy + h,
      });
    });
  }
  const renderVLineValid = (x, src) => snappedRects.every(r =>
    !edgeAlignmentObstructed('v', x, r.L, r.T, r.R, r.B, src, dragFrameIndices));
  const renderHLineValid = (y, src) => snappedRects.every(r =>
    !edgeAlignmentObstructed('h', y, r.L, r.T, r.R, r.B, src, dragFrameIndices));
  const renderCenterVInRange = (src) => snappedRects.every(r =>
    !centerAlignmentTooFar('v', r.L, r.T, r.R, r.B, src));
  const renderCenterHInRange = (src) => snappedRects.every(r =>
    !centerAlignmentTooFar('h', r.L, r.T, r.R, r.B, src));

  const guideHSet = new Set();
  const guideVSet = new Set();
  
  for (const c of snappedCenters) {
    for (const t of targets) {
      if (Math.abs(c.cx - t.cx) < 0.5 && renderCenterVInRange(t.src) && renderVLineValid(t.cx, t.src))
        guideVSet.add(Math.round(t.cx));
      if (Math.abs(c.cy - t.cy) < 0.5 && renderCenterHInRange(t.src) && renderHLineValid(t.cy, t.src))
        guideHSet.add(Math.round(t.cy));
    }
  }

  if (startPositionsFrames) {
    startPositionsFrames.forEach((start, idx) => {
      const s = cells[idx];
      if (!s) return;
      const snappedX = start.x + snapDx;
      const snappedY = start.y + snapDy;
      const snappedRight = snappedX + s.cfg.w;
      const snappedBottom = snappedY + s.cfg.h;
      
      for (const ve of vEdges) {
        if (Math.abs(snappedX - ve.x) < 0.5 && renderVLineValid(ve.x, ve.src))
          guideVSet.add(Math.round(ve.x));
        if (Math.abs(snappedRight - ve.x) < 0.5 && renderVLineValid(ve.x, ve.src))
          guideVSet.add(Math.round(ve.x));
      }
      for (const he of hEdges) {
        if (Math.abs(snappedY - he.y) < 0.5 && renderHLineValid(he.y, he.src))
          guideHSet.add(Math.round(he.y));
        if (Math.abs(snappedBottom - he.y) < 0.5 && renderHLineValid(he.y, he.src))
          guideHSet.add(Math.round(he.y));
      }
    });
  }

  const guideHArr = [...guideHSet];
  const guideVArr = [...guideVSet];

  guideHArr.forEach((y, i) => {
    const g = ensureGuideH(i);
    g.style.top = y + 'px';
    g.style.display = '';
  });
  for (let i = guideHArr.length; i < activeGuideHs.length; i++) {
    activeGuideHs[i].style.display = 'none';
  }

  guideVArr.forEach((x, i) => {
    const g = ensureGuideV(i);
    g.style.left = x + 'px';
    g.style.display = '';
  });
  for (let i = guideVArr.length; i < activeGuideVs.length; i++) {
    activeGuideVs[i].style.display = 'none';
  }

  return { dx: snapDx, dy: snapDy };
}

// Compose alignment snap with equidistance snap for a MOVE interaction.
// - First runs primary alignment snap (the existing behavior, which renders
//   alignment guide lines as a side effect).
// - Then, on any axis where alignment did NOT already snap, tries
//   equidistance snap and renders its indicator.
// Call this wherever applyAlignmentSnap was previously called for moves.
function applyMoveSnap(rawDx, rawDy, dragFrameIndices, dragTextBoxIds,
    startPositionsFrames, startPositionsTextBoxes) {
  const { dx: alignDx, dy: alignDy } = applyAlignmentSnap(
    rawDx, rawDy, dragFrameIndices, dragTextBoxIds,
    startPositionsFrames, startPositionsTextBoxes);

  const xAligned = Math.abs(alignDx - rawDx) > 0.001;
  const yAligned = Math.abs(alignDy - rawDy) > 0.001;

  // Only run equidistance on axes that haven't already been claimed by
  // object-to-object alignment snapping.
  if (xAligned && yAligned) {
    hideEquiIndicators();
    return { dx: alignDx, dy: alignDy };
  }

  const eq = applyEquidistanceSnapForMove(
    alignDx, alignDy,
    startPositionsFrames, startPositionsTextBoxes,
    dragFrameIndices, dragTextBoxIds);

  let finalDx = alignDx;
  let finalDy = alignDy;
  const snapsX = xAligned ? [] : eq.snapsX;
  const snapsY = yAligned ? [] : eq.snapsY;
  if (!xAligned) finalDx = eq.dx;
  if (!yAligned) finalDy = eq.dy;

  renderEquidistanceIndicators(snapsX, snapsY);
  return { dx: finalDx, dy: finalDy };
}

// For STRETCH interactions: layer equidistance onto the result of
// applyStretchAlignmentSnap. Only the edges actually being dragged can snap:
// e.g. a right-edge stretch can only snap X (by moving R), not Y. When Shift
// or Alt is held (aspect-constrained stretch), skip equidistance entirely
// because a one-axis correction would break the constraint.
function applyStretchMoveSnap(rawDx, rawDy, side, stretchStartStates,
    stretchStartTextStates, excludeFrameIndices, excludeTextBoxIds,
    shiftConstrain, altConstrain) {
  const primary = applyStretchAlignmentSnap(rawDx, rawDy, side,
    stretchStartStates, stretchStartTextStates,
    excludeFrameIndices, excludeTextBoxIds, shiftConstrain, altConstrain);

  if (shiftConstrain || altConstrain) {
    hideEquiIndicators();
    return primary;
  }
  if (!stretchStartStates || stretchStartStates.size === 0) {
    hideEquiIndicators();
    return primary;
  }

  const movesLeft   = side.includes('l');
  const movesRight  = side.includes('r');
  const movesTop    = side.includes('t');
  const movesBottom = side.includes('b');
  const canSnapX = movesLeft || movesRight;
  const canSnapY = movesTop || movesBottom;

  const candidates = getEquidistanceFrameCandidates(excludeFrameIndices);
  if (!candidates.length) {
    hideEquiIndicators();
    return primary;
  }

  // Project the rect under primary snap to see where the moving edges are.
  // Then, per axis that can snap, compute what correction to the edge would
  // achieve equidistance.
  let bestXCorrection = 0, bestXMag = Infinity;
  let bestYCorrection = 0, bestYMag = Infinity;
  // Also track info for indicator rendering.
  const pendingXSnaps = [];  // { rect, info } for the snapped position
  const pendingYSnaps = [];

  // Per the existing stretch logic, small primary-snapped rects are clamped
  // to >=30. We mirror that here.
  const projected = [];
  stretchStartStates.forEach((start, idx) => {
    let newX = start.x, newY = start.y, newW = start.w, newH = start.h;
    if (side === 'r')       { newW = start.w + primary.dx; }
    else if (side === 'l')  { newW = start.w - primary.dx; newX = start.x + primary.dx; }
    else if (side === 'b')  { newH = start.h + primary.dy; }
    else if (side === 't')  { newH = start.h - primary.dy; newY = start.y + primary.dy; }
    else if (side === 'br') { newW = start.w + primary.dx; newH = start.h + primary.dy; }
    else if (side === 'bl') { newW = start.w - primary.dx; newH = start.h + primary.dy; newX = start.x + primary.dx; }
    else if (side === 'tr') { newW = start.w + primary.dx; newH = start.h - primary.dy; newY = start.y + primary.dy; }
    else if (side === 'tl') { newW = start.w - primary.dx; newH = start.h - primary.dy; newX = start.x + primary.dx; newY = start.y + primary.dy; }
    if (newW < 30) { newW = 30; if (movesLeft) newX = start.x + start.w - 30; }
    if (newH < 30) { newH = 30; if (movesTop)  newY = start.y + start.h - 30; }
    projected.push({ idx, start, newX, newY, newW, newH });
  });

  // Find best correction per axis among all stretched frames.
  projected.forEach(p => {
    const L = p.newX, T = p.newY, R = p.newX + p.newW, B = p.newY + p.newH;

    if (canSnapX) {
      // For a stretch, the NON-moving X edge is fixed. Find flanks only on
      // the moving side: if we're moving R, the right flank's left edge
      // is where we can snap to. Left flank defines the "gap on the fixed
      // side"; right flank defines the gap on the moving side.
      // Equidistance: (L - leftFlankRightEdge) == (rightFlankLeftEdge - R).
      // Solve for where the moving edge should land.
      const midY = (T + B) / 2;
      const sameRow = (c) => !(c.y + c.h <= T || c.y >= B);
      const leftFlanks = [];
      const rightFlanks = [];
      for (const c of candidates) {
        if (!sameRow(c)) continue;
        const cR = c.x + c.w;
        if (cR <= L) {
          const gap = L - cR;
          if (gap <= EQUIDISTANCE_MAX_DISTANCE) leftFlanks.push({ edge: cR, gap });
        } else if (c.x >= R) {
          const gap = c.x - R;
          if (gap <= EQUIDISTANCE_MAX_DISTANCE) rightFlanks.push({ edge: c.x, gap });
        }
      }
      if (leftFlanks.length && rightFlanks.length) {
        for (const lf of leftFlanks) {
          for (const rf of rightFlanks) {
            // Desired state: lf.gap == rf.gap. Fixed-side flank stays put;
            // the moving edge shifts to make gaps equal.
            if (movesRight && !movesLeft) {
              // R is free; L (and lf.gap) is fixed. Target R = rf.edge - lf.gap.
              const targetR = rf.edge - lf.gap;
              const delta = targetR - R;
              if (Math.abs(delta) <= EQUIDISTANCE_SNAP_PIXELS &&
                  Math.abs(delta) < bestXMag) {
                bestXMag = Math.abs(delta);
                bestXCorrection = delta;           // positive dx extends R
              }
            } else if (movesLeft && !movesRight) {
              // L is free; R (and rf.gap) is fixed. Target L = lf.edge + rf.gap.
              const targetL = lf.edge + rf.gap;
              const delta = targetL - L;
              // In our dx convention for side 'l', positive dx moves L right,
              // so we need correction = delta (positive delta -> positive dx).
              if (Math.abs(delta) <= EQUIDISTANCE_SNAP_PIXELS &&
                  Math.abs(delta) < bestXMag) {
                bestXMag = Math.abs(delta);
                bestXCorrection = delta;
              }
            }
          }
        }
      }
    }

    if (canSnapY) {
      const sameCol = (c) => !(c.x + c.w <= L || c.x >= R);
      const topFlanks = [];
      const botFlanks = [];
      for (const c of candidates) {
        if (!sameCol(c)) continue;
        const cB = c.y + c.h;
        if (cB <= T) {
          const gap = T - cB;
          if (gap <= EQUIDISTANCE_MAX_DISTANCE) topFlanks.push({ edge: cB, gap });
        } else if (c.y >= B) {
          const gap = c.y - B;
          if (gap <= EQUIDISTANCE_MAX_DISTANCE) botFlanks.push({ edge: c.y, gap });
        }
      }
      if (topFlanks.length && botFlanks.length) {
        for (const tf of topFlanks) {
          for (const bf of botFlanks) {
            if (movesBottom && !movesTop) {
              const targetB = bf.edge - tf.gap;
              const delta = targetB - B;
              if (Math.abs(delta) <= EQUIDISTANCE_SNAP_PIXELS &&
                  Math.abs(delta) < bestYMag) {
                bestYMag = Math.abs(delta);
                bestYCorrection = delta;
              }
            } else if (movesTop && !movesBottom) {
              const targetT = tf.edge + bf.gap;
              const delta = targetT - T;
              if (Math.abs(delta) <= EQUIDISTANCE_SNAP_PIXELS &&
                  Math.abs(delta) < bestYMag) {
                bestYMag = Math.abs(delta);
                bestYCorrection = delta;
              }
            }
          }
        }
      }
    }
  });

  let finalDx = primary.dx;
  let finalDy = primary.dy;
  // For 'l' side, dx convention is: positive dx moves L right. Our correction
  // already expresses "how much L should move" directly. Same sign for R.
  if (bestXMag < Infinity) {
    if (movesRight && !movesLeft)      finalDx = primary.dx + bestXCorrection;
    else if (movesLeft && !movesRight) finalDx = primary.dx + bestXCorrection;
  }
  if (bestYMag < Infinity) {
    if (movesBottom && !movesTop)      finalDy = primary.dy + bestYCorrection;
    else if (movesTop && !movesBottom) finalDy = primary.dy + bestYCorrection;
  }

  // Recompute projected rects with final dx/dy, then gather indicators for
  // any flanks that still match exactly.
  const snapsX = [];
  const snapsY = [];
  stretchStartStates.forEach((start, idx) => {
    let newX = start.x, newY = start.y, newW = start.w, newH = start.h;
    if (side === 'r')       { newW = start.w + finalDx; }
    else if (side === 'l')  { newW = start.w - finalDx; newX = start.x + finalDx; }
    else if (side === 'b')  { newH = start.h + finalDy; }
    else if (side === 't')  { newH = start.h - finalDy; newY = start.y + finalDy; }
    else if (side === 'br') { newW = start.w + finalDx; newH = start.h + finalDy; }
    else if (side === 'bl') { newW = start.w - finalDx; newH = start.h + finalDy; newX = start.x + finalDx; }
    else if (side === 'tr') { newW = start.w + finalDx; newH = start.h - finalDy; newY = start.y + finalDy; }
    else if (side === 'tl') { newW = start.w - finalDx; newH = start.h - finalDy; newX = start.x + finalDx; newY = start.y + finalDy; }
    if (newW < 30) { newW = 30; if (movesLeft) newX = start.x + start.w - 30; }
    if (newH < 30) { newH = 30; if (movesTop)  newY = start.y + start.h - 30; }

    const L = newX, T = newY, R = newX + newW, B = newY + newH;
    const rect = { kind: 'frame', idx, L, T, R, B };

    if (bestXMag < Infinity) {
      const info = computeEquidistanceSnapX(L, T, R, B, candidates);
      if (info && Math.abs(info.correction) < 0.5) snapsX.push({ rect, info });
    }
    if (bestYMag < Infinity) {
      const info = computeEquidistanceSnapY(L, T, R, B, candidates);
      if (info && Math.abs(info.correction) < 0.5) snapsY.push({ rect, info });
    }
  });

  renderEquidistanceIndicators(snapsX, snapsY);
  return { dx: finalDx, dy: finalDy };
}

function applyDragPositions(dx, dy, frameStartPositions, textStartPositions) {
  // When multiple objects are selected, compute a single group-level clamp
  // so that no individual object exceeds the canvas bounds, but all objects
  // shift by the same (dx, dy) — preserving relative positions.
  const totalObjects = (frameStartPositions ? frameStartPositions.size : 0) +
                       (textStartPositions ? textStartPositions.size : 0);
  
  if (totalObjects > 1) {
    // Find the tightest (dx, dy) that keeps every object inside the canvas.
    let clampedDx = dx;
    let clampedDy = dy;

    if (frameStartPositions) {
      frameStartPositions.forEach((start, idx) => {
        const s = cells[idx];
        if (!s) return;
        const cfg = s.cfg;
        const newX = start.x + clampedDx;
        const newY = start.y + clampedDy;
        // Pull dx/dy back if this object would exceed bounds.
        if (newX < 0) clampedDx = clampedDx + (0 - newX);
        if (newY < 0) clampedDy = clampedDy + (0 - newY);
        if (newX + cfg.w > CANVAS_W) clampedDx = clampedDx - (newX + cfg.w - CANVAS_W);
        if (newY + cfg.h > CANVAS_H) clampedDy = clampedDy - (newY + cfg.h - CANVAS_H);
      });
    }
    if (textStartPositions) {
      textStartPositions.forEach((start, tbId) => {
        const newX = start.x + clampedDx;
        const newY = start.y + clampedDy;
        if (newX < 0) clampedDx = clampedDx + (0 - newX);
        if (newY < 0) clampedDy = clampedDy + (0 - newY);
        if (newX + 20 > CANVAS_W) clampedDx = clampedDx - (newX + 20 - CANVAS_W);
        if (newY + 20 > CANVAS_H) clampedDy = clampedDy - (newY + 20 - CANVAS_H);
      });
    }

    // Apply the uniformly clamped delta to all objects.
    if (frameStartPositions) {
      frameStartPositions.forEach((start, idx) => {
        const s = cells[idx];
        if (!s) return;
        const cfg = s.cfg;
        cfg.x = start.x + clampedDx;
        cfg.y = start.y + clampedDy;
        s.el.style.left = cfg.x + 'px';
        s.el.style.top = cfg.y + 'px';
        syncFrameControls(s);
      });
    }
    if (textStartPositions) {
      textStartPositions.forEach((start, tbId) => {
        const tb = getTextBoxById(tbId);
        if (!tb) return;
        tb.x = start.x + clampedDx;
        tb.y = start.y + clampedDy;
        tb.el.style.left = tb.x + 'px';
        tb.el.style.top = tb.y + 'px';
      });
    }
    return;
  }

  // Single object — original per-object clamping (preserves existing behavior).
  if (frameStartPositions) {
    frameStartPositions.forEach((start, idx) => {
      const s = cells[idx];
      if (!s) return;
      const cfg = s.cfg;
      let newX = start.x + dx;
      let newY = start.y + dy;
      newX = Math.max(0, Math.min(CANVAS_W - cfg.w, newX));
      newY = Math.max(0, Math.min(CANVAS_H - cfg.h, newY));
      cfg.x = newX;
      cfg.y = newY;
      s.el.style.left = cfg.x + 'px';
      s.el.style.top = cfg.y + 'px';
      syncFrameControls(s);
    });
  }
  if (textStartPositions) {
    textStartPositions.forEach((start, tbId) => {
      const tb = getTextBoxById(tbId);
      if (!tb) return;
      let newX = start.x + dx;
      let newY = start.y + dy;
      newX = Math.max(0, Math.min(CANVAS_W - 20, newX));
      newY = Math.max(0, Math.min(CANVAS_H - 20, newY));
      tb.x = newX;
      tb.y = newY;
      tb.el.style.left = newX + 'px';
      tb.el.style.top = newY + 'px';
    });
  }
}

function getEdgeAlignmentTargets(excludeFrameIndices, excludeTextBoxIds) {
  // Each record carries the coordinate of the edge AND the perpendicular
  // range of the source object (for obstruction testing). `src: null` marks
  // canvas edges, which are never obstructable.
  const hEdges = [];  // { y, x1, x2, src }
  const vEdges = [];  // { x, y1, y2, src }

  // Canvas edges — always valid, no obstruction check.
