});

canvasArea.addEventListener('wheel', (e) => {
  if (lockBgToggle.checked) return;
  if (e.target.closest('.cell')) return;
  if (e.target.closest('.text-box')) return;

  const state = templateStates[activeTemplateIndex];
  if (!state.bgLoaded) return;

  handleScrollStart();
  e.preventDefault();

  const rect = canvasArea.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const oldScale = state.bgScale;
  const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
  state.bgScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, state.bgScale + delta));
  state.bgPosX = mx - (mx - state.bgPosX) * (state.bgScale / oldScale);
  state.bgPosY = my - (my - state.bgPosY) * (state.bgScale / oldScale);
  applyBgTransform(state);
}, { passive: false });

function getBgDrawParams() {
  const state = templateStates[activeTemplateIndex];
  if (!state.bgLoaded) return null;
  const drawW = state.bgNaturalW * state.bgScale;
  const drawH = state.bgNaturalH * state.bgScale;
  const drawX = state.bgPosX;
  const drawY = state.bgPosY;
  return { drawX, drawY, drawW, drawH };
}

const N_PARTITIONS = 5;

// Renders the full canvas to an offscreen HTMLCanvasElement and returns it.
// This is the single source of truth for export rendering — both the full
// image and the partitions are derived from this canvas.
// When cells use downscaled display images, this loads the original full-res
// sources for maximum export quality.
async function renderFullCanvas(includeBackground) {
  // 1. Pre-load any original-resolution images that differ from display images.
  const exportImages = await Promise.all(cells.map((s) => {
    if (!s.loaded) return Promise.resolve(null);
    const origSrc = s.originalSrc || s.img.src;
    if (origSrc === s.img.src && s.displayScale === 1) {
      // Already using original — no need to load separately.
      return Promise.resolve(null);
    }
    // Load the original full-res image for export.
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null); // Fallback to display image.
      img.src = origSrc;
    });
  }));

  let exportScale = 1;
  cells.forEach((s, idx) => {
    if (s.loaded && s.scale > 0) {
      // Convert display-space scale to original-space scale for export.
      const ds = s.displayScale || 1;
      const originalScale = s.scale * ds;
      exportScale = Math.max(exportScale, 1 / originalScale);
    }
  });
  const maxDim = Math.max(CANVAS_W, CANVAS_H);
  exportScale = Math.min(exportScale, 8192 / maxDim);

  const canvas = document.createElement('canvas');
  canvas.width  = Math.round(CANVAS_W * exportScale);
  canvas.height = Math.round(CANVAS_H * exportScale);
  const ctx = canvas.getContext('2d');

  ctx.scale(exportScale, exportScale);

  ctx.fillStyle = CANVAS_BG_COLOR;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  if (includeBackground) {
    const bgP = getBgDrawParams();
    const state = templateStates[activeTemplateIndex];
    if (bgP) ctx.drawImage(state.bgImg, bgP.drawX, bgP.drawY, bgP.drawW, bgP.drawH);
  }

  cells.forEach((s, idx) => {
    const cfg = s.cfg;
    const sp = getScaledPath(cfg);

    ctx.save();
    ctx.translate(cfg.x, cfg.y);

    if (sp) {
      ctx.clip(new Path2D(sp));
    } else {
      ctx.beginPath();
      ctx.rect(0, 0, cfg.w, cfg.h);
      ctx.clip();
    }

    if (s.loaded) {
      ctx.fillStyle = '#141417';
      ctx.fillRect(0, 0, cfg.w, cfg.h);
    }

    if (s.loaded && s.img.naturalWidth > 0) {
      const ds = s.displayScale || 1;
      const exportImg = exportImages[idx];
      if (exportImg && ds !== 1) {
        // Use original full-res image. posX/posY are in frame-space pixels
        // and don't change with image resolution. Only the scale factor
        // needs adjustment: display-space scale × displayScale gives the
        // original-space scale that produces the same rendered size.
        ctx.translate(s.posX, s.posY);
        ctx.scale(s.scale * ds, s.scale * ds);
        ctx.drawImage(exportImg, 0, 0);
      } else {
        // Display image IS the original (no downscale happened).
        ctx.translate(s.posX, s.posY);
        ctx.scale(s.scale, s.scale);
        ctx.drawImage(s.img, 0, 0);
      }
    }
    ctx.restore();

    if (s.borderEnabled && s.borderWidth > 0) {
      ctx.save();
      ctx.translate(cfg.x, cfg.y);
      ctx.strokeStyle = s.borderColor;
      ctx.lineWidth = s.borderWidth;
      if (sp) {
        ctx.lineWidth = s.borderWidth * 2; 
        ctx.clip(new Path2D(sp));
        ctx.stroke(new Path2D(sp));
      } else {
        const hw = s.borderWidth / 2;
        ctx.strokeRect(hw, hw, cfg.w - s.borderWidth, cfg.h - s.borderWidth);
      }
      ctx.restore();
    }
  });

  const state = templateStates[activeTemplateIndex];
  if (state.textBoxes) {
    state.textBoxes.forEach(tb => {
      drawTextBoxToCanvas(ctx, tb);
    });
  }

  return canvas;
}

async function generateCanvasBlob(includeBackground) {
  const canvas = await renderFullCanvas(includeBackground);
  return new Promise((resolve, reject) => {
    canvas.toBlob((blob) => {
      if (blob) resolve(blob);
      else reject(new Error('Blob generation failed.'));
    }, 'image/png');
  });
}

function createTextBox(x, y) {

  const el = document.createElement('div');

function attachTextBoxEvents(tb) {
  const el = tb.el;
  const content = tb.contentEl;
  const id = tb.id;

  content.addEventListener('mousedown', (e) => {
    if (el.classList.contains('editing')) {
      e.stopPropagation();
    }
  });

  content.addEventListener('input', () => {
    tb.text = content.innerHTML;
  });

  content.addEventListener('blur', () => {
    setTimeout(() => {
      if (document.activeElement && document.activeElement.closest('.right-sidebar')) {
        return;
      }
      finalizeTextBox(id);
    }, 100);
  });

  el.addEventListener('mousedown', (e) => {
    if (el.classList.contains('editing')) return; 

    const handleEl = e.target.closest('.text-handle');
    if (handleEl) {
      e.preventDefault();
      e.stopPropagation();
      textBoxResizing = true;
      textBoxResizeId = id;
      textBoxResizeSide = handleEl.dataset.thside;
      textBoxResizeStartX = e.clientX;
      textBoxResizeStartW = tb.width || tb.contentEl.offsetWidth;
      textBoxResizeStartXPos = tb.x;
      return;
    }

    if ((e.ctrlKey || e.metaKey) && e.shiftKey) {
      e.preventDefault();
      e.stopPropagation();

      if (!selectedTextBoxIds.has(id)) {
        deselectAll();
        selectTextBox(id);
      }

      textBoxDragging = true;
      textBoxDragId = id;
      textBoxDragStartX = e.clientX;
      textBoxDragStartY = e.clientY;
      textBoxDragStartPosX = tb.x;
      textBoxDragStartPosY = tb.y;
      axisLockActive = true;
      axisLockAxis = null;

      multiTextDragStartPositions = new Map();
      selectedTextBoxIds.forEach(tbId => {
        const t = getTextBoxById(tbId);
        if (t) multiTextDragStartPositions.set(tbId, { x: t.x, y: t.y });
      });
      multiFrameDragStartPositions = new Map();
      selectedIndices.forEach(idx => {
        const s = cells[idx];
        if (s) multiFrameDragStartPositions.set(idx, { x: s.cfg.x, y: s.cfg.y });
      });
      return;
    }

    if ((e.ctrlKey || e.metaKey) && !e.shiftKey) {
      // Ctrl+Click: start a "pending" interaction.
      // - If the user drags → duplicate.
      // - If the user releases without dragging → toggle multi-select.
      //   (The mouseup handler checks textBoxDupPending to detect the
      //   no-drag case and toggles selection there.)
      e.preventDefault();
      e.stopPropagation();

      textBoxDupPending = true;
      textBoxDupSourceId = id;
      textBoxDupDragStartX = e.clientX;
      textBoxDupDragStartY = e.clientY;
      textBoxDupCloneId = null;
      return;
    }

    e.preventDefault();
    e.stopPropagation();

    if (!selectedTextBoxIds.has(id)) {
      deselectAll();
      selectTextBox(id);
    }

    textBoxDragging = true;
    textBoxDragId = id;
    textBoxDragStartX = e.clientX;
    textBoxDragStartY = e.clientY;
    textBoxDragStartPosX = tb.x;
    textBoxDragStartPosY = tb.y;

    multiTextDragStartPositions = new Map();
    selectedTextBoxIds.forEach(tbId => {
      const t = getTextBoxById(tbId);
      if (t) multiTextDragStartPositions.set(tbId, { x: t.x, y: t.y });
    });
    multiFrameDragStartPositions = new Map();
    selectedIndices.forEach(idx => {
      const s = cells[idx];
      if (s) { 
        multiFrameDragStartPositions.set(idx, { x: s.cfg.x, y: s.cfg.y });
      }
    });
  });

  el.addEventListener('dblclick', (e) => {
    if (el.classList.contains('editing')) return;
    e.preventDefault();
    e.stopPropagation();
    deselectAllTextBoxes();
    selectedIndices.forEach(idx => {
      cells[idx].el.classList.remove('selected');
    });
    selectedIndices.clear();
    updateLabel();
    selectTextBox(id);
    enterTextEditing(id, e);
  });

  el.addEventListener('wheel', (e) => {
    if (el.classList.contains('editing')) return;
    handleScrollStart();
    e.preventDefault();
    e.stopPropagation();

    const delta = e.deltaY > 0 ? -1 : 1;

    selectedTextBoxIds.forEach(tbId => {
      const t = getTextBoxById(tbId);
      if (!t) return;
      t.fontSize = Math.max(6, Math.min(200, t.fontSize + delta));
      t.contentEl.style.fontSize = t.fontSize + 'px';
    });
    syncFormatUIToSelection();
  }, { passive: false });
}

let selectedTextBoxIds = new Set();

function selectTextBox(id) {
  selectedTextBoxIds.add(id);
  const tb = getTextBoxById(id);
  if (tb) tb.el.classList.add('selected');
  syncFormatUIToSelection();
}

function deselectTextBox(id) {
  selectedTextBoxIds.delete(id);
  const tb = getTextBoxById(id);
  if (tb) tb.el.classList.remove('selected');
  syncFormatUIToSelection();
}

function deselectAllTextBoxes() {
  selectedTextBoxIds.forEach(id => {
    const tb = getTextBoxById(id);
    if (tb) {
      tb.el.classList.remove('selected');
      tb.el.classList.remove('editing');
      tb.contentEl.contentEditable = 'false';
    }
  });
  selectedTextBoxIds.clear();
  activeTextBoxId = null;
}

const _origDeselectAll = deselectAll;
deselectAll = function() {
  _origDeselectAll();
  deselectAllTextBoxes();
};

function enterTextEditing(id, mouseEvent) {
  saveState();
  const tb = getTextBoxById(id);
  if (!tb) return;
  activeTextBoxId = id;
  tb.el.classList.add('editing');
  tb.contentEl.contentEditable = 'true';
  tb.contentEl.focus();

  if (mouseEvent) {
    let caretSet = false;
    if (document.caretPositionFromPoint) {
      const pos = document.caretPositionFromPoint(mouseEvent.clientX, mouseEvent.clientY);
      if (pos) {
        const sel = window.getSelection();
        const range = document.createRange();
        range.setStart(pos.offsetNode, pos.offset);
        range.collapse(true);
        sel.removeAllRanges();
        sel.addRange(range);
        caretSet = true;
      }
    } else if (document.caretRangeFromPoint) {
      const range = document.caretRangeFromPoint(mouseEvent.clientX, mouseEvent.clientY);
      if (range) {
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        sel.collapseToStart();
        caretSet = true;
      }
    }
    if (!caretSet) {
      const sel = window.getSelection();
      sel.selectAllChildren(tb.contentEl);
      sel.collapseToEnd();
    }
  } else {
    const sel = window.getSelection();
    sel.selectAllChildren(tb.contentEl);
    sel.collapseToEnd();
  }
}

function finalizeTextBox(id) {
  const tb = getTextBoxById(id);
  if (!tb) return;

  tb.text = tb.contentEl.innerHTML;
  tb.contentEl.contentEditable = 'false';
  tb.el.classList.remove('editing');

  const sel = window.getSelection();
  if (sel) sel.removeAllRanges();

  const plainText = tb.contentEl.textContent.trim();
  if (plainText === '') {
    removeTextBox(id);
    deselectAll();
    exitTextPlaceMode();
    return;
  }

  if (tb.width === null) {
    tb.width = tb.contentEl.offsetWidth + 2;
    tb.contentEl.style.width = tb.width + 'px';
  }

  if (activeTextBoxId === id) activeTextBoxId = null;

  deselectAll();
  exitTextPlaceMode();
}

function removeTextBox(id) {
  const state = templateStates[activeTemplateIndex];
  const idx = state.textBoxes.findIndex(tb => tb.id === id);
  if (idx >= 0) {
    state.textBoxes[idx].el.remove();
    state.textBoxes.splice(idx, 1);
  }
  selectedTextBoxIds.delete(id);
  if (activeTextBoxId === id) activeTextBoxId = null;
}

// Create a text box from a template config object into the given state.
// Used at template init time. Config supports any subset of these fields:
//   x, y, width, text, fontName, fontSize, fontColor, bold, italic, underline, align
// Unset fields fall back to sensible defaults.
function createTextBoxFromConfig(state, cfg) {
  if (!state.textBoxes) state.textBoxes = [];

  // Resolve font: config gives us a fontName (e.g. "DM Sans"); look up the family string.
  const fontDef = TEXT_FONTS.find(f => f.name === cfg.fontName) || TEXT_FONTS[0];

  const id = 'tb_' + nextTextBoxId++;
  const tb = {
    id,
    x: cfg.x || 0,
    y: cfg.y || 0,
    width: cfg.width || null,
    text: cfg.text || '',
    fontFamily: fontDef.family,
    fontName: fontDef.name,
    fontSize: cfg.fontSize || 24,
    fontColor: cfg.fontColor || DEFAULT_NEW_TEXT_COLOR,
    bold: !!cfg.bold,
    italic: !!cfg.italic,
    underline: !!cfg.underline,
    align: cfg.align || 'left',
    el: null,
    contentEl: null,
    // Sync tags carried from the template config (if any).
    // Read `_matchingIndex` (stamped at derivation) with fallback to
    // `matching_index` for configs restored from snapshots before derivation.
    _fromTemplate: !!cfg._fromTemplate,
    _matchingIndex:
      (typeof cfg._matchingIndex === 'number') ? cfg._matchingIndex :
      (typeof cfg.matching_index === 'number') ? cfg.matching_index :
      null,
  };

  const el = document.createElement('div');
  el.className = 'text-box';
  el.dataset.tbid = id;
  el.style.left = tb.x + 'px';
  el.style.top = tb.y + 'px';

  const border = document.createElement('div');
  border.className = 'text-border';
  el.appendChild(border);

  const content = document.createElement('div');
  content.className = 'text-content';
  content.contentEditable = 'false';
  content.spellcheck = false;
  content.innerHTML = tb.text;
  content.style.fontFamily = tb.fontFamily;
  content.style.fontSize = tb.fontSize + 'px';
  content.style.color = tb.fontColor;
  content.style.fontWeight = tb.bold ? 'bold' : 'normal';
  content.style.fontStyle = tb.italic ? 'italic' : 'normal';
  content.style.textDecoration = tb.underline ? 'underline' : 'none';
  content.style.textAlign = tb.align;
  if (tb.width) content.style.width = tb.width + 'px';
  el.appendChild(content);

  ['l', 'r', 't', 'b'].forEach(side => {
    const h = document.createElement('div');
    h.className = `text-handle th-${side}`;
    h.dataset.thside = side;
    el.appendChild(h);
  });

  tb.el = el;
  tb.contentEl = content;
  state.textBoxes.push(tb);

  attachTextBoxEvents(tb);

  return tb;
}

function duplicateTextBox(id, e) {
  const src = getTextBoxById(id);
  if (!src) return;

  const tbSources = selectedTextBoxIds.has(id) ? [...selectedTextBoxIds] : [id];
  const frameSources = new Map();
  selectedIndices.forEach(idx => {
    frameSources.set(idx, { x: cells[idx].cfg.x, y: cells[idx].cfg.y });
  });

  deselectAll();

  const state = templateStates[activeTemplateIndex];
  const allClonedTextBoxIds = [];
  const cloneTextStartPositions = new Map();

  tbSources.forEach(srcId => {
    const s = getTextBoxById(srcId);
    if (!s) return;
    const clone = cloneTextBox(s);
    allClonedTextBoxIds.push(clone.id);
    cloneTextStartPositions.set(clone.id, { x: s.x, y: s.y });
    s.el.style.opacity = '0.4';
  });

  const allClonedFrameIndices = [];
  const cloneFrameStartPositions = new Map();
  frameSources.forEach((pos, srcIdx) => {
    const cloneIdx = duplicateCell(srcIdx, pos.x, pos.y);
    if (cloneIdx >= 0) {
      allClonedFrameIndices.push(cloneIdx);
      cloneFrameStartPositions.set(cloneIdx, pos);
      cells[srcIdx].el.style.opacity = '0.4';
    }
  });

  allClonedFrameIndices.forEach(cloneIdx => {
    state.selectedIndices.add(cloneIdx);
    cells[cloneIdx].el.classList.add('selected', 'dragging');
  });
  selectedIndices = state.selectedIndices;
  allClonedTextBoxIds.forEach(cloneId => selectTextBox(cloneId));
  updateLabel();

  duplicating = true;
  dupSourceIdx = -1; 
  dupDragStartX = e.clientX;
  dupDragStartY = e.clientY;
  dupCloneIndices = allClonedFrameIndices;
  dupCloneToStartPos = cloneFrameStartPositions;
  dupStartPositions = frameSources;
  dupTextBoxSources = tbSources;
  dupTextBoxCloneIds = allClonedTextBoxIds;
  dupTextBoxCloneStartPos = cloneTextStartPositions;
}

function enterTextPlaceMode() {

function exitTextPlaceMode() {

let textCreateDragging = false;
let textCreateStartX = 0;
let textCreateStartY = 0;
let textCreatePreviewEl = null;

canvasArea.addEventListener('mousedown', (e) => {
  if (!textPlaceMode) return;
  if (e.target.closest('.text-box')) return;

  if (activeTextBoxId) {
    e.preventDefault();
    e.stopPropagation();
    finalizeTextBox(activeTextBoxId);
    return;
  }

  e.preventDefault();
  e.stopPropagation();

  const rect = canvasArea.getBoundingClientRect();
  textCreateStartX = e.clientX - rect.left;
  textCreateStartY = e.clientY - rect.top;
  textCreateDragging = true;

  textCreatePreviewEl = document.createElement('div');
  textCreatePreviewEl.className = 'text-create-preview';
  textCreatePreviewEl.style.left = textCreateStartX + 'px';
  textCreatePreviewEl.style.top = textCreateStartY + 'px';
  textCreatePreviewEl.style.width = '0px';
  textCreatePreviewEl.style.height = '0px';
  canvasArea.appendChild(textCreatePreviewEl);

  deselectAll();
}, true); 

window.addEventListener('mousemove', (e) => {
  if (!textCreateDragging || !textCreatePreviewEl) return;

  const rect = canvasArea.getBoundingClientRect();
  const currentX = e.clientX - rect.left;
  const currentY = e.clientY - rect.top;

  const left = Math.min(textCreateStartX, currentX);
  const top = Math.min(textCreateStartY, currentY);
  const width = Math.abs(currentX - textCreateStartX);
  const height = Math.abs(currentY - textCreateStartY);

  textCreatePreviewEl.style.left = left + 'px';
  textCreatePreviewEl.style.top = top + 'px';
  textCreatePreviewEl.style.width = width + 'px';
  textCreatePreviewEl.style.height = height + 'px';
});

window.addEventListener('mouseup', (e) => {
  if (!textCreateDragging) return;
  textCreateDragging = false;

  if (textCreatePreviewEl) {
    textCreatePreviewEl.remove();
    textCreatePreviewEl = null;
  }

  const rect = canvasArea.getBoundingClientRect();
  const endX = e.clientX - rect.left;
  const endY = e.clientY - rect.top;
  const dragWidth = Math.abs(endX - textCreateStartX);
  const leftX = Math.min(textCreateStartX, endX);
  const topY = Math.min(textCreateStartY, endY);

  const MIN_DRAG_WIDTH = 10; 

  saveState();
  if (dragWidth > MIN_DRAG_WIDTH) {
    const tb = createTextBox(leftX, topY);
    tb.width = dragWidth;
    tb.contentEl.style.width = dragWidth + 'px';
  } else {
    createTextBox(textCreateStartX, textCreateStartY);
  }
});

function snapCoordsToEdges(x, y, showGuides) {
  const { hEdges, vEdges } = getEdgeAlignmentTargets(new Set(), new Set());
  let snappedX = x, snappedY = y;
  let snappedToV = null, snappedToH = null;

  // Point-snap has no moving rect, so we can't do line-of-sight obstruction
  // checks here — snap to the nearest edge coordinate.
  let bestDx = Infinity;
  for (const ve of vEdges) {
    const dist = Math.abs(x - ve.x);
    if (dist < ALIGNMENT_STRETCH_CLICK_PIXELS && dist < bestDx) {
      bestDx = dist;
      snappedX = ve.x;
      snappedToV = ve.x;
    }
  }

  let bestDy = Infinity;
  for (const he of hEdges) {
    const dist = Math.abs(y - he.y);
    if (dist < ALIGNMENT_STRETCH_CLICK_PIXELS && dist < bestDy) {
      bestDy = dist;
      snappedY = he.y;
      snappedToH = he.y;
    }
  }

  if (showGuides) {
    if (snappedToV !== null) {
      const g = ensureGuideV(0);
      g.style.left = snappedToV + 'px';
      g.style.display = '';
    } else if (activeGuideVs.length > 0) {
      activeGuideVs[0].style.display = 'none';
    }
    for (let i = 1; i < activeGuideVs.length; i++) {
      activeGuideVs[i].style.display = 'none';
    }

    if (snappedToH !== null) {
      const g = ensureGuideH(0);
      g.style.top = snappedToH + 'px';
      g.style.display = '';
    } else if (activeGuideHs.length > 0) {
      activeGuideHs[0].style.display = 'none';
    }
    for (let i = 1; i < activeGuideHs.length; i++) {
      activeGuideHs[i].style.display = 'none';
    }
  }

  return { x: snappedX, y: snappedY };
}

function getShapeDrawRect(startX, startY, curX, curY, constrain) {
  let width = Math.abs(curX - startX);
  let height = Math.abs(curY - startY);

  if (constrain) {
    const size = Math.max(width, height);
    width = size;
    height = size;
  }

  const left = curX >= startX ? startX : startX - width;
  const top = curY >= startY ? startY : startY - height;

  return { left, top, width, height };
}

window.addEventListener('mousemove', (e) => {
  if (!shapeCreateDragging || !shapeCreatePreviewEl) return;

  const rect = canvasArea.getBoundingClientRect();
  let currentX = e.clientX - rect.left;
  let currentY = e.clientY - rect.top;

  const snapped = snapCoordsToEdges(currentX, currentY, false);
  currentX = snapped.x;
  currentY = snapped.y;

  const { left, top, width, height } = getShapeDrawRect(
    shapeCreateStartX, shapeCreateStartY, currentX, currentY, e.shiftKey
  );

  shapeCreatePreviewEl.style.left = left + 'px';
  shapeCreatePreviewEl.style.top = top + 'px';
  shapeCreatePreviewEl.style.width = width + 'px';
  shapeCreatePreviewEl.style.height = height + 'px';

  // Update the dimension label (follows the bottom-right corner of the preview)
  if (shapeDimLabelEl) {
    shapeDimLabelEl.textContent = `${Math.round(width)} × ${Math.round(height)}`;
    shapeDimLabelEl.style.left = (left + width) + 'px';
    shapeDimLabelEl.style.top = (top + height) + 'px';
  }

  showDrawRectGuides(left, top, width, height);

  const shapeKey = shapeDrawType === 'square' ? null : shapeDrawType;
  if (shapeKey && width > 0 && height > 0) {
    const shapeDef = SHAPES[shapeKey];
    if (shapeDef) {
      const sp = scalePath(shapeDef.path, shapeDef.viewBox, width, height);
      shapeCreatePreviewEl.innerHTML = `<svg viewBox="0 0 ${width} ${height}"><path class="preview-path" d="${sp}"/></svg>`;
    }
  }
});

function showDrawRectGuides(left, top, width, height) {
  const { hEdges, vEdges } = getEdgeAlignmentTargets(new Set(), new Set());
  const rectEdges = {
    left: left,
    right: left + width,
    top: top,
    bottom: top + height,
  };
  const mL = left, mT = top, mR = left + width, mB = top + height;

  const guideVSet = new Set();
  const guideHSet = new Set();

  for (const ve of vEdges) {
    const matches = Math.abs(rectEdges.left - ve.x) < 0.5 || Math.abs(rectEdges.right - ve.x) < 0.5;
    if (matches && !edgeAlignmentObstructed('v', ve.x, mL, mT, mR, mB, ve.src, new Set()))
      guideVSet.add(Math.round(ve.x));
  }
  for (const he of hEdges) {
    const matches = Math.abs(rectEdges.top - he.y) < 0.5 || Math.abs(rectEdges.bottom - he.y) < 0.5;
    if (matches && !edgeAlignmentObstructed('h', he.y, mL, mT, mR, mB, he.src, new Set()))
      guideHSet.add(Math.round(he.y));
  }

  const guideVArr = [...guideVSet];
  const guideHArr = [...guideHSet];

  guideVArr.forEach((x, i) => {
    const g = ensureGuideV(i);
    g.style.left = x + 'px';
    g.style.display = '';
  });
  for (let i = guideVArr.length; i < activeGuideVs.length; i++) {
    activeGuideVs[i].style.display = 'none';
  }

  guideHArr.forEach((y, i) => {
    const g = ensureGuideH(i);
    g.style.top = y + 'px';
    g.style.display = '';
  });
  for (let i = guideHArr.length; i < activeGuideHs.length; i++) {
    activeGuideHs[i].style.display = 'none';
  }
}

canvasArea.addEventListener('mousemove', (e) => {
  if (!shapeDrawMode || shapeCreateDragging) return;
  const rect = canvasArea.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  snapCoordsToEdges(x, y, true);
});

window.addEventListener('mouseup', (e) => {
  if (!shapeCreateDragging) return;
  shapeCreateDragging = false;

  if (shapeCreatePreviewEl) {
    shapeCreatePreviewEl.remove();
    shapeCreatePreviewEl = null;
  }

  if (shapeDimLabelEl) {
    shapeDimLabelEl.remove();
    shapeDimLabelEl = null;
  }

  const rect = canvasArea.getBoundingClientRect();
  let endX = e.clientX - rect.left;
  let endY = e.clientY - rect.top;

  const snapped = snapCoordsToEdges(endX, endY, false);
  endX = snapped.x;
  endY = snapped.y;
  hideGuides();

  const { left: x, top: y, width: w, height: h } = getShapeDrawRect(
    shapeCreateStartX, shapeCreateStartY, endX, endY, e.shiftKey
  );

  const MIN_SIZE = 20;
  if (w < MIN_SIZE || h < MIN_SIZE) {
    exitShapeDrawMode();
    return;
  }

  const finalX = Math.max(0, x);
  const finalY = Math.max(0, y);
  const finalW = Math.min(w, CANVAS_W - finalX);
  const finalH = Math.min(h, CANVAS_H - finalY);

  const shapeKey = shapeDrawType === 'square' ? null : shapeDrawType;
  const newCfg = {
    x: finalX,
    y: finalY,
    w: finalW,
    h: finalH,
    shape: shapeKey,
    label: shapeDrawType,
  };

  saveState();
  const state = templateStates[activeTemplateIndex];
  const tmpl = TEMPLATES[activeTemplateIndex];
  tmpl.frames.push(newCfg);

  const newIdx = state.cells.length;
  const newCell = createCell(state, tmpl, newCfg, newIdx);
  state.cells.push(newCell);
  cells = state.cells;

  canvasArea.appendChild(newCell.el);
  canvasArea.appendChild(newCell.controlsEl);

  selectCellFor(state, newIdx);
  exitShapeDrawMode();
});

    }
    if (textPlaceMode) {

    }

  }
});

let arrowKeyGuideTimer = null;
let arrowKeyFrameStarts = null;      
let arrowKeyTextStarts = null;       
let arrowKeyAccumDx = 0;             
let arrowKeyAccumDy = 0;
let arrowKeySessionTimer = null;

// ADD THESE TWO LINES:
let fineModeSessionActive = false;
let fineModeSessionTimer = null;

function resetArrowKeySession() {
  arrowKeyFrameStarts = null;
  arrowKeyTextStarts = null;
  arrowKeyAccumDx = 0;
  arrowKeyAccumDy = 0;
  arrowKeySessionTimer = null;
}

window.addEventListener('keydown', (e) => {
  if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown' && e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;

  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.target.contentEditable === 'true') return;

  if (selectedIndices.size === 0 && selectedTextBoxIds.size === 0) return;

  e.preventDefault();

  // Check for Ctrl / Meta (Cmd) for fine mode
  const fineMode = e.ctrlKey || e.metaKey;

  if (fineMode) {
    // 1. Build current position maps
    const frameCurrent = new Map();
    selectedIndices.forEach(idx => {
      const s = cells[idx];
      if (s) frameCurrent.set(idx, { x: s.cfg.x, y: s.cfg.y });
    });
    const textCurrent = new Map();
    selectedTextBoxIds.forEach(tbId => {
      const tb = getTextBoxById(tbId);
      if (tb) textCurrent.set(tbId, { x: tb.x, y: tb.y });
    });

    // 2. Save state once per sequence of fine-moves
    if (!fineModeSessionActive) {
      saveState();
      fineModeSessionActive = true;
    }
    
    // Reset the coarse session so a regular press afterwards starts fresh
    if (arrowKeyFrameStarts) resetArrowKeySession();

    let dx = 0, dy = 0;
    if (e.key === 'ArrowLeft') dx = -1;
    else if (e.key === 'ArrowRight') dx = 1;
    else if (e.key === 'ArrowUp') dy = -1;
    else if (e.key === 'ArrowDown') dy = 1;

    // 3. Apply exact 1px positions directly (NO applyAlignmentSnap)
    applyDragPositions(
      dx, dy,
      frameCurrent.size > 0 ? frameCurrent : null,
      textCurrent.size > 0 ? textCurrent : null
    );

    // 4. Show guides only when alignment is exactly identical
    showAlignmentGuidesForCurrentPositions();

    clearTimeout(arrowKeyGuideTimer);
    arrowKeyGuideTimer = setTimeout(() => hideGuides(), 500);

    // Reset fine-mode session after idle
    clearTimeout(fineModeSessionTimer);
    fineModeSessionTimer = setTimeout(() => { fineModeSessionActive = false; }, 800);
    return;
  }

  // --- EXISTING COARSE MODE (Standard 3px Snapping) ---
  fineModeSessionActive = false;
  clearTimeout(fineModeSessionTimer);
  
  const selectionChanged = arrowKeyFrameStarts && (
    arrowKeyFrameStarts.size !== selectedIndices.size ||
    ![...selectedIndices].every(i => arrowKeyFrameStarts.has(i)) ||
    (arrowKeyTextStarts && (
      arrowKeyTextStarts.size !== selectedTextBoxIds.size ||
      ![...selectedTextBoxIds].every(id => arrowKeyTextStarts.has(id))
    ))
  );

  if (!arrowKeyFrameStarts || selectionChanged) {
    saveState();
    arrowKeyFrameStarts = new Map();
    selectedIndices.forEach(idx => {
      const s = cells[idx];
      if (s) arrowKeyFrameStarts.set(idx, { x: s.cfg.x, y: s.cfg.y });
    });
    arrowKeyTextStarts = new Map();
    selectedTextBoxIds.forEach(tbId => {
      const tb = getTextBoxById(tbId);
      if (tb) arrowKeyTextStarts.set(tbId, { x: tb.x, y: tb.y });
    });
    arrowKeyAccumDx = 0;
    arrowKeyAccumDy = 0;
  }

  if (e.key === 'ArrowLeft') arrowKeyAccumDx -= ARROW_KEY_MOVE_PIXELS;
  else if (e.key === 'ArrowRight') arrowKeyAccumDx += ARROW_KEY_MOVE_PIXELS;
  else if (e.key === 'ArrowUp') arrowKeyAccumDy -= ARROW_KEY_MOVE_PIXELS;
  else if (e.key === 'ArrowDown') arrowKeyAccumDy += ARROW_KEY_MOVE_PIXELS;

  const dragFrameSet = new Set(arrowKeyFrameStarts.keys());
  const dragTextSet = new Set(arrowKeyTextStarts.keys());
  
  // Snap applied here for standard arrow keys
  const { dx, dy } = applyMoveSnap(
    arrowKeyAccumDx, arrowKeyAccumDy, dragFrameSet, dragTextSet,
    arrowKeyFrameStarts.size > 0 ? arrowKeyFrameStarts : null,
    arrowKeyTextStarts.size > 0 ? arrowKeyTextStarts : null
  );

  applyDragPositions(
    dx, dy,
    arrowKeyFrameStarts.size > 0 ? arrowKeyFrameStarts : null,
    arrowKeyTextStarts.size > 0 ? arrowKeyTextStarts : null
  );

  clearTimeout(arrowKeyGuideTimer);
  arrowKeyGuideTimer = setTimeout(() => hideGuides(), 500);

  clearTimeout(arrowKeySessionTimer);
  arrowKeySessionTimer = setTimeout(resetArrowKeySession, 800);
});


// Add this helper function below the keydown listener
function showAlignmentGuidesForCurrentPositions() {
  const dragFrameSet = new Set(selectedIndices);
  const dragTextSet = new Set(selectedTextBoxIds);
  const targets = getAlignmentTargets(dragFrameSet, dragTextSet);
  const { hEdges, vEdges } = getEdgeAlignmentTargets(dragFrameSet, dragTextSet);

  const guideHSet = new Set();
  const guideVSet = new Set();

  // Check exact alignment for frames
  selectedIndices.forEach(idx => {
    const s = cells[idx];
    if (!s) return;
    const cx = s.cfg.x + s.cfg.w / 2;
    const cy = s.cfg.y + s.cfg.h / 2;
    const left = s.cfg.x;
    const right = s.cfg.x + s.cfg.w;
    const top = s.cfg.y;
    const bottom = s.cfg.y + s.cfg.h;
    
    for (const t of targets) {
      if (Math.abs(cx - t.cx) < 0.5 &&
          !centerAlignmentTooFar('v', left, top, right, bottom, t.src) &&
          !edgeAlignmentObstructed('v', t.cx, left, top, right, bottom, t.src, dragFrameSet))
        guideVSet.add(Math.round(t.cx));
      if (Math.abs(cy - t.cy) < 0.5 &&
          !centerAlignmentTooFar('h', left, top, right, bottom, t.src) &&
          !edgeAlignmentObstructed('h', t.cy, left, top, right, bottom, t.src, dragFrameSet))
        guideHSet.add(Math.round(t.cy));
    }
    for (const ve of vEdges) {
      const matches = Math.abs(left - ve.x) < 0.5 || Math.abs(right - ve.x) < 0.5;
      if (matches && !edgeAlignmentObstructed('v', ve.x, left, top, right, bottom, ve.src, dragFrameSet))
        guideVSet.add(Math.round(ve.x));
    }
    for (const he of hEdges) {
      const matches = Math.abs(top - he.y) < 0.5 || Math.abs(bottom - he.y) < 0.5;
      if (matches && !edgeAlignmentObstructed('h', he.y, left, top, right, bottom, he.src, dragFrameSet))
        guideHSet.add(Math.round(he.y));
    }
  });

  // Check exact alignment for text boxes
  selectedTextBoxIds.forEach(tbId => {
    const tb = getTextBoxById(tbId);
    if (!tb) return;
    const w = tb.width || tb.contentEl.offsetWidth;
    const h = tb.contentEl.offsetHeight;
    const cx = tb.x + w / 2;
    const cy = tb.y + h / 2;
    const left = tb.x;
    const right = tb.x + w;
    const top = tb.y;
    const bottom = tb.y + h;
    
    for (const t of targets) {
      if (Math.abs(cx - t.cx) < 0.5 &&
          !centerAlignmentTooFar('v', left, top, right, bottom, t.src) &&
          !edgeAlignmentObstructed('v', t.cx, left, top, right, bottom, t.src, dragFrameSet))
        guideVSet.add(Math.round(t.cx));
      if (Math.abs(cy - t.cy) < 0.5 &&
          !centerAlignmentTooFar('h', left, top, right, bottom, t.src) &&
          !edgeAlignmentObstructed('h', t.cy, left, top, right, bottom, t.src, dragFrameSet))
        guideHSet.add(Math.round(t.cy));
    }
    for (const ve of vEdges) {
      const matches = Math.abs(left - ve.x) < 0.5 || Math.abs(right - ve.x) < 0.5;
      if (matches && !edgeAlignmentObstructed('v', ve.x, left, top, right, bottom, ve.src, dragFrameSet))
        guideVSet.add(Math.round(ve.x));
    }
    for (const he of hEdges) {
      const matches = Math.abs(top - he.y) < 0.5 || Math.abs(bottom - he.y) < 0.5;
      if (matches && !edgeAlignmentObstructed('h', he.y, left, top, right, bottom, he.src, dragFrameSet))
        guideHSet.add(Math.round(he.y));
    }
  });

  // Apply visual guides to DOM
  const guideHArr = [...guideHSet];
  const guideVArr = [...guideVSet];
  
  guideHArr.forEach((y, i) => {
    const g = ensureGuideH(i);
    g.style.top = y + 'px';
    g.style.display = '';
  });
  for (let i = guideHArr.length; i < activeGuideHs.length; i++) {
    activeGuideHs[i].style.display = 'none';
  }
  
  guideVArr.forEach((x, i) => {
    const g = ensureGuideV(i);
    g.style.left = x + 'px';
    g.style.display = '';
  });
  for (let i = guideVArr.length; i < activeGuideVs.length; i++) {
    activeGuideVs[i].style.display = 'none';
  }
}

function syncFormatUIToSelection() {
  const section = document.getElementById('textFormatSection');
  const colorSection = document.getElementById('textColorSection');
  const borderSection = document.getElementById('borderWeightSection');

  const hasText = selectedTextBoxIds.size > 0;
  const hasFrames = selectedIndices.size > 0;
  const onlyFrames = hasFrames && !hasText;

  if (hasText) {
    section.classList.remove('rs-disabled');
  } else {
    section.classList.add('rs-disabled');
  }

  if (hasText || hasFrames) {
    colorSection.classList.remove('rs-disabled');
  } else {
    colorSection.classList.add('rs-disabled');
  }

  if (onlyFrames) {
    borderSection.classList.remove('rs-disabled');
    const firstIdx = [...selectedIndices][0];
    const s = cells[firstIdx];
    if (s) {
      document.getElementById('rsBorderToggle').checked = s.borderEnabled;
      document.getElementById('rsBorderWeight').value = s.borderWidth;
    }
  } else {
    borderSection.classList.add('rs-disabled');
  }

  if (!hasText && !hasFrames) return;

  if (hasText) {
    const firstId = [...selectedTextBoxIds][0];
    const tb = getTextBoxById(firstId);
    if (!tb) return;

    document.getElementById('rsFontFamily').value = tb.fontName;
    document.getElementById('rsFontSize').value = tb.fontSize;
    document.getElementById('rsBold').classList.toggle('active', tb.bold);
    document.getElementById('rsItalic').classList.toggle('active', tb.italic);
    document.getElementById('rsUnderline').classList.toggle('active', tb.underline);
    document.getElementById('rsAlignLeft').classList.toggle('active', tb.align === 'left');
    document.getElementById('rsAlignCenter').classList.toggle('active', tb.align === 'center');
    document.getElementById('rsAlignRight').classList.toggle('active', tb.align === 'right');
    updateColorUI(tb.fontColor);
  } else if (hasFrames) {
    const firstIdx = [...selectedIndices][0];
    const s = cells[firstIdx];
    if (s) updateColorUI(s.borderColor);
  }

  // Keep distribute buttons in sync with selection count.
  if (typeof updateDistributeButtons === 'function') updateDistributeButtons();
}

function updateColorUI(color) {
  const hex = color.toUpperCase();
  document.getElementById('rsColorPicker').value = color;
  document.getElementById('rsHexInput').value = hex;
  document.getElementById('rsColorPreview').style.background = color;

  document.querySelectorAll('.rs-swatch').forEach(sw => {
    sw.classList.toggle('active', sw.dataset.color.toUpperCase() === hex);
  });
}

function applyToSelectedTextBoxes(fn) {
  selectedTextBoxIds.forEach(id => {
    const tb = getTextBoxById(id);
    if (tb) fn(tb);
  });
  syncFormatUIToSelection();
}

function applyColorToSelectedFrames(color) {
  selectedIndices.forEach(idx => {
    const s = cells[idx];
    if (!s) return;
    s.borderColor = color;
    if (!s.borderEnabled) {
      s.borderEnabled = true;
      s.borderWidth = s.borderWidth || DEFAULT_FRAME_BORDER_WIDTH;
    }
    applyUserBorder(s);
  });
  syncFormatUIToSelection();
}

function applyColorToSelection(color) {
  selectedTextBoxIds.forEach(id => {
    const tb = getTextBoxById(id);
    if (tb) {
      tb.fontColor = color;
      tb.contentEl.style.color = color;
    }
  });
  selectedIndices.forEach(idx => {
    const s = cells[idx];
    if (!s) return;
    s.borderColor = color;
    if (!s.borderEnabled) {
      s.borderEnabled = true;
      s.borderWidth = s.borderWidth || DEFAULT_FRAME_BORDER_WIDTH;
    }
    applyUserBorder(s);
  });
  syncFormatUIToSelection();
  updateColorUI(color);
}

// Gather rects for all currently selected objects (frames + text boxes).
// Returns array of { kind, key, L, T, R, B, obj } sorted by left (or top
// for vertical distribute).
function getSelectedObjectRects() {
  const rects = [];
  selectedIndices.forEach(idx => {
    const s = cells[idx];
    if (!s) return;
    rects.push({
      kind: 'frame', key: idx,
      L: s.cfg.x, T: s.cfg.y,
      R: s.cfg.x + s.cfg.w, B: s.cfg.y + s.cfg.h,
      obj: s,
    });
  });
  selectedTextBoxIds.forEach(tbId => {
    const tb = getTextBoxById(tbId);
    if (!tb) return;
    const w = tb.width || tb.contentEl.offsetWidth;
    const h = tb.contentEl.offsetHeight;
    rects.push({
      kind: 'tb', key: tbId,
      L: tb.x, T: tb.y,
      R: tb.x + w, B: tb.y + h,
      obj: tb,
    });
  });
  return rects;
}

function distributeHorizontally() {
  const rects = getSelectedObjectRects();
  if (rects.length < 2) return;
  saveState();

  // Sort left-to-right by left edge (tie-break by center).
  rects.sort((a, b) => a.L - b.L || (a.L + a.R) / 2 - (b.L + b.R) / 2);

  // Total width consumed by objects themselves.
  const totalObjWidth = rects.reduce((s, r) => s + (r.R - r.L), 0);
  // Available span from leftmost left edge to rightmost right edge.
  const spanLeft = rects[0].L;
  const spanRight = rects[rects.length - 1].R;
  const totalSpan = spanRight - spanLeft;
  // Total gap to distribute evenly among (n − 1) intervals.
  const totalGap = totalSpan - totalObjWidth;
  const gap = totalGap / (rects.length - 1);

  // Place each object: the leftmost stays put; subsequent objects are
  // positioned so that the gap between the previous right edge and this
  // left edge equals `gap`.
  let cursor = spanLeft;
  rects.forEach((r, i) => {
    const objW = r.R - r.L;
    const newL = i === 0 ? r.L : cursor;
    const dx = newL - r.L;

    if (Math.abs(dx) > 0.001) {
      if (r.kind === 'frame') {
        r.obj.cfg.x = newL;
        r.obj.el.style.left = newL + 'px';
        syncFrameControls(r.obj);
      } else {
        r.obj.x = newL;
        r.obj.el.style.left = newL + 'px';
      }
    }
    cursor = newL + objW + gap;
  });
}

function distributeVertically() {
  const rects = getSelectedObjectRects();
  if (rects.length < 2) return;
  saveState();

  rects.sort((a, b) => a.T - b.T || (a.T + a.B) / 2 - (b.T + b.B) / 2);

  const totalObjHeight = rects.reduce((s, r) => s + (r.B - r.T), 0);
  const spanTop = rects[0].T;
  const spanBottom = rects[rects.length - 1].B;
  const totalSpan = spanBottom - spanTop;
  const totalGap = totalSpan - totalObjHeight;
  const gap = totalGap / (rects.length - 1);

  let cursor = spanTop;
  rects.forEach((r, i) => {
    const objH = r.B - r.T;
    const newT = i === 0 ? r.T : cursor;
    const dy = newT - r.T;

    if (Math.abs(dy) > 0.001) {
      if (r.kind === 'frame') {
        r.obj.cfg.y = newT;
        r.obj.el.style.top = newT + 'px';
        syncFrameControls(r.obj);
      } else {
        r.obj.y = newT;
        r.obj.el.style.top = newT + 'px';
      }
    }
    cursor = newT + objH + gap;
  });
}

function drawTextBoxToCanvas(ctx, tb) {
  ctx.save();

  const fontSize = tb.fontSize;
  const fontWeight = tb.bold ? 'bold' : 'normal';
  const fontStyle = tb.italic ? 'italic' : 'normal';
  const fontFamily = tb.fontFamily;
  
  ctx.font = `${fontStyle} ${fontWeight} ${fontSize}px ${fontFamily}`;
  ctx.fillStyle = tb.fontColor;
  ctx.textBaseline = 'top';

  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = tb.text;
  const textContent = tb.text
    .replace(/<br\s*\/?>/gi, '\n')
    .replace(/<\/div><div>/gi, '\n')
    .replace(/<div>/gi, '\n')
    .replace(/<\/div>/gi, '')
    .replace(/<[^>]*>/g, '');
  tempDiv.innerHTML = textContent;
  const decoded = tempDiv.textContent || tempDiv.innerText || '';

  const lines = decoded.split('\n');
  const lineHeight = fontSize * 1.3;
  const boxWidth = tb.width || 9999;

  const wrappedLines = [];
  lines.forEach(line => {
    if (line === '') { wrappedLines.push(''); return; }
    const words = line.split(' ');
    let currentLine = '';
    words.forEach(word => {
      const testLine = currentLine ? currentLine + ' ' + word : word;
      const metrics = ctx.measureText(testLine);
      if (metrics.width > boxWidth && currentLine) {
        wrappedLines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) wrappedLines.push(currentLine);
  });

  wrappedLines.forEach((line, i) => {
    let drawX = tb.x;
    if (tb.align === 'center' && tb.width) {
      const w = ctx.measureText(line).width;
      drawX = tb.x + (tb.width - w) / 2;
    } else if (tb.align === 'right' && tb.width) {
      const w = ctx.measureText(line).width;
      drawX = tb.x + tb.width - w;
    }
    ctx.fillText(line, drawX, tb.y + i * lineHeight);
  });

  if (tb.underline) {
    ctx.strokeStyle = tb.fontColor;
    ctx.lineWidth = Math.max(1, fontSize / 14);
    wrappedLines.forEach((line, i) => {
      const w = ctx.measureText(line).width;
      let lx = tb.x;
      if (tb.align === 'center' && tb.width) lx = tb.x + (tb.width - w) / 2;
      else if (tb.align === 'right' && tb.width) lx = tb.x + tb.width - w;
      const ly = tb.y + i * lineHeight + fontSize + 2;
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx + w, ly);
      ctx.stroke();
    });
  }

  ctx.restore();
}

document.getElementById('downloadBtn').addEventListener('click', async () => {
  const btn = document.getElementById('downloadBtn');
  const originalText = btn.textContent;
  btn.textContent = 'Exporting…';
  btn.disabled = true;

  try {
    // 1. Render the full canvas once.
    let fullCanvas;
    let bgIncluded = true;
    try {
      fullCanvas = await renderFullCanvas(true);
    } catch (err) {
      console.warn("Canvas Tainted. Exporting without background...", err);
      fullCanvas = await renderFullCanvas(false);
      bgIncluded = false;
      alert("Note: Due to strict browser security (CORS) on local files, the background image could not be exported. Your frames were successfully exported instead.\n\nTo include the background image in the future, run this file on a local web server (like Live Server).");
    }

    const fullW = fullCanvas.width;
    const fullH = fullCanvas.height;

    // Helper: convert a canvas to a PNG blob (returns a Promise).
    const canvasToBlob = (cvs) => new Promise((resolve, reject) => {
      cvs.toBlob((blob) => {
        if (blob) resolve(blob);
        else reject(new Error('Blob generation failed'));
      }, 'image/png');
    });

    // 2. Full canvas blob.
    const fullBlob = await canvasToBlob(fullCanvas);

    // 3. Generate partition blobs.
    const partHeight = Math.floor(fullH / N_PARTITIONS);
    const partitionBlobs = [];
    for (let p = 0; p < N_PARTITIONS; p++) {
      const sy = p * partHeight;
      // Last partition absorbs any remainder pixels.
      const sh = (p === N_PARTITIONS - 1) ? (fullH - sy) : partHeight;

      const partCanvas = document.createElement('canvas');
      partCanvas.width = fullW;
      partCanvas.height = sh;
      const pCtx = partCanvas.getContext('2d');
      // drawImage(source, sx, sy, sw, sh, dx, dy, dw, dh)
      pCtx.drawImage(fullCanvas, 0, sy, fullW, sh, 0, 0, fullW, sh);
      partitionBlobs.push(await canvasToBlob(partCanvas));
    }

    // 4. Build the zip.
    const zip = new JSZip();
    const tmplName = TEMPLATES[activeTemplateIndex].name.replace(/\s+/g, '-').toLowerCase();
    zip.file(`canvas-${tmplName}.png`, fullBlob);
    partitionBlobs.forEach((blob, i) => {
      zip.file(`${i + 1}.png`, blob);
    });

    // 5. Generate and download the zip.
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `canvas-${tmplName}.zip`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

  } catch (error) {
    console.error('Final export error:', error);
    alert('A critical error occurred during export.');
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
});

/**
 * Serialize a single viewport's template state into a plain JSON-safe object.
 * Reuses the existing reading-order sort logic.
 */
function serializeViewportState(templateIndex) {
  const state = templateStates[templateIndex];
  const tmpl = TEMPLATES[templateIndex];

  // If this template was never initialized (user never switched to it),
  // fall back to the raw config from TEMPLATE_PAIRS.
  if (!state) {
    const pairIdx = tmpl._pairIndex;
    const pair = TEMPLATE_PAIRS[pairIdx];
    const raw = tmpl._viewport === 'mobile' ? pair.mobile : pair.desktop;
    return {
      name: raw.name || tmpl._viewport,
      canvasW: raw.canvasW,
      canvasH: raw.canvasH,
      bgColor: raw.bgColor,
      bgImage: raw.bgImage || null,
      frames: (raw.frames || []).map(f => ({
        x: Math.round(f.x), y: Math.round(f.y),
        w: Math.round(f.w), h: Math.round(f.h),
        shape: f.shape || null,
        matching_index: (typeof f.matching_index === 'number') ? f.matching_index : null,
        borderEnabled: f.borderEnabled || false,
        borderColor: f.borderColor || '#ffffff',
        borderWidth: f.borderWidth || 1,
      })),
      textBoxes: (raw.textBoxes || []).map(tb => ({
        x: Math.round(tb.x), y: Math.round(tb.y),
        width: tb.width ? Math.round(tb.width) : null,
        text: tb.text || '',
        matching_index: (typeof tb.matching_index === 'number') ? tb.matching_index : null,
        fontName: tb.fontName || 'DM Sans',
        fontSize: tb.fontSize || 16,
        fontColor: tb.fontColor || '#000000',
        bold: tb.bold || false,
        italic: tb.italic || false,
        underline: tb.underline || false,
        align: tb.align || 'left',
      })),
    };
  }

  // ─── Reading-order sort (same algorithm as the old exporter) ──────
  function sortReadingOrder(items) {
    const sorted = [...items].sort((a, b) => a.top - b.top || a.left - b.left);
    const rows = [];
    let currentRow = null;
    let currentRowBottom = -Infinity;
    sorted.forEach(entry => {
      if (!currentRow || entry.top >= currentRowBottom) {
        currentRow = [entry];
        rows.push(currentRow);
        currentRowBottom = entry.bottom;
      } else {
        currentRow.push(entry);
        if (entry.bottom > currentRowBottom) currentRowBottom = entry.bottom;
      }
    });
    return rows.flatMap(row => row.sort((a, b) => a.left - b.left).map(e => e.item));
  }

  // Frames
  const frameEntries = state.cells.map(c => ({
    item: c, top: c.cfg.y, bottom: c.cfg.y + c.cfg.h, left: c.cfg.x,
  }));
  const sortedCells = sortReadingOrder(frameEntries);
  const frames = sortedCells.map(c => {
    const cfg = c.cfg;
    return {
      x: Math.round(cfg.x), y: Math.round(cfg.y),
      w: Math.round(cfg.w), h: Math.round(cfg.h),
      shape: cfg.shape || null,
      matching_index: (typeof cfg._matchingIndex === 'number') ? cfg._matchingIndex : null,
      borderEnabled: c.borderEnabled,
      borderColor: c.borderColor,
      borderWidth: c.borderWidth,
    };
  });

  // TextBoxes
  const tbEntries = (state.textBoxes || []).map(tb => {
    const lineCount = Math.max(1, (tb.text || '').split(/<br\s*\/?>|<\/div><div>|<div>|\n/).length);
    const estHeight = tb.fontSize * 1.3 * lineCount;
    return { item: tb, top: tb.y, bottom: tb.y + estHeight, left: tb.x };
  });
  const sortedTbs = sortReadingOrder(tbEntries);
  const textBoxes = sortedTbs.map(tb => ({
    x: Math.round(tb.x), y: Math.round(tb.y),
    width: tb.width ? Math.round(tb.width) : null,
    text: tb.text || '',
    matching_index: (typeof tb._matchingIndex === 'number') ? tb._matchingIndex : null,
    fontName: tb.fontName, fontSize: tb.fontSize,
    fontColor: tb.fontColor,
    bold: tb.bold, italic: tb.italic,
    underline: tb.underline, align: tb.align,
  }));

  return {
    name: tmpl.name || tmpl._viewport,
    canvasW: tmpl.canvasW,
    canvasH: tmpl.canvasH,
    bgColor: tmpl.bgColor,
    bgImage: tmpl.bgImage || null,
    frames,
    textBoxes,
  };
}

document.getElementById('saveTemplateBtn').addEventListener('click', async () => {
  const btn = document.getElementById('saveTemplateBtn');

  // ── Guard: webhook URL not configured ────────────────────────────

  btn.disabled = true;
  const originalText = btn.textContent;

  try {
    // ── Build the full pair payload (desktop + mobile) ─────────────
    const pairIdx = getActivePairIndex();

    const desktopIdx = getTemplateIndex(pairIdx, 'desktop');
    const mobileIdx = getTemplateIndex(pairIdx, 'mobile');

    const desktopData = serializeViewportState(desktopIdx);
    const mobileData = serializeViewportState(mobileIdx);

    // Auto-generate a human-readable name with timestamp
    const now = new Date();
    const timestamp = now.toLocaleString('en-SG', {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit', hour12: true,
    });
    const autoName = `${pairName} — ${timestamp}`;

    const payload = {
      templateName: autoName,
      basePairName: pairName,
      savedAt: now.toISOString(),
      desktop: desktopData,
      mobile: mobileData,
    };

    // ── POST to Google Sheets webhook ─────────────────────────────
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000); // 15s timeout

    const response = await fetch(GOOGLE_SHEETS_WEBHOOK_URL, {
      method: 'POST',
      mode: 'no-cors',   // Apps Script doesn't support CORS preflight
      headers: { 'Content-Type': 'text/plain' },  // avoid preflight
      body: JSON.stringify(payload),
      signal: controller.signal,
    });
    clearTimeout(timeoutId);

    // With mode: 'no-cors', response is opaque (status 0). We can't
    // inspect it, but if fetch() resolved without throwing, the
    // request was sent successfully.
    showSaveToast(`✅ Template "${autoName}" saved to Google Sheets`, 'success', 5000);
